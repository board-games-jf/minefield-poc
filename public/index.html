<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minefield</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #1a1a1a;
      --bg-secondary: #242424;
      --bg-card: #2a2a2a;
      --border: rgba(255, 255, 255, 0.1);
      --border-strong: rgba(255, 255, 255, 0.2);
      --text: #f0f0f0;
      --text-muted: #888;
      --text-subtle: #555;
      --teal: #1D9E75;
      --teal-light: rgba(29, 158, 117, 0.15);
      --coral: #993C1D;
      --coral-light: rgba(153, 60, 29, 0.15);
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 14px;
      --cell-gap: 2px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      overflow-x: hidden;
    }

    .container {
      width: 100%;
      max-width: 640px;
    }

    /* ── Locale selector ── */
    .locale-bar {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 4px;
      margin-bottom: 1.25rem;
    }

    .locale-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .ranking-btn {
      height: 30px;
      min-width: 30px;
      padding: 0 10px;
      border-radius: 20px;
      border: 0.5px solid var(--border);
      background: var(--bg-secondary);
      color: var(--text);
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
    }

    .ranking-btn:hover {
      border-color: var(--border-strong);
    }

    .locale-select {
      height: 30px;
      padding: 0 10px;
      border-radius: 20px;
      border: 0.5px solid var(--border);
      background: var(--bg-secondary);
      color: var(--text);
      font-size: 11px;
      cursor: pointer;
      font-family: inherit;
      outline: none;
      appearance: none;
    }

    .locale-select:focus {
      border-color: var(--border-strong);
    }

    /* ── Screens ── */
    .screen {
      display: none;
      flex-direction: column;
      gap: 1.5rem;
    }

    .screen.active {
      display: flex;
    }

    .logo {
      text-align: center;
      font-size: 15px;
      font-weight: 500;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .logo-icon {
      font-size: 20px;
    }

    .card {
      background: var(--bg-card);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .card-title {
      font-size: 17px;
      font-weight: 500;
      color: var(--text);
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field label {
      font-size: 13px;
      color: var(--text-muted);
    }

    input[type="text"] {
      height: 40px;
      background: var(--bg-secondary);
      border: 0.5px solid var(--border-strong);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 14px;
      padding: 0 12px;
      outline: none;
      transition: border-color 0.15s;
      width: 100%;
      font-family: inherit;
    }

    input[type="text"]:focus {
      border-color: var(--teal);
    }

    .diff-options {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .diff-option {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: var(--bg-secondary);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: border-color 0.15s;
      user-select: none;
    }

    .diff-option:hover {
      border-color: var(--border-strong);
    }

    .diff-option.selected {
      border-color: var(--teal);
    }

    .diff-option input[type="radio"] {
      display: none;
    }

    .diff-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 1.5px solid var(--border-strong);
      flex-shrink: 0;
      transition: all 0.15s;
    }

    .diff-option.selected .diff-dot {
      background: var(--teal);
      border-color: var(--teal);
    }

    .diff-info {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .diff-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
    }

    .diff-desc {
      font-size: 12px;
      color: var(--text-muted);
    }

    .btn {
      height: 42px;
      border-radius: var(--radius-sm);
      border: none;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      font-family: inherit;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-primary {
      background: var(--teal);
      color: #fff;
    }

    .btn-secondary {
      background: transparent;
      border: 0.5px solid var(--border-strong);
      color: var(--text);
    }

    .btn-coral {
      background: var(--coral);
      color: #fff;
    }

    .invite-box {
      background: var(--bg-secondary);
      border: 0.5px dashed var(--border-strong);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .invite-url {
      font-size: 12px;
      color: var(--text-muted);
      font-family: monospace;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .invite-copy {
      font-size: 12px;
      padding: 0 12px;
      height: 30px;
      flex-shrink: 0;
    }

    .waiting-dots {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 1rem 0;
    }

    .waiting-dots span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--border-strong);
      animation: pulse 1.4s ease-in-out infinite;
    }

    .waiting-dots span:nth-child(2) {
      animation-delay: 0.2s;
    }

    .waiting-dots span:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes pulse {

      0%,
      80%,
      100% {
        opacity: 0.3;
        transform: scale(0.8);
      }

      40% {
        opacity: 1;
        transform: scale(1);
      }
    }

    .error-msg {
      background: rgba(224, 75, 74, 0.15);
      border: 0.5px solid rgba(224, 75, 74, 0.4);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-size: 13px;
      color: #F09595;
      text-align: center;
      display: none;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 12px;
      background: var(--bg-secondary);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-sm);
    }

    .toggle-text {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .toggle-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
    }

    .toggle-hint {
      font-size: 12px;
      color: var(--text-muted);
    }

    .switch {
      width: 44px;
      height: 26px;
      border-radius: 999px;
      border: 0.5px solid var(--border-strong);
      background: var(--bg-card);
      position: relative;
      flex-shrink: 0;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    .switch::after {
      content: "";
      position: absolute;
      top: 3px;
      left: 3px;
      width: 20px;
      height: 20px;
      border-radius: 999px;
      background: #fff;
      transition: transform 0.15s;
    }

    .switch.on {
      background: var(--teal);
      border-color: var(--teal);
    }

    .switch.on::after {
      transform: translateX(18px);
    }

    .ai-level {
      display: none;
    }

    .ai-level.visible {
      display: block;
    }

    /* ── Game ── */
    .scoreboard {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 12px;
    }

    .player-card {
      padding: 12px 14px;
      border-radius: var(--radius-md);
      border: 1.5px solid var(--border);
      background: var(--bg-card);
      transition: all 0.2s;
    }

    .player-card.active-p1 {
      border-color: var(--teal);
      background: var(--teal-light);
    }

    .player-card.active-p2 {
      border-color: var(--coral);
      background: var(--coral-light);
    }

    .player-name-label {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 2px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .player-card.active-p1 .player-name-label {
      color: #5DCAA5;
    }

    .player-card.active-p2 .player-name-label {
      color: #F0997B;
    }

    .dot-p1 {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--teal);
      flex-shrink: 0;
    }

    .dot-p2 {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--coral);
      flex-shrink: 0;
    }

    .player-score-val {
      font-size: 26px;
      font-weight: 500;
      color: var(--text);
    }

    .player-card.active-p1 .player-score-val {
      color: #5DCAA5;
    }

    .player-card.active-p2 .player-score-val {
      color: #F0997B;
    }

    .player-bombs-val {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 1px;
    }

    .player-card.active-p1 .player-bombs-val {
      color: var(--teal);
    }

    .player-card.active-p2 .player-bombs-val {
      color: #D85A30;
    }

    .turn-info {
      text-align: center;
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.5;
    }

    .turn-info strong {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
    }

    .status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 13px;
      color: var(--text-muted);
      gap: 12px;
    }

    .status-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .icon-toggle {
      width: 38px;
      height: 38px;
      border-radius: 12px;
      border: 0.5px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.03);
      color: var(--text);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.12s, border-color 0.16s, background 0.16s, box-shadow 0.16s;
    }

    .icon-toggle:hover {
      transform: translateY(-1px);
      border-color: rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.05);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.18);
    }

    .icon-toggle.off {
      color: var(--text-muted);
      background: rgba(255, 255, 255, 0.02);
    }

    .icon-toggle-glyph {
      font-size: 18px;
      line-height: 1;
    }

    .icon-toggle-text {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.2px;
      line-height: 1;
    }

    .board-wrap {
      width: 100%;
      max-width: 100%;
      margin: 0;
      background: var(--bg-secondary);
      border-radius: var(--radius-lg);
      padding: 14px;
      border: 0.5px solid var(--border);
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: thin;
      scrollbar-color: rgba(255, 255, 255, 0.18) transparent;
      max-height: 70vh;
      flex-shrink: 0;
    }

    .board-row {
      width: 100%;
    }

    .board-scroll {
      display: flex;
      justify-content: center;
    }

    .board {
      display: inline-grid;
      gap: var(--cell-gap);
    }

    .sticker-launcher-wrap {
      position: relative;
      display: flex;
      justify-content: center;
    }

    .sticker-launcher {
      width: 38px;
      height: 38px;
      border-radius: 12px;
      border: 0.5px solid rgba(255, 255, 255, 0.08);
      background:
        radial-gradient(circle at top left, rgba(224, 75, 74, 0.18), transparent 36%),
        radial-gradient(circle at top right, rgba(29, 158, 117, 0.14), transparent 34%),
        rgba(255, 255, 255, 0.03);
      color: var(--text);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.12s, border-color 0.16s, background 0.16s, box-shadow 0.16s, filter 0.16s;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.16);
      animation: launcherFloat 2.8s ease-in-out infinite;
    }

    .sticker-launcher:hover {
      transform: translateY(-2px) scale(1.04);
      border-color: rgba(255, 255, 255, 0.14);
      box-shadow: 0 14px 28px rgba(0, 0, 0, 0.22);
      filter: saturate(1.12);
    }

    .sticker-launcher.open {
      animation: none;
      transform: translateY(-1px) scale(1.04);
      box-shadow: 0 18px 34px rgba(0, 0, 0, 0.28);
    }

    .sticker-launcher-icon {
      font-size: 22px;
      line-height: 1;
      transform-origin: center;
    }

    .sticker-launcher.open .sticker-launcher-icon {
      animation: launcherPop 180ms ease-out;
    }

    .sticker-badge {
      position: absolute;
      top: -6px;
      right: -6px;
      min-width: 18px;
      height: 18px;
      padding: 0 5px;
      border-radius: 999px;
      background: rgba(224, 75, 74, 0.95);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      display: none;
      align-items: center;
      justify-content: center;
      border: 2px solid rgba(22, 22, 22, 0.92);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.22);
      pointer-events: none;
      font-variant-numeric: tabular-nums;
    }

    .sticker-palette {
      position: fixed;
      top: var(--sticker-palette-top, 0px);
      left: 50%;
      right: auto;
      transform: translate(-50%, 10px) scale(0.96);
      transform-origin: top center;
      width: min(460px, calc(100vw - 40px - env(safe-area-inset-left) - env(safe-area-inset-right)));
      max-height: calc(100vh - var(--sticker-palette-top, 0px) - 24px);
      padding: 14px;
      border-radius: 20px;
      border: 0.5px solid rgba(255, 255, 255, 0.08);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.03)),
        rgba(22, 22, 22, 0.92);
      backdrop-filter: blur(18px);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.16s, transform 0.16s;
      z-index: 20;
      overflow-y: auto;
      overflow-x: hidden;
    }

    .sticker-palette.open {
      opacity: 1;
      pointer-events: auto;
      transform: translate(-50%, 0) scale(1);
    }

    .sticker-palette-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(84px, 1fr));
      gap: 10px;
    }

    .sticker-btn {
      min-height: 74px;
      border-radius: 16px;
      border: 0.5px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.03);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      transition: transform 0.12s, background 0.16s, border-color 0.16s, box-shadow 0.16s, opacity 0.16s;
      user-select: none;
      padding: 8px 6px;
      opacity: 0;
      transform: translateY(10px) scale(0.94);
    }

    .sticker-palette.open .sticker-btn {
      animation: stickerCardIn 220ms cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }

    .sticker-palette.open .sticker-btn:nth-child(1) {
      animation-delay: 0ms;
    }

    .sticker-palette.open .sticker-btn:nth-child(2) {
      animation-delay: 18ms;
    }

    .sticker-palette.open .sticker-btn:nth-child(3) {
      animation-delay: 36ms;
    }

    .sticker-palette.open .sticker-btn:nth-child(4) {
      animation-delay: 54ms;
    }

    .sticker-palette.open .sticker-btn:nth-child(5) {
      animation-delay: 72ms;
    }

    .sticker-palette.open .sticker-btn:nth-child(6) {
      animation-delay: 90ms;
    }

    .sticker-palette.open .sticker-btn:nth-child(7) {
      animation-delay: 108ms;
    }

    .sticker-palette.open .sticker-btn:nth-child(8) {
      animation-delay: 126ms;
    }

    .sticker-btn:hover {
      transform: translateY(-2px) scale(1.02);
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(255, 255, 255, 0.14);
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.18);
    }

    .sticker-btn:active {
      transform: translateY(0) scale(0.98);
    }

    .sticker-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .sticker-btn-emoji {
      font-size: 26px;
      line-height: 1;
      transform-origin: center;
      will-change: transform;
    }

    .sticker-btn[data-sticker="nice"] .sticker-btn-emoji {
      animation: stickerFireBurst 1s ease-in-out infinite;
    }

    .sticker-btn[data-sticker="thinking"] .sticker-btn-emoji {
      animation: stickerThinkBob 1.5s ease-in-out infinite;
    }

    .sticker-btn[data-sticker="oops"] .sticker-btn-emoji {
      animation: stickerOopsTilt 1.2s ease-in-out infinite;
    }

    .sticker-btn[data-sticker="sweat"] .sticker-btn-emoji {
      animation: stickerSweatShake 1.1s ease-in-out infinite;
    }

    .sticker-btn[data-sticker="boom"] .sticker-btn-emoji {
      animation: stickerBoomPop 0.95s ease-in-out infinite;
    }

    .sticker-btn[data-sticker="taunt"] .sticker-btn-emoji {
      animation: stickerTauntSway 1.15s ease-in-out infinite;
    }

    .sticker-btn[data-sticker="cry"] .sticker-btn-emoji {
      animation: stickerCryDrop 1.3s ease-in-out infinite;
    }

    .sticker-btn[data-sticker="clap"] .sticker-btn-emoji {
      animation: stickerClapPulse 0.9s ease-in-out infinite;
    }

    .sticker-btn[data-sticker="trophy"] .sticker-btn-emoji {
      animation: stickerTrophyShine 1.2s ease-in-out infinite;
    }

    .sticker-toasts {
      position: fixed;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
      pointer-events: none;
      z-index: 50;
      width: min(280px, calc(100vw - 32px));
    }

    .sticker-toast {
      width: 100%;
      padding: 13px 15px;
      border-radius: 20px;
      border: 0.5px solid rgba(255, 255, 255, 0.10);
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.08), transparent 38%),
        rgba(18, 18, 18, 0.78);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--text);
      transform: translateY(10px) scale(0.96);
      opacity: 0;
      box-shadow: 0 18px 36px rgba(0, 0, 0, 0.24);
      animation: toastIn 170ms cubic-bezier(0.2, 0.8, 0.2, 1) forwards, toastOut 260ms ease-in forwards;
      animation-delay: 0ms, 1950ms;
    }

    .sticker-toast.p1 {
      border-color: rgba(29, 158, 117, 0.35);
    }

    .sticker-toast.p2 {
      border-color: rgba(224, 75, 74, 0.35);
    }

    .sticker-emoji {
      font-size: 40px;
      line-height: 1;
      transform-origin: center;
    }

    .sticker-toast[data-sticker="nice"] .sticker-emoji {
      animation: stickerFireBurstToast 620ms ease-in-out 2;
    }

    .sticker-toast[data-sticker="thinking"] .sticker-emoji {
      animation: stickerThinkBobToast 760ms ease-in-out 2;
    }

    .sticker-toast[data-sticker="oops"] .sticker-emoji {
      animation: stickerOopsTiltToast 620ms ease-in-out 2;
    }

    .sticker-toast[data-sticker="sweat"] .sticker-emoji {
      animation: stickerSweatShakeToast 680ms ease-in-out 2;
    }

    .sticker-toast[data-sticker="boom"] .sticker-emoji {
      animation: stickerBoomPopToast 580ms ease-in-out 2;
    }

    .sticker-toast[data-sticker="taunt"] .sticker-emoji {
      animation: stickerTauntSwayToast 650ms ease-in-out 2;
    }

    .sticker-toast[data-sticker="cry"] .sticker-emoji {
      animation: stickerCryDropToast 760ms ease-in-out 2;
    }

    .sticker-toast[data-sticker="clap"] .sticker-emoji {
      animation: stickerClapPulseToast 560ms ease-in-out 3;
    }

    .sticker-toast[data-sticker="trophy"] .sticker-emoji {
      animation: stickerTrophyShineToast 700ms ease-in-out 2;
    }

    .sticker-toast {
      justify-content: center;
    }

    .board-wrap::-webkit-scrollbar {
      height: 6px;
    }

    .board-wrap::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.18);
      border-radius: 999px;
    }

    .board-wrap::-webkit-scrollbar-track {
      background: transparent;
    }

    @keyframes toastIn {
      to {
        transform: translateY(0) scale(1);
        opacity: 1;
      }
    }

    @keyframes toastOut {
      to {
        transform: translateY(8px) scale(0.98);
        opacity: 0;
      }
    }

    @keyframes launcherFloat {

      0%,
      100% {
        transform: translateY(0);
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.16);
      }

      50% {
        transform: translateY(-2px);
        box-shadow: 0 14px 28px rgba(0, 0, 0, 0.22);
      }
    }

    @keyframes launcherPop {
      0% {
        transform: scale(0.86);
      }

      65% {
        transform: scale(1.14);
      }

      100% {
        transform: scale(1);
      }
    }

    @keyframes stickerCardIn {
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes stickerEmojiBounce {
      0% {
        transform: scale(0.72) rotate(-10deg);
      }

      55% {
        transform: scale(1.16) rotate(6deg);
      }

      100% {
        transform: scale(1) rotate(0deg);
      }
    }

    @keyframes stickerFlagWave {

      0%,
      100% {
        transform: rotate(-6deg) translateY(0);
      }

      50% {
        transform: rotate(6deg) translateY(-2px);
      }
    }

    @keyframes stickerFireBurst {

      0%,
      100% {
        transform: scale(1) rotate(-4deg);
        filter: saturate(1);
      }

      50% {
        transform: scale(1.16) rotate(4deg);
        filter: saturate(1.3);
      }
    }

    @keyframes stickerThinkBob {

      0%,
      100% {
        transform: translateY(0);
      }

      40% {
        transform: translateY(-3px) rotate(-6deg);
      }

      70% {
        transform: translateY(1px) rotate(3deg);
      }
    }

    @keyframes stickerOopsTilt {

      0%,
      100% {
        transform: rotate(0deg);
      }

      25% {
        transform: rotate(-10deg) scale(1.04);
      }

      75% {
        transform: rotate(10deg) scale(1.04);
      }
    }

    @keyframes stickerSweatShake {

      0%,
      100% {
        transform: translateX(0);
      }

      20% {
        transform: translateX(-2px) rotate(-4deg);
      }

      40% {
        transform: translateX(2px) rotate(4deg);
      }

      60% {
        transform: translateX(-1px);
      }
    }

    @keyframes stickerBoomPop {

      0%,
      100% {
        transform: scale(0.98);
      }

      35% {
        transform: scale(1.22);
      }

      60% {
        transform: scale(0.9);
      }
    }

    @keyframes stickerTauntSway {

      0%,
      100% {
        transform: rotate(0deg) translateY(0);
      }

      30% {
        transform: rotate(-8deg) translateY(-2px);
      }

      70% {
        transform: rotate(8deg) translateY(1px);
      }
    }

    @keyframes stickerCryDrop {

      0%,
      100% {
        transform: translateY(0);
      }

      30% {
        transform: translateY(2px) scale(0.98);
      }

      60% {
        transform: translateY(-2px) scale(1.04);
      }
    }

    @keyframes stickerClapPulse {

      0%,
      100% {
        transform: scale(1);
      }

      40% {
        transform: scale(1.16);
      }

      60% {
        transform: scale(0.92);
      }
    }

    @keyframes stickerTrophyShine {

      0%,
      100% {
        transform: rotate(0deg) scale(1);
        filter: brightness(1);
      }

      45% {
        transform: rotate(-8deg) scale(1.12);
        filter: brightness(1.25);
      }

      70% {
        transform: rotate(8deg) scale(1.04);
      }
    }

    @keyframes stickerFlagWaveToast {

      0%,
      100% {
        transform: scale(1) rotate(-8deg);
      }

      50% {
        transform: scale(1.18) rotate(10deg) translateY(-2px);
      }
    }

    @keyframes stickerFireBurstToast {

      0%,
      100% {
        transform: scale(1);
        filter: saturate(1);
      }

      45% {
        transform: scale(1.28) rotate(8deg);
        filter: saturate(1.5);
      }
    }

    @keyframes stickerThinkBobToast {

      0%,
      100% {
        transform: translateY(0) rotate(0deg);
      }

      50% {
        transform: translateY(-5px) rotate(-10deg) scale(1.14);
      }
    }

    @keyframes stickerOopsTiltToast {

      0%,
      100% {
        transform: rotate(0deg) scale(1);
      }

      35% {
        transform: rotate(-16deg) scale(1.12);
      }

      70% {
        transform: rotate(16deg) scale(1.12);
      }
    }

    @keyframes stickerSweatShakeToast {

      0%,
      100% {
        transform: translateX(0);
      }

      20% {
        transform: translateX(-4px) rotate(-6deg);
      }

      40% {
        transform: translateX(4px) rotate(6deg);
      }

      60% {
        transform: translateX(-2px) scale(1.08);
      }
    }

    @keyframes stickerBoomPopToast {

      0%,
      100% {
        transform: scale(1);
      }

      35% {
        transform: scale(1.35);
      }

      65% {
        transform: scale(0.86);
      }
    }

    @keyframes stickerTauntSwayToast {

      0%,
      100% {
        transform: rotate(0deg);
      }

      30% {
        transform: rotate(-12deg) translateY(-2px) scale(1.08);
      }

      70% {
        transform: rotate(12deg) translateY(1px) scale(1.08);
      }
    }

    @keyframes stickerCryDropToast {

      0%,
      100% {
        transform: translateY(0) scale(1);
      }

      30% {
        transform: translateY(4px) scale(0.96);
      }

      55% {
        transform: translateY(-4px) scale(1.12);
      }
    }

    @keyframes stickerClapPulseToast {

      0%,
      100% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.24) rotate(6deg);
      }
    }

    @keyframes stickerTrophyShineToast {

      0%,
      100% {
        transform: rotate(0deg) scale(1);
        filter: brightness(1);
      }

      45% {
        transform: rotate(-12deg) scale(1.18);
        filter: brightness(1.35);
      }

      70% {
        transform: rotate(12deg) scale(1.08);
      }
    }

    .cell {
      aspect-ratio: 1;
      border-radius: 5px;
      border: 1.5px solid var(--border-strong);
      background: var(--bg-card);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 500;
      transition: background 0.1s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.revealed) {
      background: var(--bg-secondary);
      transform: scale(0.94);
    }

    .cell.revealed {
      cursor: default;
      border: 0.5px solid rgba(255, 255, 255, 0.06);
      background: var(--bg-secondary);
    }

    .cell.empty {
      border-color: transparent;
      background: transparent;
      cursor: default;
    }

    .cell.bomb-p1 {
      background: rgba(29, 158, 117, 0.2);
      border: 1.5px solid var(--teal);
      cursor: default;
    }

    .cell.bomb-p2 {
      background: rgba(153, 60, 29, 0.2);
      border: 1.5px solid var(--coral);
      cursor: default;
    }

    .cell.bomb-hidden {
      background: var(--bg-secondary);
      border: 0.5px solid var(--border);
      opacity: 0.3;
      cursor: default;
    }

    .num-1 {
      color: #378ADD;
    }

    .num-2 {
      color: #639922;
    }

    .num-3 {
      color: #D85A30;
    }

    .num-4 {
      color: #7F77DD;
    }

    .num-5 {
      color: #E24B4A;
    }

    .num-6 {
      color: #1D9E75;
    }

    .num-7 {
      color: #EF9F27;
    }

    .num-8 {
      color: #888780;
    }

    .cell.last-clicked-p1 {
      border: 2.5px solid var(--teal);
      box-shadow: 0 0 14px rgba(29, 158, 117, 0.7), inset 0 0 8px rgba(29, 158, 117, 0.25);
      animation: cellPulseP1 0.4s ease-out forwards;
    }

    .cell.last-clicked-p2 {
      border: 2.5px solid var(--coral);
      box-shadow: 0 0 14px rgba(153, 60, 29, 0.7), inset 0 0 8px rgba(153, 60, 29, 0.25);
      animation: cellPulseP2 0.4s ease-out forwards;
    }

    @keyframes cellPulseP1 {
      0% {
        box-shadow: 0 0 0 0 rgba(29, 158, 117, 0.8), inset 0 0 8px rgba(29, 158, 117, 0.25);
      }

      100% {
        box-shadow: 0 0 14px rgba(29, 158, 117, 0.3), inset 0 0 8px rgba(29, 158, 117, 0.25);
      }
    }

    @keyframes cellPulseP2 {
      0% {
        box-shadow: 0 0 0 0 rgba(153, 60, 29, 0.8), inset 0 0 8px rgba(153, 60, 29, 0.25);
      }

      100% {
        box-shadow: 0 0 14px rgba(153, 60, 29, 0.3), inset 0 0 8px rgba(153, 60, 29, 0.25);
      }
    }

    .result-card {
      background: var(--bg-card);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .result-title {
      font-size: 18px;
      font-weight: 500;
      color: var(--text);
    }

    .result-subtitle {
      font-size: 13px;
      color: var(--text-muted);
    }

    .result-actions {
      display: flex;
      gap: 8px;
      margin-top: 4px;
    }

    .result-actions .btn {
      flex: 1;
    }

    .reconnecting-bar {
      background: rgba(239, 159, 39, 0.15);
      border: 0.5px solid rgba(239, 159, 39, 0.4);
      border-radius: var(--radius-sm);
      padding: 8px 14px;
      font-size: 12px;
      color: #EF9F27;
      text-align: center;
      display: none;
    }

    .reconnecting-bar.visible {
      display: block;
    }

    .ranking-summary,
    .ranking-modal-card {
      background: var(--bg-card);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .ranking-summary {
      margin-top: 14px;
      text-align: left;
    }

    .ranking-title {
      font-size: 17px;
      font-weight: 600;
      color: var(--text);
    }

    .ranking-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .ranking-row,
    .ranking-player-card {
      display: grid;
      grid-template-columns: 56px 1fr auto;
      gap: 12px;
      align-items: center;
      background: rgba(255, 255, 255, 0.02);
      border: 0.5px solid transparent;
      border-radius: var(--radius-md);
      padding: 12px 14px;
    }

    .ranking-row.highlight {
      background: rgba(29, 158, 117, 0.18);
      border: 2px solid var(--teal);
      box-shadow:
        0 10px 24px rgba(0, 0, 0, 0.22),
        inset 0 0 0 1px rgba(29, 158, 117, 0.25);
    }

    .ranking-pos {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .ranking-medal {
      width: 22px;
      text-align: center;
      font-size: 16px;
      line-height: 1;
    }

    .ranking-pos-num {
      font-variant-numeric: tabular-nums;
    }

    .ranking-main {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .ranking-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
    }

    .ranking-you {
      font-size: 12px;
      color: var(--teal);
      font-weight: 600;
    }

    .ranking-meta {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 2px;
      text-align: right;
    }

    .ranking-points {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }

    .ranking-wins {
      font-size: 12px;
      color: var(--text-muted);
      font-variant-numeric: tabular-nums;
    }

    .ranking-divider {
      height: 1px;
      background: rgba(255, 255, 255, 0.08);
      margin: 2px 0;
    }

    .ranking-empty {
      font-size: 13px;
      color: var(--text-muted);
      text-align: center;
      padding: 10px 0;
    }

    .ranking-player-card {
      grid-template-columns: 1fr;
      text-align: center;
      padding: 18px 14px;
    }

    .ranking-player-card .ranking-pos {
      justify-content: center;
      font-size: 34px;
      color: var(--teal);
      font-weight: 800;
    }

    .ranking-player-card .ranking-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
    }

    .ranking-player-card .ranking-wins {
      font-size: 16px;
      color: var(--text);
      font-weight: 600;
    }

    .ranking-modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(5, 5, 5, 0.72);
      backdrop-filter: blur(8px);
      z-index: 80;
    }

    .ranking-modal.open {
      display: flex;
    }

    .ranking-modal-card {
      width: min(680px, calc(100vw - 36px));
      max-height: min(760px, calc(100vh - 36px));
    }

    .ranking-modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .ranking-scroll {
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding-right: 4px;
    }

    .ranking-close {
      width: 34px;
      height: 34px;
      border-radius: 999px;
      border: 0.5px solid var(--border);
      background: rgba(255, 255, 255, 0.03);
      color: var(--text);
      cursor: pointer;
      font-size: 18px;
    }

    .confetti {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 90;
      overflow: hidden;
    }

    .confetti-piece {
      position: absolute;
      top: -20px;
      width: 10px;
      height: 14px;
      border-radius: 3px;
      opacity: 0.95;
      transform: translate3d(0, 0, 0) rotate(0deg);
      animation: confettiFall 1200ms linear forwards;
      will-change: transform, opacity;
    }

    @keyframes confettiFall {
      0% {
        transform: translate3d(var(--x), -20px, 0) rotate(0deg);
        opacity: 0.0;
      }

      8% {
        opacity: 1;
      }

      100% {
        transform: translate3d(calc(var(--x) + var(--dx)), calc(100vh + 40px), 0) rotate(var(--rot));
        opacity: 0.85;
      }
    }

    .end-flash {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 85;
      opacity: 0;
      background: radial-gradient(circle at 50% 40%, rgba(224, 75, 74, 0.18), rgba(0, 0, 0, 0) 60%);
    }

    .end-flash.on {
      animation: endFlash 420ms ease-out forwards;
    }

    @keyframes endFlash {
      0% {
        opacity: 0;
        transform: scale(0.98);
      }

      25% {
        opacity: 1;
        transform: scale(1);
      }

      100% {
        opacity: 0;
        transform: scale(1.02);
      }
    }

    @media (max-width: 720px) {
      .board-wrap {
        align-self: stretch;
        margin: 0;
      }

      .ranking-row,
      .ranking-player-card {
        grid-template-columns: 42px 1fr;
      }

      .ranking-meta {
        grid-column: 2;
        align-items: flex-start;
        text-align: left;
      }
    }
  </style>
</head>

<body>
  <div class="container">

    <!-- Locale selector -->
    <div class="locale-bar" id="locale-bar">
      <div class="locale-actions">
        <button class="ranking-btn" id="btn-ranking" type="button">🏆</button>
        <select class="locale-select" id="locale-select" aria-label="Language">
          <option value="pt-BR-x-CE"></option>
          <option value="pt-PT"></option>
          <option value="en"></option>
        </select>
      </div>
    </div>

    <!-- Screen: Create -->
    <div class="screen active" id="screen-create">
      <div class="logo"><span class="logo-icon">💣</span> <span data-i18n="app_name">Minefield</span></div>
      <div class="card">
        <div class="card-title" data-i18n="create_title"></div>
        <div class="field">
          <label for="create-name" data-i18n="name_label"></label>
          <input type="text" id="create-name" maxlength="20" data-i18n-ph="name_placeholder" />
        </div>
        <div class="field">
          <label data-i18n="difficulty_label"></label>
          <div class="diff-options">
            <label class="diff-option selected" id="opt-easy">
              <input type="radio" name="diff" value="easy" checked />
              <div class="diff-dot"></div>
              <div class="diff-info">
                <span class="diff-name" data-i18n="diff_easy_name"></span>
                <span class="diff-desc" data-i18n="diff_easy_desc"></span>
              </div>
            </label>
            <label class="diff-option" id="opt-medium">
              <input type="radio" name="diff" value="medium" />
              <div class="diff-dot"></div>
              <div class="diff-info">
                <span class="diff-name" data-i18n="diff_medium_name"></span>
                <span class="diff-desc" data-i18n="diff_medium_desc"></span>
              </div>
            </label>
            <label class="diff-option" id="opt-hard">
              <input type="radio" name="diff" value="hard" />
              <div class="diff-dot"></div>
              <div class="diff-info">
                <span class="diff-name" data-i18n="diff_hard_name"></span>
                <span class="diff-desc" data-i18n="diff_hard_desc"></span>
              </div>
            </label>
          </div>
        </div>
        <div class="field">
          <div class="toggle-row" id="solo-row">
            <div class="toggle-text">
              <div class="toggle-title" data-i18n="solo_label"></div>
              <div class="toggle-hint" data-i18n="solo_hint"></div>
            </div>
            <div class="switch" id="solo-toggle" role="switch" aria-checked="false" tabindex="0"></div>
          </div>
        </div>
        <div class="field ai-level" id="ai-level-field">
          <label for="ai-level" data-i18n="ai_level_label"></label>
          <select id="ai-level" class="locale-select"
            style="width:100%; border-radius: var(--radius-sm); height: 40px; font-size: 13px;">
            <option value="easy" data-i18n="ai_easy"></option>
            <option value="medium" data-i18n="ai_medium"></option>
            <option value="hard" data-i18n="ai_hard"></option>
          </select>
        </div>
        <div id="create-error" class="error-msg"></div>
        <button class="btn btn-primary" id="btn-create" data-i18n="btn_create"></button>
      </div>
    </div>

    <!-- Screen: Waiting -->
    <div class="screen" id="screen-waiting">
      <div class="logo"><span class="logo-icon">💣</span> <span data-i18n="app_name">Minefield</span></div>
      <div class="card">
        <div class="card-title" data-i18n="waiting_title"></div>
        <div class="waiting-dots"><span></span><span></span><span></span></div>
        <div class="field">
          <label data-i18n="invite_label"></label>
          <div class="invite-box">
            <div class="invite-url" id="invite-url"></div>
            <button class="btn btn-secondary invite-copy" id="btn-copy" data-i18n="btn_copy"></button>
          </div>
        </div>
      </div>
    </div>

    <!-- Screen: Join -->
    <div class="screen" id="screen-join">
      <div class="logo"><span class="logo-icon">💣</span> <span data-i18n="app_name">Minefield</span></div>
      <div class="card">
        <div class="card-title" data-i18n="join_title"></div>
        <div id="join-info" style="font-size:13px; color:var(--text-muted); text-align:center;"></div>
        <div class="field">
          <label for="join-name" data-i18n="join_name_label"></label>
          <input type="text" id="join-name" maxlength="20" data-i18n-ph="join_name_ph" />
        </div>
        <div id="join-error" class="error-msg"></div>
        <button class="btn btn-coral" id="btn-join" data-i18n="btn_join"></button>
      </div>
    </div>

    <!-- Screen: Game -->
    <div class="screen" id="screen-game">
      <div class="reconnecting-bar" id="reconnecting-bar" data-i18n="reconnecting"></div>
      <div class="scoreboard">
        <div class="player-card active-p1" id="p1-card">
          <div class="player-name-label">
            <div class="dot-p1"></div><span id="p1-name">—</span>
          </div>
          <div class="player-score-val" id="p1-score">0</div>
          <div class="player-bombs-val" id="p1-bombs"></div>
        </div>
        <div class="turn-info">
          <strong id="turn-name">—</strong>
          <span id="turn-suffix" data-i18n="turn_suffix"></span>
        </div>
        <div class="player-card" id="p2-card">
          <div class="player-name-label">
            <div class="dot-p2"></div><span id="p2-name">—</span>
          </div>
          <div class="player-score-val" id="p2-score">0</div>
          <div class="player-bombs-val" id="p2-bombs"></div>
        </div>
      </div>
      <div class="status-bar">
        <span id="bombs-remaining"></span>
        <div class="status-actions">
          <div class="sticker-launcher-wrap">
            <button class="sticker-launcher" id="sticker-launcher" type="button" aria-expanded="false"
              aria-controls="sticker-palette">
              <span class="sticker-launcher-icon" aria-hidden="true">💭</span>
            </button>
            <div class="sticker-badge" id="sticker-badge" aria-hidden="true"></div>

  <script>
    // Auto-refresh on new deploys (prevents users needing a hard refresh).
    // `version.json` is fetched with `no-store` so it always reflects the latest deploy.
    (function () {
      const KEY = "minefield-version";
      const stored = localStorage.getItem(KEY) || "";
      fetch("./version.json", { cache: "no-store" })
        .then(r => r.ok ? r.json() : null)
        .then(data => {
          const v = data && data.version ? String(data.version) : "";
          // Expose for cache-busting imports/assets.
          window.__MF_VERSION__ = v || stored || "dev";
          if (!v || v === stored) return;
          localStorage.setItem(KEY, v);
          // Avoid infinite reload loops if something is wrong with caching.
          const onceKey = KEY + ":reloaded:" + v;
          if (sessionStorage.getItem(onceKey)) return;
          sessionStorage.setItem(onceKey, "1");
          location.reload();
        })
        .catch(() => { window.__MF_VERSION__ = stored || "dev"; });
    })();
  </script>
  <script type="module">
    import PartySocket from "https://cdn.jsdelivr.net/npm/partysocket@1.0.2/dist/index.mjs";
    const ASSET_VERSION = globalThis.__MF_VERSION__ || "dev";
    const { TRANSLATIONS, LOCALE_FLAGS, LOCALE_LABELS, LOCALE_LANG } =

    // ── Config ─────────────────────────────────────────────────────────────────
    const PARTYKIT_HOST = location.hostname === "localhost" || location.hostname === "127.0.0.1"
      ? location.host
      : "minefield.joselitofilho.partykit.dev";

    // ── i18n ───────────────────────────────────────────────────────────────────
    const DEFAULT_LOCALE = "pt-BR-x-CE";
    let locale = localStorage.getItem("minefield-locale") || DEFAULT_LOCALE;
    let t = TRANSLATIONS[locale];

    const NAME_STORAGE_KEY = "minefield-name";
    const SOUND_STORAGE_KEY = "minefield-sound-enabled";
    function detectDefaultLocale() {
      const prefs = (navigator.languages && navigator.languages.length ? navigator.languages : [navigator.language]).filter(Boolean);
      for (const lang of prefs) {
        const l = String(lang).toLowerCase();
        if (l.startsWith("pt-br")) return "pt-BR-x-CE";
        if (l.startsWith("pt")) return "pt-PT";
        if (l.startsWith("en")) return "en";
      }
      return DEFAULT_LOCALE;
    }

    function renderLocaleButtons() {
      const sel = document.getElementById("locale-select");
      sel.querySelectorAll("option").forEach(opt => {
        const l = opt.value;

        const flag = LOCALE_FLAGS[l] || "";
        // Note: native <option> rendering varies by OS/browser; emoji is widely supported.
        opt.textContent = `${flag} ${label}`.trim();
      });
      sel.value = locale;
    }

    function applyLocale(l) {

      t = TRANSLATIONS[l];

      // Update all data-i18n elements

        const key = el.dataset.i18n;

    }

    document.getElementById("locale-select").addEventListener("change", (e) => {

    // ── State ──────────────────────────────────────────────────────────────────
    let socket = null;

    let cryStickerAudio = null;
    let cryStickerStopTimer = 0;
    let tauntStickerAudio = null;
    let tauntStickerStopTimer = 0;
    let clapStickerAudio = null;
    let clapStickerStopTimer = 0;
    let trophyStickerAudio = null;
    let trophyStickerStopTimer = 0;
    let boomStickerAudio = null;
    let boomStickerStopTimer = 0;
    let thinkingStickerAudio = null;
    let thinkingStickerStopTimer = 0;
    let oopsStickerAudio = null;
    let oopsStickerStopTimer = 0;
    const STICKER_DISPLAY_MS = 2300;
    const STICKER_DISPLAY_SEC = STICKER_DISPLAY_MS / 1000;
    const FIRE_STICKER_CLIP = { start: 0, end: STICKER_DISPLAY_SEC };
    const CRY_STICKER_CLIP = { start: 0, end: STICKER_DISPLAY_SEC };
    const TAUNT_STICKER_CLIP = { start: 0, end: STICKER_DISPLAY_SEC };
    const CLAP_STICKER_CLIP = { start: 0, end: STICKER_DISPLAY_SEC };
    const TROPHY_STICKER_CLIP = { start: 0, end: STICKER_DISPLAY_SEC };
    const BOOM_STICKER_CLIP = { start: 0, end: STICKER_DISPLAY_SEC };
    const THINKING_STICKER_CLIP = { start: 0, end: STICKER_DISPLAY_SEC };
    const OOPS_STICKER_CLIP = { start: 0, end: STICKER_DISPLAY_SEC };
    let soundEnabled = localStorage.getItem(SOUND_STORAGE_KEY) !== "0";
    function getActivePlayerName() {
      return (myName || localStorage.getItem(NAME_STORAGE_KEY) || "").trim();
    }

    // ── Helpers ────────────────────────────────────────────────────────────────
    function showScreen(id) {
      document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
      document.getElementById(id).classList.add("active");
      if (id !== "screen-game") {
        document.getElementById("reconnecting-bar").classList.remove("visible");
      }
    }

    function ensureAudioUnlocked() {
      if (!soundEnabled) return;
      if (audioUnlocked) return;
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if (!Ctx) { audioUnlocked = true; return; }
      if (!audioCtx) audioCtx = new Ctx();
      if (audioCtx.state === "running") {
        audioUnlocked = true;
        return;
      }
      audioCtx.resume()
        .then(() => { audioUnlocked = true; })
        .catch(() => { });
      if (fireStickerAudio) {
        try { fireStickerAudio.load(); } catch { }
      }
      if (cryStickerAudio) {
        try { cryStickerAudio.load(); } catch { }
      }
      if (tauntStickerAudio) {
        try { tauntStickerAudio.load(); } catch { }
      }
      if (clapStickerAudio) {
        try { clapStickerAudio.load(); } catch { }
      }
      if (trophyStickerAudio) {
        try { trophyStickerAudio.load(); } catch { }
      }
      if (boomStickerAudio) {
        try { boomStickerAudio.load(); } catch { }
      }
      if (thinkingStickerAudio) {
        try { thinkingStickerAudio.load(); } catch { }
      }
      if (oopsStickerAudio) {
        try { oopsStickerAudio.load(); } catch { }
      }
    }

    function notifyTurnIfNeeded(state) {
      if (!state || state.status !== "playing") return;
      if (myPlayerIndex === null) return;
      if (state.currentPlayer !== myPlayerIndex) { lastTurnPlayerIndex = state.currentPlayer; return; }
      // Only notify on transition into "your turn".
      if (lastTurnPlayerIndex === myPlayerIndex) return;
      lastTurnPlayerIndex = myPlayerIndex;

      // Dedupe within the same game state: use a stable key.
      const key = `${roomId}:${state.status}:${state.currentPlayer}:${state.players?.[0]?.score ?? 0}:${state.players?.[1]?.score ?? 0}:${state.players?.[0]?.bombs ?? 0}:${state.players?.[1]?.bombs ?? 0}`;
      if (key === lastNotifiedTurnKey) return;
      lastNotifiedTurnKey = key;

      if (!soundEnabled) return;
      ensureAudioUnlocked();

      // Delay to allow AudioContext to transition from suspended to running state
      setTimeout(() => {
        try {
          // Short "your turn" chime.
          if (!audioCtx) {
            const Ctx = window.AudioContext || window.webkitAudioContext;
            if (Ctx) audioCtx = new Ctx();
          }
          if (!audioCtx) return;

          // Try to resume if suspended
          if (audioCtx.state === "suspended") {
            audioCtx.resume().catch(() => { });
            return;
          }

          if (audioCtx.state !== "running") return;

          const t0 = audioCtx.currentTime + 0.01;
          const g = audioCtx.createGain();
          g.gain.setValueAtTime(0.0001, t0);
          g.gain.exponentialRampToValueAtTime(0.12, t0 + 0.02);
          g.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.30);
          g.connect(audioCtx.destination);
          const o = audioCtx.createOscillator();
          o.type = "sine";
          o.frequency.setValueAtTime(880, t0);
          o.frequency.linearRampToValueAtTime(660, t0 + 0.30);
          o.connect(g);
          o.start(t0);
          o.stop(t0 + 0.33);
        } catch { }
      }, 50);
    }

    function playConfetti() {
      const root = document.getElementById("confetti");
      if (!root) return;
      root.innerHTML = "";
      const colors = ["#1D9E75", "#EF9F27", "#378ADD", "#E24B4A", "#7F77DD", "#F0997B"];
      const count = 80;
      for (let i = 0; i < count; i++) {
        const el = document.createElement("div");
        el.className = "confetti-piece";
        const c = colors[Math.floor(Math.random() * colors.length)];
        el.style.background = c;
        const x = Math.floor(Math.random() * 100);
        const dx = Math.floor((Math.random() * 2 - 1) * 120);
        const rot = Math.floor((Math.random() * 2 - 1) * 540);
        const delay = Math.floor(Math.random() * 160);
        const dur = 900 + Math.floor(Math.random() * 800);
        const w = 8 + Math.floor(Math.random() * 8);
        const h = 10 + Math.floor(Math.random() * 14);
        el.style.width = `${w}px`;
        el.style.height = `${h}px`;
        el.style.setProperty("--x", `${x}vw`);
        el.style.setProperty("--dx", `${dx}px`);
        el.style.setProperty("--rot", `${rot}deg`);
        el.style.animationDuration = `${dur}ms`;
        el.style.animationDelay = `${delay}ms`;
        root.appendChild(el);
      }
      setTimeout(() => { try { root.innerHTML = ""; } catch { } }, 2200);
    }

    function playDefeatEffect() {
      const flash = document.getElementById("end-flash");
      if (flash) {
        flash.classList.remove("on");
        // Force reflow so the animation can replay.
        void flash.offsetWidth;
        flash.classList.add("on");
      }

      if (!soundEnabled) return;
      ensureAudioUnlocked();
      try {
        if (!audioCtx) {
          const Ctx = window.AudioContext || window.webkitAudioContext;
          if (Ctx) audioCtx = new Ctx();
        }
        if (!audioCtx || audioCtx.state !== "running") return;
        const t0 = audioCtx.currentTime + 0.01;
        const g = audioCtx.createGain();
        g.gain.setValueAtTime(0.0001, t0);
        g.gain.exponentialRampToValueAtTime(0.14, t0 + 0.02);
        g.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.28);
        g.connect(audioCtx.destination);
        const o = audioCtx.createOscillator();
        o.type = "triangle";
        o.frequency.setValueAtTime(220, t0);
        o.frequency.linearRampToValueAtTime(140, t0 + 0.28);
        o.connect(g);
        o.start(t0);
        o.stop(t0 + 0.30);
      } catch { }
    }

    function notifyFinishedIfNeeded(state) {
      if (!state || state.status !== "finished") return;
      const key = `${roomId}:${state.players?.[0]?.score ?? 0}:${state.players?.[1]?.score ?? 0}:${state.players?.[0]?.bombs ?? 0}:${state.players?.[1]?.bombs ?? 0}`;
      if (key === lastFinishedKey) return;
      lastFinishedKey = key;
      const p1 = state.players?.[0];
      const p2 = state.players?.[1];
      if (!p1 || !p2 || myPlayerIndex === null) return;
      if (p1.score === p2.score) return;
      const winnerIndex = p1.score > p2.score ? 0 : 1;
      if (winnerIndex === myPlayerIndex) playConfetti();
      else playDefeatEffect();
    }

    function syncSoundToggleUi() {
      const btn = document.getElementById("sound-toggle");
      const glyph = document.getElementById("sound-toggle-glyph");
      if (!btn || !glyph) return;
      btn.classList.toggle("off", !soundEnabled);
      glyph.textContent = soundEnabled ? "🔊" : "🔇";
      const label = soundEnabled
        ? (t.sound_on_label || "Sound on")
        : (t.sound_off_label || "Sound off");
