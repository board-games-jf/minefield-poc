<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minefield</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1a1a1a;
      --bg-secondary: #242424;
      --bg-card: #2a2a2a;
      --border: rgba(255,255,255,0.1);
      --border-strong: rgba(255,255,255,0.2);
      --text: #f0f0f0;
      --text-muted: #888;
      --text-subtle: #555;
      --teal: #1D9E75;
      --teal-light: rgba(29,158,117,0.15);
      --coral: #993C1D;
      --coral-light: rgba(153,60,29,0.15);
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 14px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .container { width: 100%; max-width: 640px; }

    /* ── Locale selector ── */
    .locale-bar {
      display: flex;
      justify-content: flex-end;
      gap: 4px;
      margin-bottom: 1.25rem;
    }
    .locale-select {
      height: 30px;
      padding: 0 10px;
      border-radius: 20px;
      border: 0.5px solid var(--border);
      background: var(--bg-secondary);
      color: var(--text);
      font-size: 11px;
      cursor: pointer;
      font-family: inherit;
      outline: none;
      appearance: none;
    }
    .locale-select:focus { border-color: var(--border-strong); }

    /* ── Screens ── */
    .screen { display: none; flex-direction: column; gap: 1.5rem; }
    .screen.active { display: flex; }

    .logo {
      text-align: center;
      font-size: 15px;
      font-weight: 500;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .logo-icon { font-size: 20px; }

    .card {
      background: var(--bg-card);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .card-title { font-size: 17px; font-weight: 500; color: var(--text); }

    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label { font-size: 13px; color: var(--text-muted); }

    input[type="text"] {
      height: 40px;
      background: var(--bg-secondary);
      border: 0.5px solid var(--border-strong);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 14px;
      padding: 0 12px;
      outline: none;
      transition: border-color 0.15s;
      width: 100%;
      font-family: inherit;
    }
    input[type="text"]:focus { border-color: var(--teal); }

    .diff-options { display: flex; flex-direction: column; gap: 8px; }
    .diff-option {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: var(--bg-secondary);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: border-color 0.15s;
      user-select: none;
    }
    .diff-option:hover { border-color: var(--border-strong); }
    .diff-option.selected { border-color: var(--teal); }
    .diff-option input[type="radio"] { display: none; }
    .diff-dot {
      width: 10px; height: 10px; border-radius: 50%;
      border: 1.5px solid var(--border-strong);
      flex-shrink: 0;
      transition: all 0.15s;
    }
    .diff-option.selected .diff-dot { background: var(--teal); border-color: var(--teal); }
    .diff-info { display: flex; flex-direction: column; gap: 1px; }
    .diff-name { font-size: 14px; font-weight: 500; color: var(--text); }
    .diff-desc { font-size: 12px; color: var(--text-muted); }

    .btn {
      height: 42px;
      border-radius: var(--radius-sm);
      border: none;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      font-family: inherit;
    }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary  { background: var(--teal); color: #fff; }
    .btn-secondary { background: transparent; border: 0.5px solid var(--border-strong); color: var(--text); }
    .btn-coral    { background: var(--coral); color: #fff; }

    .invite-box {
      background: var(--bg-secondary);
      border: 0.5px dashed var(--border-strong);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .invite-url { font-size: 12px; color: var(--text-muted); font-family: monospace; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .invite-copy { font-size: 12px; padding: 0 12px; height: 30px; flex-shrink: 0; }

    .waiting-dots { display: flex; align-items: center; justify-content: center; gap: 6px; padding: 1rem 0; }
    .waiting-dots span { width: 8px; height: 8px; border-radius: 50%; background: var(--border-strong); animation: pulse 1.4s ease-in-out infinite; }
    .waiting-dots span:nth-child(2) { animation-delay: 0.2s; }
    .waiting-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse { 0%,80%,100% { opacity:0.3; transform:scale(0.8); } 40% { opacity:1; transform:scale(1); } }

    .error-msg {
      background: rgba(224,75,74,0.15);
      border: 0.5px solid rgba(224,75,74,0.4);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-size: 13px;
      color: #F09595;
      text-align: center;
      display: none;
    }

    /* ── Game ── */
    .scoreboard { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 12px; }

    .player-card {
      padding: 12px 14px;
      border-radius: var(--radius-md);
      border: 1.5px solid var(--border);
      background: var(--bg-card);
      transition: all 0.2s;
    }
    .player-card.active-p1 { border-color: var(--teal); background: var(--teal-light); }
    .player-card.active-p2 { border-color: var(--coral); background: var(--coral-light); }

    .player-name-label { font-size: 12px; font-weight: 500; color: var(--text-muted); margin-bottom: 2px; display: flex; align-items: center; gap: 6px; }
    .player-card.active-p1 .player-name-label { color: #5DCAA5; }
    .player-card.active-p2 .player-name-label { color: #F0997B; }
    .dot-p1 { width: 7px; height: 7px; border-radius: 50%; background: var(--teal); flex-shrink: 0; }
    .dot-p2 { width: 7px; height: 7px; border-radius: 50%; background: var(--coral); flex-shrink: 0; }

    .player-score-val { font-size: 26px; font-weight: 500; color: var(--text); }
    .player-card.active-p1 .player-score-val { color: #5DCAA5; }
    .player-card.active-p2 .player-score-val { color: #F0997B; }

    .player-bombs-val { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
    .player-card.active-p1 .player-bombs-val { color: var(--teal); }
    .player-card.active-p2 .player-bombs-val { color: #D85A30; }

    .turn-info { text-align: center; font-size: 12px; color: var(--text-muted); line-height: 1.5; }
    .turn-info strong { display: block; font-size: 14px; font-weight: 500; color: var(--text); }

    .status-bar { display: flex; align-items: center; justify-content: space-between; font-size: 13px; color: var(--text-muted); }

    .board-wrap {
      background: var(--bg-secondary);
      border-radius: var(--radius-lg);
      padding: 14px;
      border: 0.5px solid var(--border);
      display: grid;
      place-items: center;
    }
    .board { display: inline-grid; gap: 4px; }

    .cell {
      aspect-ratio: 1; border-radius: 5px;
      border: 1.5px solid var(--border-strong);
      background: var(--bg-card);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-weight: 500; transition: background 0.1s, transform 0.1s; user-select: none;
    }
    .cell:hover:not(.revealed) { background: var(--bg-secondary); transform: scale(0.94); }
    .cell.revealed { cursor: default; border: 0.5px solid rgba(255,255,255,0.06); background: var(--bg-secondary); }
    .cell.empty    { border-color: transparent; background: transparent; cursor: default; }
    .cell.bomb-p1  { background: rgba(29,158,117,0.2); border: 1.5px solid var(--teal); cursor: default; }
    .cell.bomb-p2  { background: rgba(153,60,29,0.2);  border: 1.5px solid var(--coral); cursor: default; }
    .cell.bomb-hidden { background: var(--bg-secondary); border: 0.5px solid var(--border); opacity: 0.3; cursor: default; }

    .num-1 { color: #378ADD; } .num-2 { color: #639922; } .num-3 { color: #D85A30; }
    .num-4 { color: #7F77DD; } .num-5 { color: #E24B4A; } .num-6 { color: #1D9E75; }
    .num-7 { color: #EF9F27; } .num-8 { color: #888780; }

    .result-card {
      background: var(--bg-card); border: 0.5px solid var(--border);
      border-radius: var(--radius-lg); padding: 1.5rem;
      text-align: center; display: flex; flex-direction: column; gap: 10px;
    }
    .result-title   { font-size: 18px; font-weight: 500; color: var(--text); }
    .result-subtitle { font-size: 13px; color: var(--text-muted); }
    .result-actions { display: flex; gap: 8px; margin-top: 4px; }
    .result-actions .btn { flex: 1; }
    .reconnecting-bar {
      background: rgba(239,159,39,0.15); border: 0.5px solid rgba(239,159,39,0.4);
      border-radius: var(--radius-sm); padding: 8px 14px;
      font-size: 12px; color: #EF9F27; text-align: center; display: none;
    }
    .reconnecting-bar.visible { display: block; }
  </style>
</head>
<body>
<div class="container">

  <!-- Locale selector -->
  <div class="locale-bar" id="locale-bar">
    <select class="locale-select" id="locale-select" aria-label="Language">
      <option value="pt-BR-x-CE"></option>
      <option value="pt-PT"></option>
      <option value="en"></option>
    </select>
  </div>

  <!-- Screen: Create -->
  <div class="screen active" id="screen-create">
    <div class="logo"><span class="logo-icon">💣</span> <span data-i18n="app_name">Minefield</span></div>
    <div class="card">
      <div class="card-title" data-i18n="create_title"></div>
      <div class="field">
        <label for="create-name" data-i18n="name_label"></label>
        <input type="text" id="create-name" maxlength="20" data-i18n-ph="name_placeholder" />
      </div>
      <div class="field">
        <label data-i18n="difficulty_label"></label>
        <div class="diff-options">
          <label class="diff-option selected" id="opt-easy">
            <input type="radio" name="diff" value="easy" checked />
            <div class="diff-dot"></div>
            <div class="diff-info">
              <span class="diff-name" data-i18n="diff_easy_name"></span>
              <span class="diff-desc" data-i18n="diff_easy_desc"></span>
            </div>
          </label>
          <label class="diff-option" id="opt-medium">
            <input type="radio" name="diff" value="medium" />
            <div class="diff-dot"></div>
            <div class="diff-info">
              <span class="diff-name" data-i18n="diff_medium_name"></span>
              <span class="diff-desc" data-i18n="diff_medium_desc"></span>
            </div>
          </label>
          <label class="diff-option" id="opt-hard">
            <input type="radio" name="diff" value="hard" />
            <div class="diff-dot"></div>
            <div class="diff-info">
              <span class="diff-name" data-i18n="diff_hard_name"></span>
              <span class="diff-desc" data-i18n="diff_hard_desc"></span>
            </div>
          </label>
        </div>
      </div>
      <div id="create-error" class="error-msg"></div>
      <button class="btn btn-primary" id="btn-create" data-i18n="btn_create"></button>
    </div>
  </div>

  <!-- Screen: Waiting -->
  <div class="screen" id="screen-waiting">
    <div class="logo"><span class="logo-icon">💣</span> <span data-i18n="app_name">Minefield</span></div>
    <div class="card">
      <div class="card-title" data-i18n="waiting_title"></div>
      <div class="waiting-dots"><span></span><span></span><span></span></div>
      <div class="field">
        <label data-i18n="invite_label"></label>
        <div class="invite-box">
          <div class="invite-url" id="invite-url"></div>
          <button class="btn btn-secondary invite-copy" id="btn-copy" data-i18n="btn_copy"></button>
        </div>
      </div>
    </div>
  </div>

  <!-- Screen: Join -->
  <div class="screen" id="screen-join">
    <div class="logo"><span class="logo-icon">💣</span> <span data-i18n="app_name">Minefield</span></div>
    <div class="card">
      <div class="card-title" data-i18n="join_title"></div>
      <div id="join-info" style="font-size:13px; color:var(--text-muted); text-align:center;"></div>
      <div class="field">
        <label for="join-name" data-i18n="join_name_label"></label>
        <input type="text" id="join-name" maxlength="20" data-i18n-ph="join_name_ph" />
      </div>
      <div id="join-error" class="error-msg"></div>
      <button class="btn btn-coral" id="btn-join" data-i18n="btn_join"></button>
    </div>
  </div>

  <!-- Screen: Game -->
  <div class="screen" id="screen-game">
    <div class="reconnecting-bar" id="reconnecting-bar" data-i18n="reconnecting"></div>
    <div class="scoreboard">
      <div class="player-card active-p1" id="p1-card">
        <div class="player-name-label"><div class="dot-p1"></div><span id="p1-name">—</span></div>
        <div class="player-score-val" id="p1-score">0</div>
        <div class="player-bombs-val" id="p1-bombs"></div>
      </div>
      <div class="turn-info">
        <strong id="turn-name">—</strong>
        <span id="turn-suffix" data-i18n="turn_suffix"></span>
      </div>
      <div class="player-card" id="p2-card">
        <div class="player-name-label"><div class="dot-p2"></div><span id="p2-name">—</span></div>
        <div class="player-score-val" id="p2-score">0</div>
        <div class="player-bombs-val" id="p2-bombs"></div>
      </div>
    </div>
    <div class="status-bar">
      <span id="bombs-remaining"></span>
      <button class="btn btn-secondary" style="height:32px;font-size:12px;padding:0 12px;" id="btn-leave" data-i18n="btn_leave"></button>
    </div>
    <div class="board-wrap">
      <div class="board" id="board"></div>
    </div>
    <div id="result-area"></div>
  </div>

  <!-- Screen: Error -->
  <div class="screen" id="screen-error">
    <div class="logo"><span class="logo-icon">💣</span> <span data-i18n="app_name">Minefield</span></div>
    <div class="card" style="text-align:center; gap:1.25rem;">
      <div style="font-size:32px;">😕</div>
      <div class="card-title" id="error-title"></div>
      <div style="font-size:13px; color:var(--text-muted);" id="error-desc"></div>
      <button class="btn btn-primary" id="btn-new-room" data-i18n="btn_new_room"></button>
    </div>
  </div>

</div>

<script src="i18n.js" type="module"></script>
<script type="module">
import PartySocket from "https://cdn.jsdelivr.net/npm/partysocket@1.0.2/dist/index.mjs";
import { TRANSLATIONS, LOCALE_FLAGS, LOCALE_LABELS, LOCALE_LANG } from "./i18n.js";

// ── Config ─────────────────────────────────────────────────────────────────
const PARTYKIT_HOST = location.hostname === "localhost" || location.hostname === "127.0.0.1"
  ? location.host
  : "minefield.joselitofilho.partykit.dev";

// ── i18n ───────────────────────────────────────────────────────────────────
const DEFAULT_LOCALE = "pt-BR-x-CE";
let locale = localStorage.getItem("minefield-locale") || DEFAULT_LOCALE;
let t = TRANSLATIONS[locale];

const NAME_STORAGE_KEY = "minefield-name";
function renderLocaleButtons() {
  const sel = document.getElementById("locale-select");
  sel.querySelectorAll("option").forEach(opt => {
    const l = opt.value;
    const label = LOCALE_LABELS[l] || l;
    const flag = LOCALE_FLAGS[l] || "";
    // Note: native <option> rendering varies by OS/browser; emoji is widely supported.
    opt.textContent = `${flag} ${label}`.trim();
  });
  sel.value = locale;
}

function applyLocale(l) {
  locale = l;
  t = TRANSLATIONS[l];
  localStorage.setItem("minefield-locale", l);
  document.documentElement.lang = LOCALE_LANG[l];
  document.title = t.app_name || "Minefield";
  const localeSel = document.getElementById("locale-select");
  if (localeSel) localeSel.setAttribute("aria-label", t.language_label || "Language");
  const sel = localeSel;
  if (sel && sel.value !== l) sel.value = l;

  // Update all data-i18n elements
  document.querySelectorAll("[data-i18n]").forEach(el => {
    const key = el.dataset.i18n;
    if (typeof t[key] === "string") el.textContent = t[key];
  });
  document.querySelectorAll("[data-i18n-ph]").forEach(el => {
    const key = el.dataset.i18nPh;
    if (typeof t[key] === "string") el.placeholder = t[key];
  });

  // Re-render dynamic content if game is active
  if (currentState) renderGame(currentState);
}

document.getElementById("locale-select").addEventListener("change", (e) => {
  applyLocale(e.target.value);
});

// ── State ──────────────────────────────────────────────────────────────────
let socket = null;
let myName = "";
let myPlayerIndex = null;
let currentState = null;
let roomId = "";
let intentionalClose = false;

// ── Helpers ────────────────────────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}
function getRoomIdFromUrl() { return location.hash.replace("#", "") || null; }
function setRoomIdInUrl(id) { location.hash = id; }
function generateRoomId() { return Math.random().toString(36).slice(2, 8); }
function showError(id, msg) { const el = document.getElementById(id); el.textContent = msg; el.style.display = "block"; }
function hideError(id) { document.getElementById(id).style.display = "none"; }
function syncNameInput(inputId) {
  const input = document.getElementById(inputId);
  input.addEventListener("input", () => {
    const value = input.value.trim();
    if (value) localStorage.setItem(NAME_STORAGE_KEY, value);
    else localStorage.removeItem(NAME_STORAGE_KEY);
  });
}
function setErrorScreen(titleKey, descKey) {
  const titleEl = document.getElementById("error-title");
  const descEl = document.getElementById("error-desc");
  titleEl.dataset.i18n = titleKey;
  descEl.dataset.i18n = descKey;
  titleEl.textContent = typeof t[titleKey] === "string" ? t[titleKey] : "";
  descEl.textContent = typeof t[descKey] === "string" ? t[descKey] : "";
}

function syncScreenWithUrl() {
  const savedName = (localStorage.getItem(NAME_STORAGE_KEY) || "").trim();
  const rid = getRoomIdFromUrl();
  if (rid) {
    showScreen("screen-join");
    setupJoinScreen(rid);
    return;
  }
  showScreen("screen-create");
  setupCreateScreen();
  if (savedName) document.getElementById("create-name").value = savedName;
}

// ── Init ───────────────────────────────────────────────────────────────────
function init() {
  renderLocaleButtons();
  applyLocale(locale);
  setupDiffOptions();
  syncNameInput("create-name");
  syncNameInput("join-name");
  syncScreenWithUrl();
}

// ── Create screen ──────────────────────────────────────────────────────────
function setupDiffOptions() {
  document.querySelectorAll(".diff-option").forEach(opt => {
    opt.addEventListener("click", () => {
      document.querySelectorAll(".diff-option").forEach(o => o.classList.remove("selected"));
      opt.classList.add("selected");
      opt.querySelector("input").checked = true;
    });
  });
}

function setupCreateScreen() {
  document.getElementById("btn-create").onclick = () => {
    const name = document.getElementById("create-name").value.trim();
    if (!name) { showError("create-error", t.error_name_required); return; }
    hideError("create-error");
    const diff = document.querySelector("input[name='diff']:checked").value;
    const id = generateRoomId();
    setRoomIdInUrl(id);
    myName = name;
    localStorage.setItem(NAME_STORAGE_KEY, name);
    connectToRoom(id, name, diff);
  };
}

// ── Join screen ────────────────────────────────────────────────────────────
function setupJoinScreen(id) {
  roomId = id;
  const savedName = (localStorage.getItem(NAME_STORAGE_KEY) || "").trim();
  const joinInput = document.getElementById("join-name");
  if (savedName) joinInput.value = savedName;

  const tempSocket = new PartySocket({ host: PARTYKIT_HOST, room: id });
  tempSocket.addEventListener("message", (ev) => {
    const msg = JSON.parse(ev.data);
    if (msg.type === "state") {
      const state = msg.state;
      tempSocket.close();
      if (state.status === "finished") {
        showScreen("screen-error");
        setErrorScreen("error_title_finished", "error_room_finished");
        return;
      }
      if (savedName && (state.players[0]?.name === savedName || state.players[1]?.name === savedName)) {
        myName = savedName;
        connectToRoom(id, savedName, null);
        return;
      }
      if (state.players[0]) {
        const diffDesc = {
          easy:   t.diff_easy_desc,
          medium: t.diff_medium_desc,
          hard:   t.diff_hard_desc,
        };
        document.getElementById("join-info").innerHTML =
          `${t.invited_by} <strong style="color:var(--text)">${state.players[0].name}</strong><br>
           <span style="font-size:12px;">${diffDesc[state.difficulty]}</span>`;
      }
    }
    if (msg.type === "error") {
      tempSocket.close();
      showScreen("screen-error");
      setErrorScreen("error_title_generic", "error_room_not_found");
    }
  });

  document.getElementById("btn-join").onclick = () => {
    const name = document.getElementById("join-name").value.trim();
    if (!name) { showError("join-error", t.error_name_required); return; }
    hideError("join-error");
    myName = name;
    localStorage.setItem(NAME_STORAGE_KEY, name);
    connectToRoom(id, name, null);
  };
}

// ── WebSocket ──────────────────────────────────────────────────────────────
function connectToRoom(id, name, difficulty) {
  roomId = id;
  if (socket) {
    intentionalClose = true;
    socket.close();
  }
  intentionalClose = false;
  socket = new PartySocket({ host: PARTYKIT_HOST, room: id });
  let joinAccepted = false;

  socket.addEventListener("open", () => {
    document.getElementById("reconnecting-bar").classList.remove("visible");
    const msg = difficulty ? { type: "join", name, difficulty } : { type: "join", name };
    socket.send(JSON.stringify(msg));
  });

  socket.addEventListener("message", (ev) => {
    const msg = JSON.parse(ev.data);
    if (msg.type === "state") {
      const state = msg.state;
      if (!joinAccepted) {
        joinAccepted = state.players[0]?.name === name || state.players[1]?.name === name;
      }
      if (joinAccepted) handleState(state);
    }
    if (msg.type === "error") handleServerError(msg.message);
  });

  socket.addEventListener("close", () => {
    if (!intentionalClose) {
      document.getElementById("reconnecting-bar").classList.add("visible");
    }
  });
}

function handleServerError(message) {
  if (socket) {
    intentionalClose = true;
    socket.close();
    socket = null;
  }
  if (message === "room_full") {
    // If we're trying to join via an invite link, keep the user on the join screen
    // so they can type the same name to reclaim their slot (e.g. on another device).
    const rid = getRoomIdFromUrl();
    if (rid) {
      showScreen("screen-join");
      showError("join-error", t.error_room_full);
      return;
    }
    showScreen("screen-error");
    setErrorScreen("error_title_full", "error_room_full");
  } else {
    showScreen("screen-error");
    setErrorScreen("error_title_generic", "error_generic");
  }
}

// ── State ──────────────────────────────────────────────────────────────────
function handleState(state) {
  currentState = state;

  if (myPlayerIndex === null) {
    if (state.players[0]?.name === myName) myPlayerIndex = 0;
    else if (state.players[1]?.name === myName) myPlayerIndex = 1;
  }

  if (state.status === "waiting") {
    showScreen("screen-waiting");
    const url = `${location.origin}${location.pathname}#${roomId}`;
    document.getElementById("invite-url").textContent = url;
    setupCopyButton(url);
    return;
  }

  showScreen("screen-game");
  renderGame(state);
}

// ── Render ─────────────────────────────────────────────────────────────────
function renderGame(state) {
  const p1 = state.players[0];
  const p2 = state.players[1];

  document.getElementById("p1-name").textContent = p1?.name ?? "—";
  document.getElementById("p2-name").textContent = p2?.name ?? "—";
  document.getElementById("p1-score").textContent = p1?.score ?? 0;
  document.getElementById("p2-score").textContent = p2?.score ?? 0;
  document.getElementById("p1-bombs").textContent = t.bomb_count(p1?.bombs ?? 0);
  document.getElementById("p2-bombs").textContent = t.bomb_count(p2?.bombs ?? 0);

  document.getElementById("p1-card").className = "player-card" + (state.currentPlayer === 0 ? " active-p1" : "");
  document.getElementById("p2-card").className = "player-card" + (state.currentPlayer === 1 ? " active-p2" : "");

  const turnPlayer = state.players[state.currentPlayer];
  document.getElementById("turn-name").textContent =
    state.status === "finished" ? "—" : (turnPlayer?.name ?? "—");
  document.getElementById("turn-suffix").textContent =
    state.status === "finished" ? "" : t.turn_suffix;

  const found = (p1?.bombs ?? 0) + (p2?.bombs ?? 0);
  document.getElementById("bombs-remaining").textContent = t.bombs_remaining(state.totalBombs - found);

  renderBoard(state);
  if (state.status === "finished") renderResult(state);
  else document.getElementById("result-area").innerHTML = "";
}

function renderBoard(state) {
  const cols = { easy: 6, medium: 8, hard: 10 }[state.difficulty];
  const rows = state.grid.length;
  const boardEl = document.getElementById("board");
  const cellSize = Math.min(56, Math.floor((600 - (cols - 1) * 4) / cols));
  boardEl.style.gridTemplateColumns = `repeat(${cols}, ${cellSize}px)`;

  if (boardEl.children.length !== rows * cols) {
    boardEl.innerHTML = "";
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const cell = document.createElement("div");
        cell.className = "cell";
        cell.style.width = cellSize + "px";
        cell.style.fontSize = Math.max(11, Math.floor(cellSize * 0.42)) + "px";
        const row = r, col = c;
        cell.addEventListener("click", () => handleCellClick(row, col));
        boardEl.appendChild(cell);
      }
    }
  }

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const cell = boardEl.children[r * cols + c];
      cell.className = "cell";
      cell.textContent = "";
      if (!state.revealed[r][c]) continue;
      if (state.grid[r][c] === -1) {
        const by = state.foundBy[r][c];
        cell.classList.add("revealed", by === 0 ? "bomb-p1" : by === 1 ? "bomb-p2" : "bomb-hidden");
        cell.textContent = "💣";
      } else {
        const v = state.grid[r][c];
        if (v === 0) cell.classList.add("revealed", "empty");
        else { cell.classList.add("revealed", "num-" + v); cell.textContent = v; }
      }
    }
  }
}

function handleCellClick(r, c) {
  if (!currentState || currentState.status !== "playing") return;
  if (currentState.revealed[r][c]) return;
  if (myPlayerIndex !== currentState.currentPlayer) return;
  socket.send(JSON.stringify({ type: "reveal", row: r, col: c }));
}

function renderResult(state) {
  const p1 = state.players[0];
  const p2 = state.players[1];
  let title, subtitle;

  if (!p1 || !p2) {
    title = "—"; subtitle = "";
  } else if (p1.score > p2.score) {
    title = t.result_won(p1.name);
    subtitle = t.result_score(p1.name, p1.bombs, p2.name, p2.bombs);
  } else if (p2.score > p1.score) {
    title = t.result_won(p2.name);
    subtitle = t.result_score(p2.name, p2.bombs, p1.name, p1.bombs);
  } else {
    title = t.result_draw;
    subtitle = t.result_draw_score(p1.bombs);
  }

  document.getElementById("result-area").innerHTML = `
    <div class="result-card">
      <div class="result-title">${title}</div>
      <div class="result-subtitle">${subtitle}</div>
      <div class="result-actions">
        <button class="btn btn-primary" id="btn-rematch">${t.btn_rematch}</button>
        <button class="btn btn-secondary" id="btn-new-game">${t.btn_new_game}</button>
      </div>
    </div>`;

  document.getElementById("btn-rematch").onclick = rematch;
  document.getElementById("btn-new-game").onclick = newRoom;
}

function setupCopyButton(url) {
  const btn = document.getElementById("btn-copy");
  btn.textContent = t.btn_copy;
  btn.onclick = () => {
    navigator.clipboard.writeText(url).then(() => {
      btn.textContent = t.btn_copied;
      setTimeout(() => { btn.textContent = t.btn_copy; }, 2000);
    });
  };
}

function rematch() {
  if (socket) {
    intentionalClose = true;
    socket.close();
  }
  myPlayerIndex = null;
  const prevDiff = currentState?.difficulty ?? "easy";
  currentState = null;
  const id = generateRoomId();
  setRoomIdInUrl(id);
  connectToRoom(id, myName, prevDiff);
}

function leaveRoom() {
  if (socket) {
    intentionalClose = true;
    socket.close();
    socket = null;
  }
  myPlayerIndex = null;
  currentState = null;
  roomId = "";
  document.getElementById("reconnecting-bar").classList.remove("visible");
  location.hash = "";
  showScreen("screen-create");
  setupCreateScreen();
}

function newRoom() {
  if (socket) {
    intentionalClose = true;
    socket.close();
  }
  socket = null;
  myPlayerIndex = null;
  currentState = null;
  myName = "";
  location.hash = "";
  showScreen("screen-create");
  setupCreateScreen();
}

document.getElementById("btn-leave").addEventListener("click", leaveRoom);
document.getElementById("btn-new-room").addEventListener("click", () => {
  location.hash = "";
  showScreen("screen-create");
  setupCreateScreen();
});
window.addEventListener("hashchange", syncScreenWithUrl);

init();
</script>
</body>
</html>
