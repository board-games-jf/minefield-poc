      btn.setAttribute("title", label);
    }

    function setSoundEnabled(nextValue) {
      soundEnabled = !!nextValue;
      localStorage.setItem(SOUND_STORAGE_KEY, soundEnabled ? "1" : "0");
      syncSoundToggleUi();
      if (!soundEnabled) {
        const audioList = [
          fireStickerAudio,
          cryStickerAudio,
          tauntStickerAudio,
          clapStickerAudio,
          trophyStickerAudio,
          boomStickerAudio,
          thinkingStickerAudio,
          oopsStickerAudio,
        ];
        for (const audio of audioList) {
          if (!audio) continue;
          try {
            audio.pause();
            audio.currentTime = 0;
          } catch { }
        }
      }
    }

    function playStickerSound(id) {
      if (!soundEnabled) return;
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if (!Ctx) return;
      if (!audioCtx) audioCtx = new Ctx();
      if (audioCtx.state === "suspended") {
        // Try to resume (may take a tick); play right after it starts.
        audioCtx.resume()
          .then(() => { try { playStickerSound(id); } catch { } })
          .catch(() => { });
        return;
      }

      const t0 = audioCtx.currentTime + 0.005;

      function playSample(audioRef, src, clip, stopTimer) {
        let audio = audioRef;
        if (!audio) {
          audio = new Audio(src + `?v=${encodeURIComponent(ASSET_VERSION)}`);
          audio.preload = "auto";
          audio.crossOrigin = "anonymous";
        }
        clearTimeout(stopTimer);
        try {
          audio.pause();
          audio.currentTime = clip.start;
          audio.volume = 0.9;
          const maybePromise = audio.play();
          if (maybePromise && typeof maybePromise.catch === "function") {
            maybePromise.catch(() => { });
          }
          const nextStopTimer = window.setTimeout(() => {
            try {
              audio.pause();
              audio.currentTime = clip.start;
            } catch { }
          }, Math.max(100, (clip.end - clip.start) * 1000));
          return { audio, stopTimer: nextStopTimer };
        } catch {
          return null;
        }
      }

      function playFireSample() {
        const result = playSample(fireStickerAudio, "./sticker-fire.wav", FIRE_STICKER_CLIP, fireStickerStopTimer);
        if (!result) return false;
        fireStickerAudio = result.audio;
        fireStickerStopTimer = result.stopTimer;
        return true;
      }

      function playCrySample() {
        const result = playSample(cryStickerAudio, "./sticker-cry.wav", CRY_STICKER_CLIP, cryStickerStopTimer);
        if (!result) return false;
        cryStickerAudio = result.audio;
        cryStickerStopTimer = result.stopTimer;
        return true;
      }

      function playTauntSample() {
        const result = playSample(tauntStickerAudio, "./sticker-taunt.wav", TAUNT_STICKER_CLIP, tauntStickerStopTimer);
        if (!result) return false;
        tauntStickerAudio = result.audio;
        tauntStickerStopTimer = result.stopTimer;
        return true;
      }

      function playClapSample() {
        const result = playSample(clapStickerAudio, "./sticker-clap.wav", CLAP_STICKER_CLIP, clapStickerStopTimer);
        if (!result) return false;
        clapStickerAudio = result.audio;
        clapStickerStopTimer = result.stopTimer;
        return true;
      }

      function playTrophySample() {
        const result = playSample(trophyStickerAudio, "./sticker-trophy.wav", TROPHY_STICKER_CLIP, trophyStickerStopTimer);
        if (!result) return false;
        trophyStickerAudio = result.audio;
        trophyStickerStopTimer = result.stopTimer;
        return true;
      }

      function playBoomSample() {
        const result = playSample(boomStickerAudio, "./sticker-boom.wav", BOOM_STICKER_CLIP, boomStickerStopTimer);
        if (!result) return false;
        boomStickerAudio = result.audio;
        boomStickerStopTimer = result.stopTimer;
        return true;
      }

      function playThinkingSample() {
        const result = playSample(thinkingStickerAudio, "./sticker-thinking.wav", THINKING_STICKER_CLIP, thinkingStickerStopTimer);
        if (!result) return false;
        thinkingStickerAudio = result.audio;
        thinkingStickerStopTimer = result.stopTimer;
        return true;
      }

      function playOopsSample() {
        const result = playSample(oopsStickerAudio, "./sticker-oops.wav", OOPS_STICKER_CLIP, oopsStickerStopTimer);
        if (!result) return false;
        oopsStickerAudio = result.audio;
        oopsStickerStopTimer = result.stopTimer;
        return true;
      }

      function tone({ type = "sine", f1 = 440, f2 = f1, dur = 0.12, gain = 0.18, attack = 0.01, start = t0, destination = null } = {}) {
        const g = audioCtx.createGain();
        g.gain.setValueAtTime(0.0001, start);
        g.gain.linearRampToValueAtTime(gain, start + attack);
        g.gain.exponentialRampToValueAtTime(0.0001, start + dur);
        g.connect(destination || audioCtx.destination);

        const o = audioCtx.createOscillator();
        o.type = type;
        o.frequency.setValueAtTime(f1, start);
        o.frequency.linearRampToValueAtTime(f2, start + dur);
        o.connect(g);
        o.start(start);
        o.stop(start + dur + 0.02);
        return { osc: o, gain: g };
      }

      function noiseBurst({ dur = 0.08, gain = 0.14, band = null, start = t0, lowpass = null, highpass = null } = {}) {
        const len = Math.floor(audioCtx.sampleRate * dur);
        const buf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
        const data = buf.getChannelData(0);
        for (let i = 0; i < len; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 2);
        const src = audioCtx.createBufferSource();
        src.buffer = buf;

        const g = audioCtx.createGain();
        g.gain.setValueAtTime(gain, start);
        g.gain.exponentialRampToValueAtTime(0.0001, start + dur);

        let node = src;
        if (highpass) {
          const hp = audioCtx.createBiquadFilter();
          hp.type = "highpass";
          hp.frequency.setValueAtTime(highpass, start);
          node.connect(hp);
          node = hp;
        }
        if (lowpass) {
          const lp = audioCtx.createBiquadFilter();
          lp.type = "lowpass";
          lp.frequency.setValueAtTime(lowpass, start);
          node.connect(lp);
          node = lp;
        }
        if (band) {
          const bp = audioCtx.createBiquadFilter();
          bp.type = "bandpass";
          bp.frequency.setValueAtTime(band, start);
          bp.Q.setValueAtTime(0.9, start);
          node.connect(bp);
          node = bp;
        }
        node.connect(g);
        g.connect(audioCtx.destination);
        src.start(start);
        src.stop(start + dur + 0.01);
      }

      function fire() {
        // Base flame bed: airy broadband noise shaped like a short torch burst.
        noiseBurst({ dur: 0.42, gain: 0.11, highpass: 260, lowpass: 5200 });
        // Mid hiss layer for the "fsshh" body.
        noiseBurst({ dur: 0.32, gain: 0.06, band: 1850, start: t0 + 0.012 });
        // Low rumble to avoid sounding too thin.
        tone({ type: "triangle", f1: 150, f2: 92, dur: 0.34, gain: 0.022, attack: 0.03 });
        // Irregular crackles so it feels like flame, not a synth sweep.
        noiseBurst({ dur: 0.028, gain: 0.09, band: 2900, start: t0 + 0.042 });
        noiseBurst({ dur: 0.020, gain: 0.07, band: 3500, start: t0 + 0.094 });
        noiseBurst({ dur: 0.032, gain: 0.08, band: 2400, start: t0 + 0.148 });
        noiseBurst({ dur: 0.018, gain: 0.06, band: 3900, start: t0 + 0.218 });
        noiseBurst({ dur: 0.026, gain: 0.065, band: 2800, start: t0 + 0.274 });
      }

      function cry() {
        const sob = tone({ type: "sine", f1: 460, f2: 210, dur: 0.34, gain: 0.13, attack: 0.018 });
        const wobble = audioCtx.createOscillator();
        wobble.type = "sine";
        wobble.frequency.setValueAtTime(6.2, t0);
        const wobbleGain = audioCtx.createGain();
        wobbleGain.gain.setValueAtTime(24, t0);
        wobble.connect(wobbleGain);
        wobbleGain.connect(sob.osc.frequency);
        wobble.start(t0);
        wobble.stop(t0 + 0.34);
        tone({ type: "triangle", f1: 320, f2: 180, dur: 0.18, gain: 0.05, start: t0 + 0.09 });
        noiseBurst({ dur: 0.11, gain: 0.045, band: 1300, start: t0 + 0.04 });
      }

      function laugh() {
        const pulses = [
          { dt: 0.00, f1: 620, f2: 420, band: 1100 },
          { dt: 0.09, f1: 660, f2: 460, band: 1200 },
          { dt: 0.19, f1: 580, f2: 380, band: 980 },
        ];
        for (const p of pulses) {
          const tt = t0 + p.dt;
          const band = audioCtx.createBiquadFilter();
          band.type = "bandpass";
          band.frequency.setValueAtTime(p.band, tt);
          band.Q.setValueAtTime(1.3, tt);
          band.connect(audioCtx.destination);
          tone({ type: "sawtooth", f1: p.f1, f2: p.f2, dur: 0.08, gain: 0.12, attack: 0.005, start: tt, destination: band });
          tone({ type: "square", f1: p.f1 * 0.5, f2: p.f2 * 0.5, dur: 0.075, gain: 0.045, attack: 0.004, start: tt + 0.002, destination: band });
        }
      }

      function clap() {
        noiseBurst({ dur: 0.045, gain: 0.14, band: 1800 });
        noiseBurst({ dur: 0.05, gain: 0.12, band: 2400, start: t0 + 0.055 });
        tone({ type: "triangle", f1: 900, f2: 760, dur: 0.045, gain: 0.03, start: t0 + 0.01 });
      }

      function trophy() {
        tone({ type: "triangle", f1: 660, f2: 880, dur: 0.11, gain: 0.12 });
        tone({ type: "triangle", f1: 880, f2: 1180, dur: 0.12, gain: 0.11, start: t0 + 0.09 });
        tone({ type: "sine", f1: 990, f2: 1320, dur: 0.16, gain: 0.09, start: t0 + 0.18 });
      }

      if (id === "nice") {
        if (playFireSample()) return;
        return fire();
      }
      if (id === "cry") {
        if (playCrySample()) return;
        return cry();
      }
      if (id === "taunt") {
        if (playTauntSample()) return;
        return laugh();
      }
      if (id === "clap") {
        if (playClapSample()) return;
        return clap();
      }
      if (id === "boom") {
        if (playBoomSample()) return;
        tone({ type: "sawtooth", f1: 150, f2: 55, dur: 0.20, gain: 0.13, attack: 0.008 });
        noiseBurst({ dur: 0.12, gain: 0.18, band: 260 });
        noiseBurst({ dur: 0.18, gain: 0.08, lowpass: 420, start: t0 + 0.015 });
        return;
      }
      if (id === "gg") {
        tone({ type: "square", f1: 680, f2: 860, dur: 0.10, gain: 0.10 });
        tone({ type: "triangle", f1: 1020, f2: 1240, dur: 0.09, gain: 0.06, start: t0 + 0.06 });
        return;
      }
      if (id === "thinking") {
        if (playThinkingSample()) return;
        tone({ type: "sine", f1: 390, f2: 315, dur: 0.12, gain: 0.08 });
        tone({ type: "sine", f1: 315, f2: 270, dur: 0.10, gain: 0.06, start: t0 + 0.11 });
        return;
      }
      if (id === "oops") {
        if (playOopsSample()) return;
        tone({ type: "triangle", f1: 560, f2: 360, dur: 0.17, gain: 0.11 });
        tone({ type: "sine", f1: 260, f2: 220, dur: 0.09, gain: 0.05, start: t0 + 0.06 });
        return;
      }
      if (id === "sweat") {
        tone({ type: "sine", f1: 250, f2: 300, dur: 0.10, gain: 0.06 });
        tone({ type: "triangle", f1: 420, f2: 330, dur: 0.12, gain: 0.05, start: t0 + 0.08 });
        return;
      }
      if (id === "trophy") {
        if (playTrophySample()) return;
        return trophy();
      }

      tone({ type: "sine", f1: 440, f2: 440, dur: 0.12, gain: 0.10 });
    }

    window.addEventListener("pointerdown", ensureAudioUnlocked, { once: true, passive: true });
    window.addEventListener("keydown", ensureAudioUnlocked, { once: true });
    function getRoomIdFromUrl() { return location.hash.replace("#", "") || null; }
    function setRoomIdInUrl(id) { location.hash = id; }
    function generateRoomId() { return Math.random().toString(36).slice(2, 8); }
    function showError(id, msg) { const el = document.getElementById(id); el.textContent = msg; el.style.display = "block"; }
    function hideError(id) { document.getElementById(id).style.display = "none"; }
    function normalizeNameForCompare(name) {
      // Safari/iOS compatibility: avoid Unicode property escapes like `\p{Diacritic}`.
      return name.trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
    }
    const RESERVED_NAMES = new Set(["EireneBot", "AtenaBot", "ÉrisBot"].map(normalizeNameForCompare));
    function isReservedName(name) { return RESERVED_NAMES.has(normalizeNameForCompare(name)); }
    function isSamePlayerName(a, b) {
      if (!a || !b) return false;
      return normalizeNameForCompare(a) === normalizeNameForCompare(b);
    }
    function syncNameInput(inputId) {
      const input = document.getElementById(inputId);
      input.addEventListener("input", () => {
        const value = input.value.trim();
        if (value) localStorage.setItem(NAME_STORAGE_KEY, value);
        else localStorage.removeItem(NAME_STORAGE_KEY);
      });
    }
    function setErrorScreen(titleKey, descKey) {
      const titleEl = document.getElementById("error-title");
      const descEl = document.getElementById("error-desc");
      titleEl.dataset.i18n = titleKey;
      descEl.dataset.i18n = descKey;
      titleEl.textContent = typeof t[titleKey] === "string" ? t[titleKey] : "";
      descEl.textContent = typeof t[descKey] === "string" ? t[descKey] : "";
    }

    function syncScreenWithUrl() {
      const savedName = (localStorage.getItem(NAME_STORAGE_KEY) || "").trim();
      const rid = getRoomIdFromUrl();
      if (rid) {
        showScreen("screen-join");
        setupJoinScreen(rid);
        return;
      }
      showScreen("screen-create");
      setupCreateScreen();
      if (savedName) document.getElementById("create-name").value = savedName;
    }

    // ── Init ───────────────────────────────────────────────────────────────────
    function init() {
      renderLocaleButtons();
      // If user has no saved preference, pick a sensible default based on browser language.
      if (!localStorage.getItem("minefield-locale")) {
        const detected = detectDefaultLocale();
        localStorage.setItem("minefield-locale", detected);
        locale = detected;
        t = TRANSLATIONS[locale];
      }
      applyLocale(locale);
      syncSoundToggleUi();
      setupDiffOptions();
      syncNameInput("create-name");
      syncNameInput("join-name");
      syncScreenWithUrl();
    }

    // ── Create screen ──────────────────────────────────────────────────────────
    function setupDiffOptions() {
      document.querySelectorAll(".diff-option").forEach(opt => {
        opt.addEventListener("click", () => {
          document.querySelectorAll(".diff-option").forEach(o => o.classList.remove("selected"));
          opt.classList.add("selected");
          opt.querySelector("input").checked = true;
        });
      });
    }

    function setupCreateScreen() {
      const soloRow = document.getElementById("solo-row");
      const toggle = document.getElementById("solo-toggle");
      const aiField = document.getElementById("ai-level-field");
      const setSolo = (on) => {
        toggle.classList.toggle("on", on);
        toggle.setAttribute("aria-checked", on ? "true" : "false");
        aiField.classList.toggle("visible", on);
      };
      const isSolo = () => toggle.classList.contains("on");
      const toggleSolo = () => setSolo(!isSolo());
      // Make the whole row clickable (not just the tiny switch) to avoid missed taps on mobile.
      soloRow.addEventListener("click", toggleSolo);
      toggle.addEventListener("click", (e) => { e.stopPropagation(); toggleSolo(); });
      toggle.addEventListener("keydown", (e) => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); toggleSolo(); } });
      setSolo(false);

      document.getElementById("btn-create").onclick = () => {
        const name = document.getElementById("create-name").value.trim();
        if (!name) { showError("create-error", t.error_name_required); return; }
        if (isReservedName(name)) { showError("create-error", t.error_name_reserved); return; }
        hideError("create-error");
        const diff = document.querySelector("input[name='diff']:checked").value;
        const aiLevel = isSolo() ? document.getElementById("ai-level").value : null;
        const id = generateRoomId();
        setRoomIdInUrl(id);
        myName = name;
        localStorage.setItem(NAME_STORAGE_KEY, name);
        connectToRoom(id, name, diff, aiLevel);
      };
    }

    // ── Join screen ────────────────────────────────────────────────────────────
    function setupJoinScreen(id) {
      roomId = id;
      const savedName = (localStorage.getItem(NAME_STORAGE_KEY) || "").trim();
      const joinInput = document.getElementById("join-name");
      if (savedName) joinInput.value = savedName;

      const tempSocket = new PartySocket({ host: PARTYKIT_HOST, room: id });
      tempSocket.addEventListener("message", (ev) => {
        const msg = JSON.parse(ev.data);
        if (msg.type === "state") {
          const state = msg.state;
          tempSocket.close();
          if (state.status === "finished") {
            showScreen("screen-error");
            setErrorScreen("error_title_finished", "error_room_finished");
            return;
          }
          if (savedName && (state.players[0]?.name === savedName || state.players[1]?.name === savedName)) {
            myName = savedName;
            connectToRoom(id, savedName, null);
            return;
          }
          if (state.players[0]) {
            const diffDesc = {
              easy: t.diff_easy_desc,
              medium: t.diff_medium_desc,
              hard: t.diff_hard_desc,
            };
            document.getElementById("join-info").innerHTML =
              `${t.invited_by} <strong style="color:var(--text)">${state.players[0].name}</strong><br>
           <span style="font-size:12px;">${diffDesc[state.difficulty]}</span>`;
          }
        }
        if (msg.type === "error") {
          tempSocket.close();
          showScreen("screen-error");
          setErrorScreen("error_title_generic", "error_room_not_found");
        }
      });

      document.getElementById("btn-join").onclick = () => {
        const name = document.getElementById("join-name").value.trim();
        if (!name) { showError("join-error", t.error_name_required); return; }
        if (isReservedName(name)) { showError("join-error", t.error_name_reserved); return; }
        hideError("join-error");
        myName = name;
        localStorage.setItem(NAME_STORAGE_KEY, name);
        connectToRoom(id, name, null);
      };
    }

    // ── WebSocket ──────────────────────────────────────────────────────────────
    function connectToRoom(id, name, difficulty, aiLevel) {
      roomId = id;
      if (socket) {
        intentionallyClosedSockets.add(socket);
        socket.close();
      }
      socket = new PartySocket({ host: PARTYKIT_HOST, room: id });
      let joinAccepted = false;
      const thisSocket = socket;

      socket.addEventListener("open", () => {
        document.getElementById("reconnecting-bar").classList.remove("visible");
        const msg = difficulty ? { type: "join", name, difficulty } : { type: "join", name };
        if (aiLevel) msg.ai = { level: aiLevel };
        socket.send(JSON.stringify(msg));
      });

      socket.addEventListener("message", (ev) => {
        const msg = JSON.parse(ev.data);
        if (msg.type === "state") {
          const state = msg.state;
          if (!joinAccepted) {
            joinAccepted = state.players[0]?.name === name || state.players[1]?.name === name;
          }
          if (joinAccepted) {
            document.getElementById("reconnecting-bar").classList.remove("visible");
            handleState(state);
          }
        }
        if (msg.type === "sticker") {
          if (document.hidden || !isGameScreenActive()) enqueueSticker(msg.from, msg.id);
          else showStickerToast(msg.from, msg.id);
        }
        if (msg.type === "error") handleServerError(msg.message);
      });

      socket.addEventListener("close", () => {
        const inGame = document.getElementById("screen-game").classList.contains("active");
        if (inGame && !intentionallyClosedSockets.has(thisSocket)) {
          document.getElementById("reconnecting-bar").classList.add("visible");
        }
      });
    }

    function handleServerError(message) {
      if (socket) {
        intentionallyClosedSockets.add(socket);
        socket.close();
        socket = null;
      }
      if (message === "name_reserved") {
        const rid = getRoomIdFromUrl();
        if (rid) {
          showScreen("screen-join");
          showError("join-error", t.error_name_reserved);
          return;
        }
        showScreen("screen-create");
        showError("create-error", t.error_name_reserved);
        return;
      }
      if (message === "room_full") {
        // If we're trying to join via an invite link, keep the user on the join screen
        // so they can type the same name to reclaim their slot (e.g. on another device).
        const rid = getRoomIdFromUrl();
        if (rid) {
          showScreen("screen-join");
          showError("join-error", t.error_room_full);
          return;
        }
        showScreen("screen-error");
        setErrorScreen("error_title_full", "error_room_full");
      } else {
        showScreen("screen-error");
        setErrorScreen("error_title_generic", "error_generic");
      }
    }

    // ── State ──────────────────────────────────────────────────────────────────
    function handleState(state) {
      currentState = state;

      if (myPlayerIndex === null) {
        if (state.players[0]?.name === myName) myPlayerIndex = 0;
        else if (state.players[1]?.name === myName) myPlayerIndex = 1;
      }

      if (state.status === "waiting") {
        showScreen("screen-waiting");
        const url = `${location.origin}${location.pathname}#${roomId}`;
        document.getElementById("invite-url").textContent = url;
        setupCopyButton(url);
        return;
      }

      showScreen("screen-game");
      renderGame(state);

      if (state.lastClickedCell) {
        lastClickedCell = state.lastClickedCell;
      }

      notifyTurnIfNeeded(state);
      notifyFinishedIfNeeded(state);
    }

    const STICKERS = {
      nice: { emoji: "🔥", key: "sticker_nice" },
      thinking: { emoji: "🤔", key: "sticker_thinking" },
      oops: { emoji: "😅", key: "sticker_oops" },
      boom: { emoji: "💥", key: "sticker_boom" },
      taunt: { emoji: "🤣", key: "sticker_taunt" },
      cry: { emoji: "😭", key: "sticker_cry" },
      clap: { emoji: "👏", key: "sticker_clap" },
      trophy: { emoji: "🏆", key: "sticker_trophy" },
    };

    function syncStickerUi() {
      const launcher = document.getElementById("sticker-launcher");
      if (launcher) {
        const label = t.sticker_launcher_label || "Stickers";
        launcher.setAttribute("title", label);
        launcher.setAttribute("aria-label", label);
      }
      document.querySelectorAll("#sticker-bar .sticker-btn").forEach((btn) => {
        const def = STICKERS[btn.dataset.sticker];
        if (!def) return;
        const text = t[def.key] || def.key;
        btn.setAttribute("title", text);
        btn.setAttribute("aria-label", text);
      });
    }

    function canSendSticker() {
      if (!socket) return false;
      if (!currentState || currentState.status !== "playing") return false;
      if (myPlayerIndex === null) return false;
      return true;
    }

    function sendSticker(id) {
      if (!canSendSticker()) return;
      ensureAudioUnlocked();
      const now = Date.now();
      if (now < stickerLockedUntil) return;
      if (now - lastStickerSentAt < 250) return;
      lastStickerSentAt = now;
      stickerLockedUntil = Math.max(stickerLockedUntil, now + STICKER_DISPLAY_MS);
      socket.send(JSON.stringify({ type: "sticker", id }));
      closeStickerPalette();
    }

    function showStickerToast(from, id) {
      const def = STICKERS[id];
      if (!def) return;
      const toasts = document.getElementById("sticker-toasts");
      // Only one at a time: replace any existing toast.
      toasts.innerHTML = "";
      const el = document.createElement("div");
      el.className = "sticker-toast " + (from === 0 ? "p1" : "p2");
      el.dataset.sticker = id;
      el.innerHTML = `
    <div class="sticker-emoji" aria-hidden="true">${def.emoji}</div>`;
      toasts.appendChild(el);
      stickerLockedUntil = Math.max(stickerLockedUntil, Date.now() + STICKER_DISPLAY_MS);
      ensureAudioUnlocked();
      playStickerSound(id);
      setTimeout(() => { try { el.remove(); } catch { } }, STICKER_DISPLAY_MS);
    }

    function setStickerPaletteOpen(open) {
      const launcher = document.getElementById("sticker-launcher");
      const palette = document.getElementById("sticker-palette");
      if (open) updateStickerPalettePosition();
      launcher.classList.toggle("open", open);
      launcher.setAttribute("aria-expanded", open ? "true" : "false");
      palette.classList.toggle("open", open);
    }

    function closeStickerPalette() {
      setStickerPaletteOpen(false);
    }

    function isGameScreenActive() {
      return document.getElementById("screen-game").classList.contains("active");
    }

    function setStickerBadgeCount(n) {
      const badge = document.getElementById("sticker-badge");
      if (!badge) return;
      const count = Math.max(0, n | 0);
      pendingStickerCount = count;
      if (!count) {
        badge.style.display = "none";
        badge.textContent = "";
        return;
      }
      badge.style.display = "inline-flex";
      badge.textContent = count > 99 ? "99+" : String(count);
    }

    function enqueueSticker(from, id) {
      pendingStickers.push({ from, id });
      if (pendingStickers.length > 25) pendingStickers = pendingStickers.slice(-25);
      setStickerBadgeCount(pendingStickerCount + 1);
    }

    function flushPendingStickers() {
      if (!pendingStickers.length) return;
      const recent = pendingStickers.slice(-1);
      pendingStickers = [];
      setStickerBadgeCount(0);
      const s = recent[0];
      try { showStickerToast(s.from, s.id); } catch { }
    }

    function updateStickerPalettePosition() {
      const launcher = document.getElementById("sticker-launcher");
      const palette = document.getElementById("sticker-palette");
      const rect = launcher.getBoundingClientRect();
      const top = Math.min(window.innerHeight - 24, rect.bottom + 10);
      palette.style.setProperty("--sticker-palette-top", `${top}px`);
    }

    // ── Render ─────────────────────────────────────────────────────────────────
    function renderGame(state) {
      const p1 = state.players[0];
      const p2 = state.players[1];

      document.getElementById("p1-name").textContent = p1?.name ?? "—";
      document.getElementById("p2-name").textContent = p2?.name ?? "—";
      document.getElementById("p1-score").textContent = p1?.score ?? 0;
      document.getElementById("p2-score").textContent = p2?.score ?? 0;
      document.getElementById("p1-bombs").textContent = t.bomb_count(p1?.bombs ?? 0);
      document.getElementById("p2-bombs").textContent = t.bomb_count(p2?.bombs ?? 0);

      document.getElementById("p1-card").className = "player-card" + (state.currentPlayer === 0 ? " active-p1" : "");
      document.getElementById("p2-card").className = "player-card" + (state.currentPlayer === 1 ? " active-p2" : "");

      const turnPlayer = state.players[state.currentPlayer];
      let turnName, turnSuffix;

      function truncateName(name, maxLength = 10) {
        if (name.length > maxLength) {
          return name.substring(0, maxLength) + "...";
        }
        return name;
      }

      if (state.status === "finished") {
        const p1 = state.players[0];
        const p2 = state.players[1];

        if (!p1 || !p2) {
          turnName = "—";
          turnSuffix = "";
        } else if (p1.score > p2.score) {
          turnName = truncateName(p1.name);
          turnSuffix = t.result_won_suffix ?? "venceu";
        } else if (p2.score > p1.score) {
          turnName = truncateName(p2.name);
          turnSuffix = t.result_won_suffix ?? "venceu";
        } else {
          turnName = t.result_draw;
          turnSuffix = "";
        }
      } else {
        turnName = truncateName(turnPlayer?.name ?? "—");
        turnSuffix = t.turn_suffix;
      }

      document.getElementById("turn-name").textContent = turnName;
      document.getElementById("turn-suffix").textContent = turnSuffix;

      const found = (p1?.bombs ?? 0) + (p2?.bombs ?? 0);
      document.getElementById("bombs-remaining").textContent = t.bombs_remaining(state.totalBombs - found);

      renderBoard(state);
      if (state.status === "finished") renderResult(state);
      else document.getElementById("result-area").innerHTML = "";
    }

    function renderBoard(state) {
      const cols = { easy: 6, medium: 8, hard: 10 }[state.difficulty];
      const rows = state.grid.length;
      const boardEl = document.getElementById("board");
      const boardWrap = document.querySelector("#screen-game .board-wrap");

      // Get the actual available height from the max-height CSS property (70vh)
      const maxHeightStyle = getComputedStyle(boardWrap).maxHeight;
      const maxHeightPx = parseFloat(maxHeightStyle) || (window.innerHeight * 0.7);

      const availW = Math.max(240, Math.min(640, document.querySelector(".container").clientWidth) - 28 /* wrap padding */ - 2);
      const availH = maxHeightPx - 28 /* wrap padding */ - 2;
      const cssGap = getComputedStyle(document.documentElement).getPropertyValue("--cell-gap").trim();
      const gap = Number.parseFloat(cssGap) || 4;
      const byW = Math.floor((availW - (cols - 1) * gap) / cols);
      const byH = Math.floor((availH - (rows - 1) * gap) / rows);
      const cellSize = Math.max(28, Math.min(56, byW, byH));
      boardEl.style.gridTemplateColumns = `repeat(${cols}, ${cellSize}px)`;

      if (boardEl.children.length !== rows * cols) {
        boardEl.innerHTML = "";
        for (let r = 0; r < rows; r++) {
          for (let c = 0; c < cols; c++) {
            const cell = document.createElement("div");
            cell.className = "cell";
            const row = r, col = c;
            cell.addEventListener("click", () => handleCellClick(row, col));
            boardEl.appendChild(cell);
          }
        }
      }

      // Keep cell sizing responsive even when reusing existing DOM nodes (e.g. rotate phone / resize window).
      const fontSize = Math.max(11, Math.floor(cellSize * 0.42));
      for (const el of boardEl.children) {
        el.style.width = cellSize + "px";
        el.style.fontSize = fontSize + "px";
      }

      // Preserve last clicked cell highlight after re-render
      const lastClickedCellEl = lastClickedCell ? boardEl.children[lastClickedCell.r * cols + lastClickedCell.c] : null;
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const cell = boardEl.children[r * cols + c];
          cell.className = "cell";
          cell.textContent = "";
          // Restore highlight if this is the last clicked cell (from server)
          if (state.lastPlayerClicks?.length > 0) {
            const isInLastPlayerClicks = state.lastPlayerClicks.some(click => click.row === r && click.col === c);
            if (isInLastPlayerClicks) {
              const className = state.lastPlayerClicks[0].playerIndex === 0 ? "last-clicked-p1" : "last-clicked-p2";
              cell.classList.add(className);
            }
          }
          if (!state.revealed[r][c]) continue;
          if (state.grid[r][c] === -1) {
            const by = state.foundBy[r][c];
            cell.classList.add("revealed", by === 0 ? "bomb-p1" : by === 1 ? "bomb-p2" : "bomb-hidden");
            cell.textContent = "💣";
          } else {
            const v = state.grid[r][c];
            if (v === 0) cell.classList.add("revealed", "empty");
            else { cell.classList.add("revealed", "num-" + v); cell.textContent = v; }
          }
        }
      }
    }

    let _resizeRaf = 0;
    let lastClickedCell = null;
    window.addEventListener("resize", () => {
      if (!currentState) return;
      if (_resizeRaf) cancelAnimationFrame(_resizeRaf);
      _resizeRaf = requestAnimationFrame(() => {
        try { renderBoard(currentState); } catch { }
        try { updateStickerPalettePosition(); } catch { }
      });
    });
    window.addEventListener("scroll", () => {
      const palette = document.getElementById("sticker-palette");
      if (!palette.classList.contains("open")) return;
      updateStickerPalettePosition();
    }, { passive: true });

    function handleCellClick(r, c) {
      if (!currentState || currentState.status !== "playing") return;
      if (currentState.revealed[r][c]) return;
      if (myPlayerIndex !== currentState.currentPlayer) return;

      socket.send(JSON.stringify({ type: "reveal", row: r, col: c }));
    }

    function renderResult(state) {
      const p1 = state.players[0];
      const p2 = state.players[1];
      let title, subtitle;

      if (!p1 || !p2) {
        title = "—"; subtitle = "";
      } else if (p1.score > p2.score) {
        title = t.result_won(p1.name);
        subtitle = t.result_score(p1.name, p1.bombs, p2.name, p2.bombs);
      } else if (p2.score > p1.score) {
        title = t.result_won(p2.name);
        subtitle = t.result_score(p2.name, p2.bombs, p1.name, p1.bombs);
      } else {
        title = t.result_draw;
        subtitle = t.result_draw_score(p1.bombs);
      }

      document.getElementById("result-area").innerHTML = `
    <div class="result-card">
      <div class="result-title">${title}</div>
      <div class="result-subtitle">${subtitle}</div>
      <div id="result-ranking"></div>
      <div class="result-actions">
        <button class="btn btn-primary" id="btn-rematch">${t.btn_rematch}</button>
        <button class="btn btn-secondary" id="btn-new-game">${t.btn_new_game}</button>
      </div>
    </div>`;

      document.getElementById("btn-rematch").onclick = rematch;
      document.getElementById("btn-new-game").onclick = newRoom;
      renderResultRankingSummary();

      // Bring the end-of-game summary into view (especially on mobile).
      try {
        setTimeout(() => {
          const el = document.getElementById("result-area");
          if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
        }, 50);
      } catch { }
    }

    async function fetchRankingSnapshot(limit) {
      const activeName = getActivePlayerName();
      const params = new URLSearchParams();
      params.set("limit", String(limit));
      if (activeName) params.set("player", activeName);
      const res = await fetch(`/api/ranking?${params.toString()}`);
      if (!res.ok) throw new Error("ranking_fetch_failed");
      return await res.json();
    }

    function rankingRowHtml(entry, { highlight = false } = {}) {
      const activeName = getActivePlayerName();
      const isMe = isSamePlayerName(entry.name, activeName);
      const youSuffix = isMe ? ` <span class="ranking-you">${t.ranking_you || "(you)"}</span>` : "";
      const points = `${entry.points}`;
      const wins = `${entry.wins} ${t.ranking_wins_label || "wins"}`;
      const pointsLabel = t.ranking_points_label || "points";
      const medal = entry.position === 1 ? "🥇" : entry.position === 2 ? "🥈" : entry.position === 3 ? "🥉" : null;
      const posHtml = medal
        ? `<span class="ranking-medal" aria-hidden="true">${medal}</span>`
        : `<span class="ranking-pos-num">${entry.position}</span>`;
      return `
    <div class="ranking-row${(highlight || isMe) ? " highlight" : ""}">
      <div class="ranking-pos">${posHtml}</div>
      <div class="ranking-main">
        <div class="ranking-name">${entry.name}${youSuffix}</div>
      </div>
      <div class="ranking-meta">
        <div class="ranking-points">${points} ${pointsLabel}</div>
        <div class="ranking-wins">${wins}</div>
      </div>
    </div>`;
    }

    function rankingPlayerCardHtml(entry) {
      const wins = `${entry.wins} ${t.ranking_wins_label || "wins"}`;
      const points = `${entry.points} ${t.ranking_points_label || "points"}`;
      const title = t.ranking_your_position || "Your position";
      return `
    <div class="ranking-player-card">
      <div class="ranking-pos">#${entry.position}</div>
      <div class="ranking-name">${title}</div>
      <div class="ranking-wins">${points} · ${wins}</div>
    </div>`;
    }

    function setRankingModalOpen(open) {
      const modal = document.getElementById("ranking-modal");
      modal.classList.toggle("open", open);
      modal.setAttribute("aria-hidden", open ? "false" : "true");
    }

    async function openRankingModal() {
      setRankingModalOpen(true);
      const activeName = getActivePlayerName();
      const listEl = document.getElementById("ranking-modal-list");
      const playerEl = document.getElementById("ranking-modal-player");
      const divider = document.getElementById("ranking-modal-divider");
      listEl.innerHTML = `<div class="ranking-empty">${t.ranking_empty || "No ranking yet."}</div>`;
      playerEl.innerHTML = "";
      divider.style.display = "none";

      try {
        const snap = await fetchRankingSnapshot(10);
        const top = Array.isArray(snap.top) ? snap.top : [];
        const player = snap.player || null;

        if (!top.length) {
          listEl.innerHTML = `<div class="ranking-empty">${t.ranking_empty || "No ranking yet."}</div>`;
          return;
        }

        listEl.innerHTML = top
          .map((e) => rankingRowHtml(e, { highlight: isSamePlayerName(e.name, activeName) }))
          .join("");

        const inTop = top.some((e) => isSamePlayerName(e.name, activeName));
        if (player && !inTop) {
          divider.style.display = "block";
          playerEl.innerHTML = rankingPlayerCardHtml(player);
        }
      } catch {
        listEl.innerHTML = `<div class="ranking-empty">${t.error_generic || "Error"}</div>`;
      }
    }

    function closeRankingModal() {
      setRankingModalOpen(false);
    }

    async function renderResultRankingSummary() {
      const mount = document.getElementById("result-ranking");
      if (!mount) return;
      mount.innerHTML = "";
      const activeName = getActivePlayerName();
      if (!activeName) return;

      try {
        const snap = await fetchRankingSnapshot(10);
        const top = Array.isArray(snap.top) ? snap.top : [];
        if (!top.length) return;
        const top3 = top.slice(0, 3);
        const player = snap.player || null;
        const inTop3 = top3.some((e) => isSamePlayerName(e.name, activeName));

        const playerCard = (!inTop3 && player) ? `<div class="ranking-divider"></div>${rankingPlayerCardHtml(player)}` : "";
        const top3Html = `
      <div class="ranking-summary">
        <div class="ranking-title" data-i18n="ranking_top3_title">${t.ranking_top3_title || "🏆 Top 3"}</div>
        <div class="ranking-list">
          ${top3.map((e) => rankingRowHtml(e, { highlight: isSamePlayerName(e.name, activeName) })).join("")}
        </div>
        ${playerCard}
      </div>`;

        mount.innerHTML = top3Html;
      } catch {
        // ignore
      }
    }

    function setupCopyButton(url) {
      const btn = document.getElementById("btn-copy");
      btn.textContent = t.btn_copy;
      btn.onclick = () => {
        navigator.clipboard.writeText(url).then(() => {
          btn.textContent = t.btn_copied;
          setTimeout(() => { btn.textContent = t.btn_copy; }, 2000);
        });
      };
    }

    function rematch() {
      if (socket) { intentionallyClosedSockets.add(socket); socket.close(); }
      myPlayerIndex = null;
      const prevDiff = currentState?.difficulty ?? "easy";
      currentState = null;
      const id = generateRoomId();
      setRoomIdInUrl(id);
      connectToRoom(id, myName, prevDiff);
    }

    function leaveRoom() {
      if (socket) {
        intentionallyClosedSockets.add(socket);
        socket.close();
        socket = null;
      }
      myPlayerIndex = null;
      lastTurnPlayerIndex = null;
      currentState = null;
      roomId = "";
      document.getElementById("reconnecting-bar").classList.remove("visible");
      location.hash = "";
      showScreen("screen-create");
      // Reset solo game toggle
      document.getElementById("solo-toggle").classList.remove("on");
      document.getElementById("solo-toggle").setAttribute("aria-checked", "false");
      document.getElementById("ai-level-field").classList.remove("visible");
      setupCreateScreen();
    }

    function newRoom() {
      if (socket) {
        intentionallyClosedSockets.add(socket);
        socket.close();
      }
      socket = null;
      myPlayerIndex = null;
      lastTurnPlayerIndex = null;
      currentState = null;
      myName = "";
      location.hash = "";
      showScreen("screen-create");
      setupCreateScreen();
    }

    document.getElementById("btn-leave").addEventListener("click", leaveRoom);
    document.getElementById("btn-ranking").addEventListener("click", openRankingModal);
    document.getElementById("btn-ranking-close").addEventListener("click", closeRankingModal);
    document.getElementById("ranking-modal").addEventListener("click", (e) => {
      if (e.target.id === "ranking-modal") closeRankingModal();
    });
    document.addEventListener("keydown", (e) => {
      if (e.key !== "Escape") return;
      const modal = document.getElementById("ranking-modal");
      if (modal.classList.contains("open")) closeRankingModal();
    });
    document.getElementById("sound-toggle").addEventListener("click", () => {
      setSoundEnabled(!soundEnabled);
    });
    document.getElementById("btn-new-room").addEventListener("click", () => {
      location.hash = "";
      showScreen("screen-create");
      setupCreateScreen();
    });
    window.addEventListener("hashchange", syncScreenWithUrl);

    document.getElementById("sticker-bar").addEventListener("click", (e) => {
      const btn = e.target.closest(".sticker-btn");
      if (!btn) return;
      sendSticker(btn.dataset.sticker);
    });
    document.getElementById("sticker-launcher").addEventListener("click", () => {
      const palette = document.getElementById("sticker-palette");
      flushPendingStickers();
      setStickerPaletteOpen(!palette.classList.contains("open"));
    });
    document.addEventListener("click", (e) => {
      const palette = document.getElementById("sticker-palette");
      const launcher = document.getElementById("sticker-launcher");
      if (!palette.classList.contains("open")) return;
      if (palette.contains(e.target) || launcher.contains(e.target)) return;
      closeStickerPalette();
    });
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") closeStickerPalette();
    });

    document.addEventListener("visibilitychange", () => {
      if (document.hidden) return;
      if (!isGameScreenActive()) return;
      flushPendingStickers();
    });

    init();
  </script>
</body>

</html>
