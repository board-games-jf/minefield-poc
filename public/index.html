<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minefield</title>
  <style>
    .points-preview {
      background: rgba(29, 158, 117, 0.1);
      border: 0.5px solid rgba(29, 158, 117, 0.3);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-size: 13px;
      color: var(--teal);
      font-weight: 500;
      text-align: center;
      display: none;
    }

    .points-preview.visible {
      display: block;
    }

    .mode-description-card {
      background: rgba(255, 255, 255, 0.03);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.35;
      cursor: pointer;
      user-select: none;
      transition: border-color 0.15s;
    }

    .mode-description-card:hover {
      border-color: var(--border-strong);
    }

    .explosive-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--border-strong);
      transition: background 0.2s;
    }

    .explosive-dot.filled-p1 {
      background: var(--teal);
    }

    .explosive-dot.filled-p2 {
      background: var(--coral);
    }

    /* ── Mode briefing toast ── */
    .mode-briefing-toast {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      background: var(--bg-card);
      border: 0.5px solid var(--border-strong);
      border-radius: var(--radius-md);
      padding: 12px 14px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
      animation: mode-toast-in 0.25s ease forwards;
      position: relative;
      cursor: pointer;
      user-select: none;
    }

    @keyframes mode-toast-in {
      from {
        opacity: 0;
        transform: translateY(-8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .mode-briefing-toast.hide {
      animation: mode-toast-out 0.3s ease forwards;
    }

    @keyframes mode-toast-out {
      to {
        opacity: 0;
        transform: translateY(-6px);
      }
    }

    .mode-briefing-icon {
      font-size: 22px;
      line-height: 1;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .mode-briefing-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .mode-briefing-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }

    .mode-briefing-desc {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.4;
    }

    .mode-briefing-close {
      width: 28px;
      height: 28px;
      border-radius: 999px;
      border: 0.5px solid var(--border);
      background: rgba(255, 255, 255, 0.03);
      color: var(--text);
      font-size: 16px;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .mode-briefing-close:hover {
      border-color: var(--border-strong);
    }

    /* ── Join screen mode card ── */
    .join-mode-card {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 10px 14px;
      background: var(--bg-secondary);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: border-color 0.15s;
      user-select: none;
    }

    .join-mode-card:hover {
      border-color: var(--border-strong);
    }

    .join-mode-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .join-mode-card-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }

    .join-mode-card-icon {
      font-size: 22px;
      line-height: 1;
    }

    .join-mode-card-chevron {
      font-size: 10px;
      color: var(--text-subtle);
      transition: transform 0.2s;
      flex-shrink: 0;
    }

    .join-mode-card.open .join-mode-card-chevron {
      transform: rotate(180deg);
    }

    .join-mode-card-desc {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.4;
    }

    .join-mode-card-hint {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: var(--teal);
      margin-top: 2px;
    }

    .join-mode-card-hint-chevron {
      display: inline-flex;
      align-items: center;
      transition: transform 0.2s;
    }

    .join-mode-card.open .join-mode-card-hint-chevron {
      transform: rotate(180deg);
    }

    .join-mode-card-expand {
      overflow: hidden;
      max-height: 0;
      opacity: 0;
      transition: max-height 0.28s ease, opacity 0.2s ease, margin-top 0.2s;
      margin-top: 0;
    }

    .join-mode-card.open .join-mode-card-expand,
    .mode-description-card.open .join-mode-card-expand {
      max-height: 240px;
      opacity: 1;
      margin-top: 4px;
    }

    .mode-description-card.open .join-mode-card-hint-chevron {
      transform: rotate(180deg);
    }

    /* ── Mode briefing mini-grid ── */
    .mode-preview {
      margin-top: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .mode-preview-grid {
      display: inline-grid;
      grid-template-columns: repeat(4, 26px);
      gap: 3px;
    }

    .mp-cell {
      width: 26px;
      height: 26px;
      border-radius: 4px;
      font-size: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      background: var(--bg-secondary);
      border: 0.5px solid var(--border);
      color: var(--text-muted);
    }

    .mp-cell.hidden {
      background: var(--bg-secondary);
      border-color: var(--border-strong);
    }

    .mp-cell.revealed {
      background: rgba(255, 255, 255, 0.04);
      border-color: transparent;
    }

    /* number colours matching real minesweeper convention */
    .mp-cell.n1 {
      color: #5b9bd5;
    }

    .mp-cell.n2 {
      color: #4caf6e;
    }

    .mp-cell.n3 {
      color: #e05c5c;
    }

    .mp-cell.n4 {
      color: #9b59b6;
    }

    .mp-cell.bomb-p1 {
      background: rgba(29, 158, 117, 0.2);
      border-color: var(--teal);
      color: var(--teal);
    }

    .mp-cell.bomb-p2 {
      background: rgba(153, 60, 29, 0.2);
      border-color: var(--coral);
      color: var(--coral);
    }

    .mp-cell.bomb-coop {
      background: rgba(255, 255, 255, 0.05);
      border-color: var(--border);
      color: var(--text-subtle);
    }

    .mp-cell.bomb-explosive {
      background: rgba(153, 60, 29, 0.25);
      border-color: var(--coral);
      color: var(--coral);
      font-size: 14px;
    }

    .mp-cell.active-turn {
      box-shadow: 0 0 0 1.5px var(--teal);
    }

    .mp-cell.defused {
      background: rgba(32, 178, 140, 0.18);
      border-color: var(--teal);
      color: var(--teal);
      font-size: 14px;
    }

    .mode-preview-caption {
      font-size: 11px;
      color: var(--text-subtle);
      text-align: center;
      line-height: 1.4;
    }

    .mode-preview-scores {
      display: flex;
      gap: 12px;
      font-size: 11px;
    }

    .mode-preview-scores .s1 {
      color: var(--teal);
    }

    .mode-preview-scores .s2 {
      color: var(--coral);
    }

    #mode-briefing-wrap, #defuse-briefing-wrap {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: calc(100% - 2rem);
      max-width: 608px;
      /* 640px container - 2×1rem body padding */
      z-index: 200;
      pointer-events: none;
    }

    #mode-briefing-wrap .mode-briefing-toast,
    #defuse-briefing-wrap .mode-briefing-toast {
      pointer-events: auto;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
    }



    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #1a1a1a;
      --bg-secondary: #242424;
      --bg-card: #2a2a2a;
      --border: rgba(255, 255, 255, 0.1);
      --border-strong: rgba(255, 255, 255, 0.2);
      --text: #f0f0f0;
      --text-muted: #888;
      --text-subtle: #555;
      --teal: #1D9E75;
      --teal-light: rgba(29, 158, 117, 0.15);
      --coral: #993C1D;
      --coral-light: rgba(153, 60, 29, 0.15);
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 12px;
      --cell-gap: 2px;
    }

    html {
      overflow-y: auto;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      min-height: 100dvh;
      padding: 1rem;
      overflow-x: hidden;
      overflow-y: visible;
      display: flex;
      flex-direction: column;
    }

    .container {
      width: 100%;
      max-width: 640px;
      margin: 0 auto;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    /* ── Locale selector ── */
    .locale-bar {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 4px;
      margin-bottom: 1.25rem;
    }

    .locale-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .ranking-btn {
      height: 30px;
      min-width: 30px;
      padding: 0 10px;
      border-radius: 12px;
      border: 0.5px solid var(--border);
      background: var(--bg-secondary);
      color: var(--text);
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
    }

    .ranking-btn:hover {
      border-color: var(--border-strong);
    }

    .locale-select {
      height: 30px;
      padding: 0 10px;
      border-radius: 12px;
      border: 0.5px solid var(--border);
      background: var(--bg-secondary);
      color: var(--text);
      font-size: 11px;
      cursor: pointer;
      font-family: inherit;
      outline: none;
      appearance: none;
    }

    .locale-select:focus {
      border-color: var(--border-strong);
    }

    /* ── Screens ── */
    .screen {
      display: none;
      flex-direction: column;
      gap: 1.5rem;
    }

    .screen.active {
      display: flex;
    }

    .logo {
      text-align: center;
      font-size: 15px;
      font-weight: 500;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .logo-icon {
      font-size: 20px;
    }

    .card {
      background: var(--bg-card);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .card-title {
      font-size: 17px;
      font-weight: 500;
      color: var(--text);
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field label {
      font-size: 13px;
      color: var(--text-muted);
    }

    input[type="text"] {
      height: 40px;
      background: var(--bg-secondary);
      border: 0.5px solid var(--border-strong);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 14px;
      padding: 0 12px;
      outline: none;
      transition: border-color 0.15s;
      width: 100%;
      font-family: inherit;
    }

    input[type="text"]:focus {
      border-color: var(--teal);
    }

    .diff-options {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .diff-option {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: var(--bg-secondary);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: border-color 0.15s;
      user-select: none;
    }

    .diff-option:hover {
      border-color: var(--border-strong);
    }

    .diff-option.selected {
      border-color: var(--teal);
    }

    .diff-option input[type="radio"] {
      display: none;
    }

    .diff-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 1.5px solid var(--border-strong);
      flex-shrink: 0;
      transition: all 0.15s;
    }

    .diff-option.selected .diff-dot {
      background: var(--teal);
      border-color: var(--teal);
    }

    .diff-info {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .diff-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
    }

    .diff-desc {
      font-size: 12px;
      color: var(--text-muted);
    }

    .btn {
      height: 42px;
      border-radius: var(--radius-sm);
      border: none;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      font-family: inherit;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-primary {
      background: var(--teal);
      color: #fff;
    }

    .btn-secondary {
      background: transparent;
      border: 0.5px solid var(--border-strong);
      color: var(--text);
    }

    .btn-coral {
      background: var(--coral);
      color: #fff;
    }

    .invite-box {
      background: var(--bg-secondary);
      border: 0.5px dashed var(--border-strong);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .invite-url {
      font-size: 12px;
      color: var(--text-muted);
      font-family: monospace;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .invite-copy {
      font-size: 12px;
      padding: 0 12px;
      height: 30px;
      flex-shrink: 0;
    }

    .waiting-dots {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 1rem 0;
    }

    .waiting-dots span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--border-strong);
      animation: pulse 1.4s ease-in-out infinite;
    }

    .waiting-dots span:nth-child(2) {
      animation-delay: 0.2s;
    }

    .waiting-dots span:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes pulse {

      0%,
      80%,
      100% {
        opacity: 0.3;
        transform: scale(0.8);
      }

      40% {
        opacity: 1;
        transform: scale(1);
      }
    }

    .error-msg {
      background: rgba(224, 75, 74, 0.15);
      border: 0.5px solid rgba(224, 75, 74, 0.4);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-size: 13px;
      color: #F09595;
      text-align: center;
      display: none;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 12px;
      background: var(--bg-secondary);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-sm);
    }

    .toggle-text {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .toggle-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
    }

    .toggle-hint {
      font-size: 12px;
      color: var(--text-muted);
    }

    .switch {
      width: 44px;
      height: 26px;
      border-radius: 999px;
      border: 0.5px solid var(--border-strong);
      background: var(--bg-card);
      position: relative;
      flex-shrink: 0;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    .switch::after {
      content: "";
      position: absolute;
      top: 3px;
      left: 3px;
      width: 20px;
      height: 20px;
      border-radius: 999px;
      background: #fff;
      transition: transform 0.15s;
    }

    .switch.on {
      background: var(--teal);
      border-color: var(--teal);
    }

    .switch.on::after {
      transform: translateX(18px);
    }

    .ai-level {
      overflow: hidden;
      max-height: 0;
      opacity: 0;
      transition: max-height 0.25s ease, opacity 0.2s ease, margin-top 0.2s;
      margin-top: 0;
    }

    .ai-level.visible {
      max-height: 80px;
      opacity: 1;
      margin-top: 8px;
    }

    /* ── Game ── */
    .scoreboard {
      display: grid;
      /* Keep center column stable so the layout doesn't jump when turn text changes/vanishes. */
      grid-template-columns: 5fr 2fr 5fr;
      align-items: center;
      gap: 12px;
    }

    .player-card {
      padding: 12px 14px;
      border-radius: var(--radius-md);
      border: 1.5px solid var(--border);
      background: var(--bg-card);
      transition: all 0.2s;
    }

    .player-card.active-p1 {
      border-color: var(--teal);
      background: var(--teal-light);
    }

    .player-card.active-p2 {
      border-color: var(--coral);
      background: var(--coral-light);
    }

    .player-name-label {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 2px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .player-card.active-p1 .player-name-label {
      color: #5DCAA5;
    }

    .player-card.active-p2 .player-name-label {
      color: #F0997B;
    }

    .dot-p1 {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--teal);
      flex-shrink: 0;
    }

    .dot-p2 {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--coral);
      flex-shrink: 0;
    }

    .player-score-val {
      font-size: 26px;
      font-weight: 500;
      color: var(--text);
    }

    .player-card.active-p1 .player-score-val {
      color: #5DCAA5;
    }

    .player-card.active-p2 .player-score-val {
      color: #F0997B;
    }

    .player-bombs-val {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 1px;
    }

    .player-card.active-p1 .player-bombs-val {
      color: var(--teal);
    }

    .player-card.active-p2 .player-bombs-val {
      color: #D85A30;
    }

    .turn-info {
      text-align: center;
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.5;
      min-width: 92px;
    }

    .turn-info strong {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
    }

    .status-bar {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      font-size: 13px;
      color: var(--text-muted);
      gap: 4px;
      /* line1 ↔ progress */
    }

    .status-line {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      row-gap: 6px;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 0 14px;
      height: 38px;
      border-radius: 12px;
      border: 0.5px solid var(--border);
      background: var(--bg-secondary);
      font-size: 13px;
      color: var(--text-muted);
      flex-shrink: 0;
      white-space: nowrap;
      transition: border-color 0.15s, color 0.15s;
    }

    #flags-counter:hover .status-pill {
      border-color: var(--border-strong);
      color: var(--text);
    }

    .status-pill.gold {
      border-color: rgba(255, 215, 0, 0.35);
      background: rgba(255, 215, 0, 0.08);
      color: #ffd700;
      font-weight: 600;
    }

    .status-pill.gold.bump {
      animation: pill-bump 0.4s ease;
    }

    @keyframes pill-bump {
      0% {
        transform: scale(1);
      }

      40% {
        transform: scale(1.16);
        background: rgba(255, 215, 0, 0.22);
      }

      100% {
        transform: scale(1);
      }
    }

    .cell-float-pts {
      position: absolute;
      top: -2px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      font-weight: 800;
      color: #ffd700;
      pointer-events: none;
      animation: cell-float-up 0.85s ease forwards;
      z-index: 20;
      text-shadow: 0 1px 4px rgba(0, 0, 0, 0.7);
      white-space: nowrap;
    }

    @keyframes cell-float-up {
      0% {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }

      65% {
        opacity: 1;
        transform: translateX(-50%) translateY(-22px);
      }

      100% {
        opacity: 0;
        transform: translateX(-50%) translateY(-30px);
      }
    }

    .mode-status-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 0 14px;
      height: 38px;
      border-radius: 12px;
      border: 0.5px solid var(--border);
      background: var(--bg-secondary);
      font-size: 13px;
      color: var(--text-muted);
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
      transition: border-color 0.15s, color 0.15s;
      flex-shrink: 0;
    }

    .mode-status-pill:hover {
      border-color: var(--border-strong);
      color: var(--text);
    }

    .coop-mini-progress-row {
      display: none;
      width: 100%;
      padding: 0;
      margin: 0;
      /* spacing handled by status-bar gap + board-row margin */
      justify-content: center;
    }

    .coop-mini-progress-row.visible {
      display: flex;
    }

    .coop-mini-progress {
      width: 100%;
      display: flex;
      align-items: flex-end;
      gap: 6px;
      background: var(--bg-secondary);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 6px 8px;
    }

    .coop-mini-progress-cells {
      flex: 1;
      display: flex;
      flex-wrap: wrap;
      gap: 2px;
    }

    .coop-mini-progress-counter {
      flex-shrink: 0;
      font-size: 11px;
      color: var(--text-subtle);
      white-space: nowrap;
    }

    .coop-mini-cell {
      width: 12px;
      height: 12px;
      border-radius: 3px;
      background: rgba(255, 255, 255, 0.03);
      border: 0.5px solid var(--border);
    }

    .coop-mini-cell.p1 {
      background: rgba(29, 158, 117, 0.75);
      border-color: var(--teal);
      box-shadow: 0 0 8px rgba(29, 158, 117, 0.35), inset 0 0 4px rgba(29, 158, 117, 0.18);
    }

    .coop-mini-cell.p2 {
      background: rgba(153, 60, 29, 0.75);
      border-color: var(--coral);
      box-shadow: 0 0 8px rgba(153, 60, 29, 0.35), inset 0 0 4px rgba(153, 60, 29, 0.18);
    }

    .ft-meter {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      background: transparent;
      border: none;
      border-radius: 0;
      padding: 0;
    }

    .ft-side {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .ft-cells {
      display: flex;
      gap: 10px;
    }

    .ft-divider {
      width: 1px;
      height: 22px;
      background: rgba(255, 255, 255, 0.08);
      flex-shrink: 0;
    }

    .ft-cell {
      width: 16px;
      height: 16px;
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    .ft-cell.p1 {
      border-color: rgba(29, 158, 117, 0.85);
    }

    .ft-cell.p2 {
      border-color: rgba(153, 60, 29, 0.85);
    }

    .ft-cell.filled.p1 {
      background: rgba(29, 158, 117, 0.92);
      border-color: var(--teal);
      box-shadow: 0 0 14px rgba(29, 158, 117, 0.65), inset 0 0 6px rgba(29, 158, 117, 0.22);
    }

    .ft-cell.filled.p2 {
      background: rgba(153, 60, 29, 0.92);
      border-color: var(--coral);
      box-shadow: 0 0 14px rgba(153, 60, 29, 0.65), inset 0 0 6px rgba(153, 60, 29, 0.22);
    }

    .ft-cell.flash {
      animation: ftFlash 600ms ease-in-out infinite;
    }

    @keyframes ftFlash {
      0% {
        transform: scale(1);
        filter: brightness(1);
      }

      50% {
        transform: scale(1.12);
        filter: brightness(1.18);
      }

      100% {
        transform: scale(1);
        filter: brightness(1);
      }
    }

    .status-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .icon-toggle {
      width: 38px;
      height: 38px;
      border-radius: 12px;
      border: 0.5px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.03);
      color: var(--text);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.12s, border-color 0.16s, background 0.16s, box-shadow 0.16s;
    }

    .icon-toggle:hover {
      transform: translateY(-1px);
      border-color: rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.05);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.18);
    }

    .icon-toggle.off {
      color: var(--text-muted);
      background: rgba(255, 255, 255, 0.02);
    }

    .icon-toggle-glyph {
      font-size: 18px;
      line-height: 1;
    }

    .icon-toggle-text {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.2px;
      line-height: 1;
    }

    .board-wrap {
      width: 100%;
      max-width: 100%;
      margin: 0;
      background: var(--bg-secondary);
      border-radius: var(--radius-lg);
      padding: 14px;
      border: 0.5px solid var(--border);
      position: relative;
      overflow-x: auto;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(255, 255, 255, 0.18) transparent;
      max-height: 70vh;
      flex-shrink: 0;
    }

    .board-wrap.round-wipe {
      animation: roundWipe 260ms ease-out;
    }

    @keyframes roundWipe {
      0% {
        opacity: 0.55;
        transform: scale(0.992);
        filter: saturate(0.92);
      }

      100% {
        opacity: 1;
        transform: scale(1);
        filter: saturate(1);
      }
    }

    .round-overlay {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 30;
      border-radius: var(--radius-lg);
      background: radial-gradient(circle at 50% 45%, rgba(0, 0, 0, 0.32), rgba(0, 0, 0, 0) 62%);
    }

    .round-overlay.visible {
      display: flex;
    }

    .round-overlay-text {
      font-weight: 800;
      letter-spacing: 0.6px;
      font-size: 28px;
      color: var(--text);
      text-shadow: 0 14px 28px rgba(0, 0, 0, 0.45);
      transform: translateY(-4px);
    }

    .board-wrap.cooldown-on .board {
      filter: saturate(0.9) brightness(0.9);
    }

    /* Papoco: make the Ready/Go indicator impossible to miss */
    .explosive-global-overlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 9999;
      background: radial-gradient(circle at 50% 45%, rgba(0, 0, 0, 0.48), rgba(0, 0, 0, 0) 62%);
    }

    .explosive-global-overlay.visible {
      display: flex;
    }

    .explosive-global-overlay .explosive-global-text {
      font-weight: 900;
      letter-spacing: 0.8px;
      font-size: 34px;
      color: var(--text);
      text-shadow: 0 18px 38px rgba(0, 0, 0, 0.55);
      transform: translateY(-10px);
    }

    /* Debug badge (kept subtle but visible); removed automatically when not in cooldown */
    .explosive-global-overlay .explosive-debug-badge {
      position: fixed;
      top: 10px;
      left: 10px;
      padding: 6px 8px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.4px;
      border-radius: 10px;
      background: rgba(255, 0, 0, 0.18);
      border: 1px solid rgba(255, 0, 0, 0.35);
      color: rgba(255, 255, 255, 0.92);
      text-shadow: 0 10px 18px rgba(0, 0, 0, 0.55);
    }

    .board-row {
      width: 100%;
      margin-top: 4px;
      /* progress ↔ grid */
    }

    .board-scroll {
      display: flex;
      justify-content: center;
    }

    .board {
      display: inline-grid;
      gap: var(--cell-gap);
    }

    .sticker-launcher-wrap {
      position: relative;
      display: flex;
      justify-content: center;
    }

    .sticker-launcher {
      width: 38px;
      height: 38px;
      border-radius: 12px;
      border: 0.5px solid rgba(255, 255, 255, 0.08);
      background:
        radial-gradient(circle at top left, rgba(224, 75, 74, 0.18), transparent 36%),
        radial-gradient(circle at top right, rgba(29, 158, 117, 0.14), transparent 34%),
        rgba(255, 255, 255, 0.03);
      color: var(--text);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.12s, border-color 0.16s, background 0.16s, box-shadow 0.16s, filter 0.16s;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.16);
      animation: launcherFloat 2.8s ease-in-out infinite;
    }

    .sticker-launcher:hover {
      transform: translateY(-2px) scale(1.04);
      border-color: rgba(255, 255, 255, 0.14);
      box-shadow: 0 14px 28px rgba(0, 0, 0, 0.22);
      filter: saturate(1.12);
    }

    .sticker-launcher.open {
      animation: none;
      transform: translateY(-1px) scale(1.04);
      box-shadow: 0 18px 34px rgba(0, 0, 0, 0.28);
    }

    .sticker-launcher-icon {
      font-size: 22px;
      line-height: 1;
      transform-origin: center;
    }

    .sticker-launcher.open .sticker-launcher-icon {
      animation: launcherPop 180ms ease-out;
    }

    .sticker-badge {
      position: absolute;
      top: -6px;
      right: -6px;
      min-width: 18px;
      height: 18px;
      padding: 0 5px;
      border-radius: 999px;
      background: rgba(224, 75, 74, 0.95);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      display: none;
      align-items: center;
      justify-content: center;
      border: 2px solid rgba(22, 22, 22, 0.92);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.22);
      pointer-events: none;
      font-variant-numeric: tabular-nums;
    }

    .sticker-palette {
      position: fixed;
      top: var(--sticker-palette-top, 0px);
      left: 50%;
      right: auto;
      transform: translate(-50%, 10px) scale(0.96);
      transform-origin: top center;
      width: min(460px, calc(100vw - 40px - env(safe-area-inset-left) - env(safe-area-inset-right)));
      max-height: calc(100vh - var(--sticker-palette-top, 0px) - 24px);
      padding: 14px;
      border-radius: 12px;
      border: 0.5px solid rgba(255, 255, 255, 0.08);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.03)),
        rgba(22, 22, 22, 0.92);
      backdrop-filter: blur(18px);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.16s, transform 0.16s;
      z-index: 20;
      overflow-y: auto;
      overflow-x: hidden;
    }

    .sticker-palette.open {
      opacity: 1;
      pointer-events: auto;
      transform: translate(-50%, 0) scale(1);
    }

    .sticker-palette-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(84px, 1fr));
      gap: 10px;
    }

    .sticker-btn {
      min-height: 74px;
      border-radius: 16px;
      border: 0.5px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.03);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      transition: transform 0.12s, background 0.16s, border-color 0.16s, box-shadow 0.16s, opacity 0.16s;
      user-select: none;
      padding: 8px 6px;
      opacity: 0;
      transform: translateY(10px) scale(0.94);
    }

    .sticker-palette.open .sticker-btn {
      animation: stickerCardIn 220ms cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }

    .sticker-palette.open .sticker-btn:nth-child(1) {
      animation-delay: 0ms;
    }

    .sticker-palette.open .sticker-btn:nth-child(2) {
      animation-delay: 18ms;
    }

    .sticker-palette.open .sticker-btn:nth-child(3) {
      animation-delay: 36ms;
    }

    .sticker-palette.open .sticker-btn:nth-child(4) {
      animation-delay: 54ms;
    }

    .sticker-palette.open .sticker-btn:nth-child(5) {
      animation-delay: 72ms;
    }

    .sticker-palette.open .sticker-btn:nth-child(6) {
      animation-delay: 90ms;
    }

    .sticker-palette.open .sticker-btn:nth-child(7) {
      animation-delay: 108ms;
    }

    .sticker-palette.open .sticker-btn:nth-child(8) {
      animation-delay: 126ms;
    }

    .sticker-btn:hover {
      transform: translateY(-2px) scale(1.02);
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(255, 255, 255, 0.14);
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.18);
    }

    .sticker-btn:active {
      transform: translateY(0) scale(0.98);
    }

    .sticker-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .sticker-btn-emoji {
      font-size: 26px;
      line-height: 1;
      transform-origin: center;
      will-change: transform;
    }

    .sticker-btn[data-sticker="nice"] .sticker-btn-emoji {
      animation: stickerFireBurst 1s ease-in-out infinite;
    }

    .sticker-btn[data-sticker="thinking"] .sticker-btn-emoji {
      animation: stickerThinkBob 1.5s ease-in-out infinite;
    }

    .sticker-btn[data-sticker="oops"] .sticker-btn-emoji {
      animation: stickerOopsTilt 1.2s ease-in-out infinite;
    }

    .sticker-btn[data-sticker="sweat"] .sticker-btn-emoji {
      animation: stickerSweatShake 1.1s ease-in-out infinite;
    }

    .sticker-btn[data-sticker="boom"] .sticker-btn-emoji {
      animation: stickerBoomPop 0.95s ease-in-out infinite;
    }

    .sticker-btn[data-sticker="taunt"] .sticker-btn-emoji {
      animation: stickerTauntSway 1.15s ease-in-out infinite;
    }

    .sticker-btn[data-sticker="cry"] .sticker-btn-emoji {
      animation: stickerCryDrop 1.3s ease-in-out infinite;
    }

    .sticker-btn[data-sticker="clap"] .sticker-btn-emoji {
      animation: stickerClapPulse 0.9s ease-in-out infinite;
    }

    .sticker-btn[data-sticker="trophy"] .sticker-btn-emoji {
      animation: stickerTrophyShine 1.2s ease-in-out infinite;
    }

    .sticker-toasts {
      position: fixed;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
      pointer-events: none;
      z-index: 50;
      width: min(280px, calc(100vw - 32px));
    }

    .sticker-toast {
      width: 100%;
      padding: 13px 15px;
      border-radius: 12px;
      border: 0.5px solid rgba(255, 255, 255, 0.10);
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.08), transparent 38%),
        rgba(18, 18, 18, 0.78);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--text);
      transform: translateY(10px) scale(0.96);
      opacity: 0;
      box-shadow: 0 18px 36px rgba(0, 0, 0, 0.24);
      animation: toastIn 170ms cubic-bezier(0.2, 0.8, 0.2, 1) forwards, toastOut 260ms ease-in forwards;
      animation-delay: 0ms, 1950ms;
    }

    .sticker-toast.p1 {
      border-color: rgba(29, 158, 117, 0.35);
    }

    .sticker-toast.p2 {
      border-color: rgba(224, 75, 74, 0.35);
    }

    .sticker-emoji {
      font-size: 40px;
      line-height: 1;
      transform-origin: center;
    }

    .sticker-toast[data-sticker="nice"] .sticker-emoji {
      animation: stickerFireBurstToast 620ms ease-in-out 2;
    }

    .sticker-toast[data-sticker="thinking"] .sticker-emoji {
      animation: stickerThinkBobToast 760ms ease-in-out 2;
    }

    .sticker-toast[data-sticker="oops"] .sticker-emoji {
      animation: stickerOopsTiltToast 620ms ease-in-out 2;
    }

    .sticker-toast[data-sticker="sweat"] .sticker-emoji {
      animation: stickerSweatShakeToast 680ms ease-in-out 2;
    }

    .sticker-toast[data-sticker="boom"] .sticker-emoji {
      animation: stickerBoomPopToast 580ms ease-in-out 2;
    }

    .sticker-toast[data-sticker="taunt"] .sticker-emoji {
      animation: stickerTauntSwayToast 650ms ease-in-out 2;
    }

    .sticker-toast[data-sticker="cry"] .sticker-emoji {
      animation: stickerCryDropToast 760ms ease-in-out 2;
    }

    .sticker-toast[data-sticker="clap"] .sticker-emoji {
      animation: stickerClapPulseToast 560ms ease-in-out 3;
    }

    .sticker-toast[data-sticker="trophy"] .sticker-emoji {
      animation: stickerTrophyShineToast 700ms ease-in-out 2;
    }

    .sticker-toast {
      justify-content: center;
    }

    .board-wrap::-webkit-scrollbar {
      height: 6px;
    }

    .board-wrap::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.18);
      border-radius: 999px;
    }

    .board-wrap::-webkit-scrollbar-track {
      background: transparent;
    }

    @keyframes toastIn {
      to {
        transform: translateY(0) scale(1);
        opacity: 1;
      }
    }

    @keyframes toastOut {
      to {
        transform: translateY(8px) scale(0.98);
        opacity: 0;
      }
    }

    @keyframes launcherFloat {

      0%,
      100% {
        transform: translateY(0);
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.16);
      }

      50% {
        transform: translateY(-2px);
        box-shadow: 0 14px 28px rgba(0, 0, 0, 0.22);
      }
    }

    @keyframes launcherPop {
      0% {
        transform: scale(0.86);
      }

      65% {
        transform: scale(1.14);
      }

      100% {
        transform: scale(1);
      }
    }

    @keyframes stickerCardIn {
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes stickerEmojiBounce {
      0% {
        transform: scale(0.72) rotate(-10deg);
      }

      55% {
        transform: scale(1.16) rotate(6deg);
      }

      100% {
        transform: scale(1) rotate(0deg);
      }
    }

    @keyframes stickerFlagWave {

      0%,
      100% {
        transform: rotate(-6deg) translateY(0);
      }

      50% {
        transform: rotate(6deg) translateY(-2px);
      }
    }

    @keyframes stickerFireBurst {

      0%,
      100% {
        transform: scale(1) rotate(-4deg);
        filter: saturate(1);
      }

      50% {
        transform: scale(1.16) rotate(4deg);
        filter: saturate(1.3);
      }
    }

    @keyframes stickerThinkBob {

      0%,
      100% {
        transform: translateY(0);
      }

      40% {
        transform: translateY(-3px) rotate(-6deg);
      }

      70% {
        transform: translateY(1px) rotate(3deg);
      }
    }

    @keyframes stickerOopsTilt {

      0%,
      100% {
        transform: rotate(0deg);
      }

      25% {
        transform: rotate(-10deg) scale(1.04);
      }

      75% {
        transform: rotate(10deg) scale(1.04);
      }
    }

    @keyframes stickerSweatShake {

      0%,
      100% {
        transform: translateX(0);
      }

      20% {
        transform: translateX(-2px) rotate(-4deg);
      }

      40% {
        transform: translateX(2px) rotate(4deg);
      }

      60% {
        transform: translateX(-1px);
      }
    }

    @keyframes stickerBoomPop {

      0%,
      100% {
        transform: scale(0.98);
      }

      35% {
        transform: scale(1.22);
      }

      60% {
        transform: scale(0.9);
      }
    }

    @keyframes stickerTauntSway {

      0%,
      100% {
        transform: rotate(0deg) translateY(0);
      }

      30% {
        transform: rotate(-8deg) translateY(-2px);
      }

      70% {
        transform: rotate(8deg) translateY(1px);
      }
    }

    @keyframes stickerCryDrop {

      0%,
      100% {
        transform: translateY(0);
      }

      30% {
        transform: translateY(2px) scale(0.98);
      }

      60% {
        transform: translateY(-2px) scale(1.04);
      }
    }

    @keyframes stickerClapPulse {

      0%,
      100% {
        transform: scale(1);
      }

      40% {
        transform: scale(1.16);
      }

      60% {
        transform: scale(0.92);
      }
    }

    @keyframes stickerTrophyShine {

      0%,
      100% {
        transform: rotate(0deg) scale(1);
        filter: brightness(1);
      }

      45% {
        transform: rotate(-8deg) scale(1.12);
        filter: brightness(1.25);
      }

      70% {
        transform: rotate(8deg) scale(1.04);
      }
    }

    @keyframes stickerFlagWaveToast {

      0%,
      100% {
        transform: scale(1) rotate(-8deg);
      }

      50% {
        transform: scale(1.18) rotate(10deg) translateY(-2px);
      }
    }

    @keyframes stickerFireBurstToast {

      0%,
      100% {
        transform: scale(1);
        filter: saturate(1);
      }

      45% {
        transform: scale(1.28) rotate(8deg);
        filter: saturate(1.5);
      }
    }

    @keyframes stickerThinkBobToast {

      0%,
      100% {
        transform: translateY(0) rotate(0deg);
      }

      50% {
        transform: translateY(-5px) rotate(-10deg) scale(1.14);
      }
    }

    @keyframes stickerOopsTiltToast {

      0%,
      100% {
        transform: rotate(0deg) scale(1);
      }

      35% {
        transform: rotate(-16deg) scale(1.12);
      }

      70% {
        transform: rotate(16deg) scale(1.12);
      }
    }

    @keyframes stickerSweatShakeToast {

      0%,
      100% {
        transform: translateX(0);
      }

      20% {
        transform: translateX(-4px) rotate(-6deg);
      }

      40% {
        transform: translateX(4px) rotate(6deg);
      }

      60% {
        transform: translateX(-2px) scale(1.08);
      }
    }

    @keyframes stickerBoomPopToast {

      0%,
      100% {
        transform: scale(1);
      }

      35% {
        transform: scale(1.35);
      }

      65% {
        transform: scale(0.86);
      }
    }

    @keyframes stickerTauntSwayToast {

      0%,
      100% {
        transform: rotate(0deg);
      }

      30% {
        transform: rotate(-12deg) translateY(-2px) scale(1.08);
      }

      70% {
        transform: rotate(12deg) translateY(1px) scale(1.08);
      }
    }

    @keyframes stickerCryDropToast {

      0%,
      100% {
        transform: translateY(0) scale(1);
      }

      30% {
        transform: translateY(4px) scale(0.96);
      }

      55% {
        transform: translateY(-4px) scale(1.12);
      }
    }

    @keyframes stickerClapPulseToast {

      0%,
      100% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.24) rotate(6deg);
      }
    }

    @keyframes stickerTrophyShineToast {

      0%,
      100% {
        transform: rotate(0deg) scale(1);
        filter: brightness(1);
      }

      45% {
        transform: rotate(-12deg) scale(1.18);
        filter: brightness(1.35);
      }

      70% {
        transform: rotate(12deg) scale(1.08);
      }
    }

    .cell {
      aspect-ratio: 1;
      border-radius: 5px;
      position: relative;
      border: 1.5px solid var(--border-strong);
      background: var(--bg-card);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 500;
      transition: background 0.1s, transform 0.1s;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }

    .cell:hover:not(.revealed) {
      background: var(--bg-secondary);
      transform: scale(0.94);
    }

    .cell.revealed {
      cursor: default;
      border: 0.5px solid rgba(255, 255, 255, 0.06);
      background: var(--bg-secondary);
    }

    .cell.empty {
      border-color: transparent;
      background: transparent;
      cursor: default;
    }

    .cell.bomb-p1 {
      background: rgba(29, 158, 117, 0.2);
      border: 1.5px solid var(--teal);
      cursor: default;
    }

    .cell.bomb-p2 {
      background: rgba(153, 60, 29, 0.2);
      border: 1.5px solid var(--coral);
      cursor: default;
    }

    .cell.bomb-hidden {
      background: var(--bg-secondary);
      border: 0.5px solid var(--border);
      opacity: 0.3;
      cursor: default;
    }

    /* Coop loss — unrevealed bomb */
    .cell.bomb-coop-revealed {
      background: #616161;
      color: #eceff1;
      cursor: default;
    }

    /* Coop loss — flag was on a bomb (correct) */
    .cell.flag-correct-coop {
      position: relative;
    }
    .cell.flag-correct-coop::after {
      content: "✓";
      position: absolute;
      bottom: 4px;
      right: 5px;
      font-size: 11px;
      font-weight: 900;
      color: #ffd700;
      line-height: 1;
      pointer-events: none;
    }

    /* Coop loss — flag was on a safe cell (wrong) */
    .cell.flag-wrong-coop {
      position: relative;
    }
    .cell.flag-wrong-coop::after {
      content: "✕";
      position: absolute;
      bottom: 3px;
      right: 5px;
      font-size: 11px;
      font-weight: 900;
      color: #f87171;
      line-height: 1;
      pointer-events: none;
      text-shadow: 0 1px 4px rgba(0, 0, 0, 0.7);
    }

    .cell.flagged {
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .num-1 {
      color: #378ADD;
    }

    .num-2 {
      color: #639922;
    }

    .num-3 {
      color: #D85A30;
    }

    .num-4 {
      color: #7F77DD;
    }

    .num-5 {
      color: #E24B4A;
    }

    .num-6 {
      color: #1D9E75;
    }

    .num-7 {
      color: #EF9F27;
    }

    .num-8 {
      color: #888780;
    }

    .cell.last-clicked-p1 {
      border: 2.5px solid var(--teal);
      box-shadow: 0 0 14px rgba(29, 158, 117, 0.7), inset 0 0 8px rgba(29, 158, 117, 0.25);
      animation: cellBlinkP1 0.8s ease-in-out infinite;
    }

    .cell.last-clicked-p2 {
      border: 2.5px solid var(--coral);
      box-shadow: 0 0 14px rgba(153, 60, 29, 0.7), inset 0 0 8px rgba(153, 60, 29, 0.25);
      animation: cellBlinkP2 0.8s ease-in-out infinite;
    }

    @keyframes cellBlinkP1 {

      0%,
      100% {
        border-color: var(--teal);
        box-shadow: 0 0 14px rgba(29, 158, 117, 0.7), inset 0 0 8px rgba(29, 158, 117, 0.25);
      }

      50% {
        border-color: rgba(29, 158, 117, 0.5);
        box-shadow: 0 0 8px rgba(29, 158, 117, 0.35), inset 0 0 4px rgba(29, 158, 117, 0.12);
      }
    }

    @keyframes cellBlinkP2 {

      0%,
      100% {
        border-color: var(--coral);
        box-shadow: 0 0 14px rgba(153, 60, 29, 0.7), inset 0 0 8px rgba(153, 60, 29, 0.25);
      }

      50% {
        border-color: rgba(153, 60, 29, 0.5);
        box-shadow: 0 0 8px rgba(153, 60, 29, 0.35), inset 0 0 4px rgba(153, 60, 29, 0.12);
      }
    }

    .result-card {
      background: var(--bg-card);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .result-title {
      font-size: 18px;
      font-weight: 500;
      color: var(--text);
    }

    .result-subtitle {
      font-size: 13px;
      color: var(--text-muted);
    }

    .result-actions {
      display: flex;
      gap: 8px;
      margin-top: 4px;
    }

    .result-actions .btn {
      flex: 1;
    }

    /* Rematch waiting block reuses existing "waiting" styles (dots + invite box). */

    .reconnecting-bar {
      background: rgba(239, 159, 39, 0.15);
      border: 0.5px solid rgba(239, 159, 39, 0.4);
      border-radius: var(--radius-sm);
      padding: 8px 14px;
      font-size: 12px;
      color: #EF9F27;
      text-align: center;
      display: none;
    }

    .reconnecting-bar.visible {
      display: block;
    }

    .ranking-summary,
    .ranking-modal-card {
      background: var(--bg-card);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .ranking-summary {
      margin-top: 14px;
      text-align: left;
    }

    .ranking-title {
      font-size: 17px;
      font-weight: 600;
      color: var(--text);
    }

    .ranking-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .ranking-row,
    .ranking-player-card {
      display: grid;
      grid-template-columns: 56px 1fr auto;
      gap: 12px;
      align-items: center;
      background: rgba(255, 255, 255, 0.02);
      border: 0.5px solid transparent;
      border-radius: var(--radius-md);
      padding: 12px 14px;
    }

    .ranking-row.highlight {
      background: rgba(29, 158, 117, 0.18);
      border: 2px solid var(--teal);
      box-shadow:
        0 10px 24px rgba(0, 0, 0, 0.22),
        inset 0 0 0 1px rgba(29, 158, 117, 0.25);
    }

    .ranking-pos {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .ranking-medal {
      width: 22px;
      text-align: center;
      font-size: 16px;
      line-height: 1;
    }

    .ranking-pos-num {
      font-variant-numeric: tabular-nums;
    }

    .ranking-main {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .ranking-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
    }

    .ranking-you {
      font-size: 12px;
      color: var(--teal);
      font-weight: 600;
    }

    .ranking-meta {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 2px;
      text-align: right;
    }

    .ranking-points {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }

    .ranking-wins {
      font-size: 12px;
      color: var(--text-muted);
      font-variant-numeric: tabular-nums;
    }

    .ranking-divider {
      height: 1px;
      background: rgba(255, 255, 255, 0.08);
      margin: 2px 0;
    }

    .ranking-empty {
      font-size: 13px;
      color: var(--text-muted);
      text-align: center;
      padding: 10px 0;
    }

    .ranking-player-card {
      grid-template-columns: 1fr;
      text-align: center;
      padding: 18px 14px;
    }

    .ranking-player-card .ranking-pos {
      justify-content: center;
      font-size: 34px;
      color: var(--teal);
      font-weight: 800;
    }

    .ranking-player-card .ranking-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
    }

    .ranking-player-card .ranking-wins {
      font-size: 16px;
      color: var(--text);
      font-weight: 600;
    }

    .ranking-modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(5, 5, 5, 0.72);
      backdrop-filter: blur(8px);
      z-index: 80;
    }

    .ranking-modal.open {
      display: flex;
    }

    .ranking-modal-card {
      width: min(680px, calc(100vw - 36px));
      max-height: min(760px, calc(100vh - 36px));
    }

    .ranking-modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .ranking-scroll {
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding-right: 4px;
    }

    .ranking-close {
      width: 34px;
      height: 34px;
      border-radius: 999px;
      border: 0.5px solid var(--border);
      background: rgba(255, 255, 255, 0.03);
      color: var(--text);
      cursor: pointer;
      font-size: 18px;
    }

    .confetti {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 90;
      overflow: hidden;
    }

    .confetti-piece {
      position: absolute;
      top: -20px;
      width: 10px;
      height: 14px;
      border-radius: 3px;
      opacity: 0.95;
      transform: translate3d(0, 0, 0) rotate(0deg);
      animation: confettiFall 1200ms linear forwards;
      will-change: transform, opacity;
    }

    @keyframes confettiFall {
      0% {
        transform: translate3d(var(--x), -20px, 0) rotate(0deg);
        opacity: 0.0;
      }

      8% {
        opacity: 1;
      }

      100% {
        transform: translate3d(calc(var(--x) + var(--dx)), calc(100vh + 40px), 0) rotate(var(--rot));
        opacity: 0.85;
      }
    }

    .end-flash {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 85;
      opacity: 0;
      background: radial-gradient(circle at 50% 40%, rgba(224, 75, 74, 0.18), rgba(0, 0, 0, 0) 60%);
    }

    .end-flash.on {
      animation: endFlash 420ms ease-out forwards;
    }

    @keyframes endFlash {
      0% {
        opacity: 0;
        transform: scale(0.98);
      }

      25% {
        opacity: 1;
        transform: scale(1);
      }

      100% {
        opacity: 0;
        transform: scale(1.02);
      }
    }

    /* ── Defuse screens ── */
    .defuse-mode-toggle {
      display: flex;
      gap: 6px;
    }
    .defuse-mode-btn {
      flex: 1;
      height: 42px;
      border-radius: var(--radius-sm);
      border: 1.5px solid var(--border);
      background: var(--bg-secondary);
      color: var(--text-muted);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      font-family: inherit;
    }
    .defuse-mode-btn.selected {
      border-color: var(--teal);
      color: var(--text);
      background: var(--teal-light);
    }
    .defuse-hud {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 12px 16px;
      background: var(--bg-card);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-md);
    }
    .defuse-hud-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      min-width: 56px;
    }
    .defuse-hud-value {
      font-size: 22px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: var(--text);
      line-height: 1;
    }
    .defuse-hud-label {
      font-size: 10px;
      color: var(--text-subtle);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .defuse-hud-sep {
      width: 1px;
      height: 28px;
      background: var(--border);
    }
    .defuse-action-bar {
      display: flex;
      gap: 8px;
    }
    .defuse-action-btn {
      flex: 1;
      height: 52px;
      border-radius: var(--radius-md);
      border: 1.5px solid var(--border);
      background: var(--bg-secondary);
      color: var(--text-muted);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: border-color 0.15s, color 0.15s, background 0.15s, box-shadow 0.15s;
      font-family: inherit;
    }
    .defuse-action-btn.active {
      border-color: var(--teal);
      color: var(--text);
      background: var(--teal-light);
      box-shadow: 0 0 0 1px var(--teal);
    }
    .defuse-action-btn .dab-icon { font-size: 18px; }
    .defuse-pregame-hint {
      text-align: center;
      font-size: 12px;
      color: var(--text-subtle);
      animation: defuse-hint-pulse 2s ease-in-out infinite;
    }
    @keyframes defuse-hint-pulse {
      0%, 100% { opacity: 0.45; }
      50% { opacity: 1; }
    }
    .defuse-board-wrap {
      width: 100%;
      background: var(--bg-secondary);
      border-radius: var(--radius-lg);
      padding: 12px;
      border: 0.5px solid var(--border);
      overflow: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.18) transparent;
      display: flex;
      justify-content: center;
    }
    .defuse-board {
      display: inline-grid;
      gap: 2px;
    }
    .defuse-cell {
      width: clamp(26px, calc((min(100vw, 640px) - 80px) / 12), 40px);
      height: clamp(26px, calc((min(100vw, 640px) - 80px) / 12), 40px);
      border-radius: 4px;
      background: var(--bg-card);
      border: 0.5px solid var(--border-strong);
      cursor: pointer;
      transition: background 0.1s, border-color 0.1s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      user-select: none;
    }
    .defuse-cell:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.3);
      transform: scale(1.07);
    }
    .defuse-cell.revealed {
      background: rgba(255,255,255,0.04);
      border-color: transparent;
      cursor: default;
      transform: none;
      color: var(--text-muted);
      font-size: 11px;
    }
    .defuse-cell.defused {
      background: rgba(29,158,117,0.18);
      border-color: var(--teal);
      cursor: default;
      transform: none;
      color: var(--teal);
    }
    .defuse-cell.exploded {
      background: rgba(153,60,29,0.22);
      border-color: var(--coral);
      cursor: default;
      transform: none;
      color: var(--coral);
    }

    .defuse-time-float {
      position: fixed;
      font-size: 20px;
      font-weight: 900;
      color: var(--coral);
      pointer-events: none;
      animation: defuse-time-float-up 1s ease forwards;
      z-index: 9999;
      text-shadow: 0 2px 8px rgba(0,0,0,0.7);
      white-space: nowrap;
    }

    @keyframes defuse-time-float-up {
      0%   { opacity: 1; transform: translateY(0) scale(1); }
      20%  { opacity: 1; transform: translateY(-14px) scale(1.2); }
      100% { opacity: 0; transform: translateY(-56px) scale(0.9); }
    }

    @keyframes defuse-board-shake {
      0%,100% { transform: translateX(0); }
      20% { transform: translateX(-5px); }
      40% { transform: translateX(5px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }

    .defuse-board-shake {
      animation: defuse-board-shake 0.35s ease;
    }

    @keyframes defuse-timer-flash {
      0%,100% { color: inherit; }
      30%,70% { color: var(--coral); }
    }

    .defuse-timer-flash {
      animation: defuse-timer-flash 0.6s ease;
    }
    .defuse-top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .defuse-players-strip {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 6px;
      padding: 4px 0;
    }

    .defuse-player-chip {
      display: flex;
      align-items: center;
      gap: 5px;
      background: var(--bg-card);
      border: 0.5px solid var(--border);
      border-radius: 999px;
      padding: 3px 10px 3px 6px;
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
    }

    .defuse-player-chip .chip-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--teal);
      flex-shrink: 0;
      display: none;
    }

    .defuse-player-chip.waiting .chip-dot {
      background: var(--border-strong);
      display: none;
    }

    .defuse-top-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    #screen-defuse-game { gap: 10px; }

    /* ── Mode grid cards ── */
    .mode-grid {
      display: flex;
      gap: 10px;
    }

    .mode-category {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 0;
    }

    .mode-category-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      color: var(--text-subtle);
      padding: 0 2px;
    }

    .mode-cards-row {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .mode-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      padding: 12px 8px;
      background: var(--bg-secondary);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
      user-select: none;
      text-align: center;
      min-height: 74px;
      position: relative;
    }

    .mode-card:hover:not(.mode-card-soon) {
      border-color: var(--border-strong);
      background: var(--bg-card);
    }

    .mode-card:focus-visible {
      outline: 2px solid var(--teal);
      outline-offset: 2px;
    }

    .mode-card.selected {
      border-color: var(--teal);
      background: var(--teal-light);
      box-shadow: 0 0 0 1px var(--teal);
    }

    .mode-card-icon {
      font-size: 22px;
      line-height: 1;
    }

    .mode-card-name {
      font-size: 12px;
      font-weight: 500;
      color: var(--text);
      line-height: 1.2;
    }

    .mode-card-soon {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .mode-card-soon-badge {
      font-size: 10px;
      color: var(--text-subtle);
      display: flex;
      align-items: center;
      gap: 3px;
      line-height: 1;
    }

    .mode-card-soon-badge::before {
      content: "🔒";
      font-size: 10px;
    }

    @media (max-width: 720px) {

      /* On mobile, avoid vertical centering which can interact badly with dynamic viewport height and kill scroll. */
      .container {
        min-height: auto;
        justify-content: flex-start;
      }

      .board-wrap {
        align-self: stretch;
        margin: 0;
      }

      .ranking-row,
      .ranking-player-card {
        grid-template-columns: 42px 1fr;
      }

      .ranking-meta {
        grid-column: 2;
        align-items: flex-start;
        text-align: left;
      }

      .scoreboard {
        grid-template-columns: 5fr 2fr 5fr;
      }
    }
  </style>
</head>

<body>
  <div class="container">

    <!-- Locale selector -->
    <div class="locale-bar" id="locale-bar">
      <div class="locale-actions">
        <button class="ranking-btn" id="btn-ranking" type="button">🏆</button>
        <select class="locale-select" id="locale-select" aria-label="Language">
          <option value="pt-BR-x-CE"></option>
          <option value="pt-PT"></option>
          <option value="en"></option>
        </select>
      </div>
    </div>

    <!-- Screen: Create -->
    <div class="screen active" id="screen-create">

  <script>
    // Auto-refresh on new deploys (prevents users needing a hard refresh).
    // `version.json` is fetched with `no-store` so it always reflects the latest deploy.
    (function () {
      const KEY = "minefield-version";
      const stored = localStorage.getItem(KEY) || "";
      fetch("./version.json", { cache: "no-store" })
        .then(r => r.ok ? r.json() : null)
        .then(data => {
          const v = data && data.version ? String(data.version) : "";
          // Expose for cache-busting imports/assets.
          window.__MF_VERSION__ = v || stored || "dev";
          if (!v || v === stored) return;
          localStorage.setItem(KEY, v);
          // Avoid infinite reload loops if something is wrong with caching.
          const onceKey = KEY + ":reloaded:" + v;
          if (sessionStorage.getItem(onceKey)) return;
          sessionStorage.setItem(onceKey, "1");
          location.reload();
        })
        .catch(() => { window.__MF_VERSION__ = stored || "dev"; });
    })();
  </script>
  <script type="module">
    import PartySocket from "https://cdn.jsdelivr.net/npm/partysocket@1.0.2/dist/index.mjs";
    const ASSET_VERSION = globalThis.__MF_VERSION__ || "dev";
    const { TRANSLATIONS, LOCALE_FLAGS, LOCALE_LABELS, LOCALE_LANG } =
      await import(`./i18n.js?v=${encodeURIComponent(ASSET_VERSION)}`);

    // ── Config ─────────────────────────────────────────────────────────────────
    const PARTYKIT_HOST = location.hostname === "localhost" || location.hostname === "127.0.0.1"
      ? location.host
      : "minefield.joselitofilho.partykit.dev";

    // ── i18n ───────────────────────────────────────────────────────────────────
    const DEFAULT_LOCALE = "pt-BR-x-CE";
    let locale = localStorage.getItem("minefield-locale") || DEFAULT_LOCALE;
    let t = TRANSLATIONS[locale];

    const NAME_STORAGE_KEY = "minefield-name";
    const SOUND_STORAGE_KEY = "minefield-sound-enabled";
    const CREATE_PREFS_STORAGE_KEY = "minefield-create-prefs";
    function detectDefaultLocale() {
      const prefs = (navigator.languages && navigator.languages.length ? navigator.languages : [navigator.language]).filter(Boolean);
      for (const lang of prefs) {
        const l = String(lang).toLowerCase();
        if (l.startsWith("pt-br")) return "pt-BR-x-CE";
        if (l.startsWith("pt")) return "pt-PT";
        if (l.startsWith("en")) return "en";
      }
      return DEFAULT_LOCALE;
    }

    function renderLocaleButtons() {
      const sel = document.getElementById("locale-select");
      sel.querySelectorAll("option").forEach(opt => {
        const l = opt.value;
        const label = LOCALE_LABELS[l] || l;
        const flag = LOCALE_FLAGS[l] || "";
        // Note: native <option> rendering varies by OS/browser; emoji is widely supported.
        opt.textContent = `${flag} ${label}`.trim();
      });
      sel.value = locale;
    }

    function applyLocale(l) {
      locale = l;
      t = TRANSLATIONS[l];
      localStorage.setItem("minefield-locale", l);
      document.documentElement.lang = LOCALE_LANG[l];
      document.title = t.app_name || "Minefield";
      const localeSel = document.getElementById("locale-select");
      if (localeSel) localeSel.setAttribute("aria-label", t.language_label || "Language");
      const sel = localeSel;
      if (sel && sel.value !== l) sel.value = l;

      // Update all data-i18n elements
      document.querySelectorAll("[data-i18n]").forEach(el => {
        const key = el.dataset.i18n;
        if (typeof t[key] === "string") el.textContent = t[key];
      });
      document.querySelectorAll("[data-i18n-ph]").forEach(el => {
        const key = el.dataset.i18nPh;
        if (typeof t[key] === "string") el.placeholder = t[key];
      });
      document.querySelectorAll("[data-i18n-placeholder]").forEach(el => {
        const key = el.dataset.i18nPlaceholder;
        if (typeof t[key] === "string") el.placeholder = t[key];
      });
      const leaveBtn = document.getElementById("btn-leave");
      if (leaveBtn) {
        const label = t.btn_leave || "Leave";
        leaveBtn.setAttribute("aria-label", label);
        leaveBtn.setAttribute("title", label);
      }
      const rankBtn = document.getElementById("btn-ranking");

    function notifyTurnIfNeeded(state) {
      if (!state || state.status !== "playing") return;
      if (myPlayerIndex === null) return;
      if (state.currentPlayer !== myPlayerIndex) { lastTurnPlayerIndex = state.currentPlayer; return; }
      // Only notify on transition into "your turn".
      if (lastTurnPlayerIndex === myPlayerIndex) return;
      lastTurnPlayerIndex = myPlayerIndex;

      // Dedupe within the same game state: use a stable key.
      const key = `${roomId}:${state.status}:${state.currentPlayer}:${state.players?.[0]?.score ?? 0}:${state.players?.[1]?.score ?? 0}:${state.players?.[0]?.bombs ?? 0}:${state.players?.[1]?.bombs ?? 0}`;
      if (key === lastNotifiedTurnKey) return;
      lastNotifiedTurnKey = key;

      if (!soundEnabled) return;
      ensureAudioUnlocked();

      // Delay to allow AudioContext to transition from suspended to running state
      setTimeout(() => {
        try {
          if (!audioCtx) {
            const Ctx = window.AudioContext || window.webkitAudioContext;
            if (Ctx) audioCtx = new Ctx();
          }
          if (!audioCtx) return;

          // Try to resume if suspended
          if (audioCtx.state === "suspended") {
            audioCtx.resume().catch(() => { });
            return;
          }

          if (audioCtx.state !== "running") return;

          const t0 = audioCtx.currentTime + 0.01;

          // Victory chime - three ascending tones
          function beep(freq, start, dur) {
            const g = audioCtx.createGain();
            g.gain.setValueAtTime(0.15, start);
            g.gain.exponentialRampToValueAtTime(0.001, start + dur);
            g.connect(audioCtx.destination);
            const o = audioCtx.createOscillator();
            o.type = "sine";
            o.frequency.setValueAtTime(freq, start);
            o.connect(g);
            o.start(start);
            o.stop(start + dur);
          }

          beep(523, t0, 0.15);
          beep(659, t0 + 0.1, 0.15);
          beep(783, t0 + 0.2, 0.25);
        } catch { }
      }, 50);
    }

    function playStickerSound(id) {
      if (!soundEnabled) return;
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if (!Ctx) return;
      if (!audioCtx) audioCtx = new Ctx();
      if (audioCtx.state === "suspended") {
        // Try to resume (may take a tick); play right after it starts.
        audioCtx.resume()
          .then(() => { try { playStickerSound(id); } catch { } })
          .catch(() => { });
        return;
      }

      const t0 = audioCtx.currentTime + 0.005;

      function playSample(audioRef, src, clip, stopTimer) {
        let audio = audioRef;
        if (!audio) {
          audio = new Audio(src + `?v=${encodeURIComponent(ASSET_VERSION)}`);
          audio.preload = "auto";
          audio.crossOrigin = "anonymous";
        }
        clearTimeout(stopTimer);
        try {
          audio.pause();
          audio.currentTime = clip.start;
          audio.volume = 0.9;
          const maybePromise = audio.play();
          if (maybePromise && typeof maybePromise.catch === "function") {
            maybePromise.catch(() => { });
          }
          const nextStopTimer = window.setTimeout(() => {
            try {
              audio.pause();
              audio.currentTime = clip.start;
            } catch { }
          }, Math.max(100, (clip.end - clip.start) * 1000));
          return { audio, stopTimer: nextStopTimer };
        } catch {
          return null;
        }
      }

      function playFireSample() {

        if (!result) return false;

      function tone({ type = "sine", f1 = 440, f2 = f1, dur = 0.12, gain = 0.18, attack = 0.01, start = t0, destination = null } = {}) {
        const g = audioCtx.createGain();
        g.gain.setValueAtTime(0.0001, start);
        g.gain.linearRampToValueAtTime(gain, start + attack);
        g.gain.exponentialRampToValueAtTime(0.0001, start + dur);
        g.connect(destination || audioCtx.destination);

        const o = audioCtx.createOscillator();
        o.type = type;
        o.frequency.setValueAtTime(f1, start);
        o.frequency.linearRampToValueAtTime(f2, start + dur);
        o.connect(g);
        o.start(start);
        o.stop(start + dur + 0.02);
        return { osc: o, gain: g };
      }

      function noiseBurst({ dur = 0.08, gain = 0.14, band = null, start = t0, lowpass = null, highpass = null } = {}) {
        const len = Math.floor(audioCtx.sampleRate * dur);
        const buf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
        const data = buf.getChannelData(0);
        for (let i = 0; i < len; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 2);
        const src = audioCtx.createBufferSource();
        src.buffer = buf;

        const g = audioCtx.createGain();
        g.gain.setValueAtTime(gain, start);
        g.gain.exponentialRampToValueAtTime(0.0001, start + dur);

        let node = src;
        if (highpass) {
          const hp = audioCtx.createBiquadFilter();
          hp.type = "highpass";
          hp.frequency.setValueAtTime(highpass, start);
          node.connect(hp);
          node = hp;
        }
        if (lowpass) {
          const lp = audioCtx.createBiquadFilter();
          lp.type = "lowpass";
          lp.frequency.setValueAtTime(lowpass, start);
          node.connect(lp);
          node = lp;
        }
        if (band) {
          const bp = audioCtx.createBiquadFilter();
          bp.type = "bandpass";
          bp.frequency.setValueAtTime(band, start);
          bp.Q.setValueAtTime(0.9, start);
          node.connect(bp);
          node = bp;
        }
        node.connect(g);
        g.connect(audioCtx.destination);
        src.start(start);
        src.stop(start + dur + 0.01);
      }

      function fire() {
        // Base flame bed: airy broadband noise shaped like a short torch burst.
        noiseBurst({ dur: 0.42, gain: 0.11, highpass: 260, lowpass: 5200 });
        // Mid hiss layer for the "fsshh" body.
        noiseBurst({ dur: 0.32, gain: 0.06, band: 1850, start: t0 + 0.012 });
        // Low rumble to avoid sounding too thin.
        tone({ type: "triangle", f1: 150, f2: 92, dur: 0.34, gain: 0.022, attack: 0.03 });
        // Irregular crackles so it feels like flame, not a synth sweep.
        noiseBurst({ dur: 0.028, gain: 0.09, band: 2900, start: t0 + 0.042 });
        noiseBurst({ dur: 0.020, gain: 0.07, band: 3500, start: t0 + 0.094 });
        noiseBurst({ dur: 0.032, gain: 0.08, band: 2400, start: t0 + 0.148 });
        noiseBurst({ dur: 0.018, gain: 0.06, band: 3900, start: t0 + 0.218 });
        noiseBurst({ dur: 0.026, gain: 0.065, band: 2800, start: t0 + 0.274 });
      }

      function cry() {
        const sob = tone({ type: "sine", f1: 460, f2: 210, dur: 0.34, gain: 0.13, attack: 0.018 });
        const wobble = audioCtx.createOscillator();
        wobble.type = "sine";
        wobble.frequency.setValueAtTime(6.2, t0);
        const wobbleGain = audioCtx.createGain();
        wobbleGain.gain.setValueAtTime(24, t0);
        wobble.connect(wobbleGain);
        wobbleGain.connect(sob.osc.frequency);
        wobble.start(t0);
        wobble.stop(t0 + 0.34);
        tone({ type: "triangle", f1: 320, f2: 180, dur: 0.18, gain: 0.05, start: t0 + 0.09 });
        noiseBurst({ dur: 0.11, gain: 0.045, band: 1300, start: t0 + 0.04 });
      }

      function laugh() {
        const pulses = [
          { dt: 0.00, f1: 620, f2: 420, band: 1100 },
          { dt: 0.09, f1: 660, f2: 460, band: 1200 },
          { dt: 0.19, f1: 580, f2: 380, band: 980 },
        ];
        for (const p of pulses) {
          const tt = t0 + p.dt;
          const band = audioCtx.createBiquadFilter();
          band.type = "bandpass";
          band.frequency.setValueAtTime(p.band, tt);
          band.Q.setValueAtTime(1.3, tt);
          band.connect(audioCtx.destination);
          tone({ type: "sawtooth", f1: p.f1, f2: p.f2, dur: 0.08, gain: 0.12, attack: 0.005, start: tt, destination: band });
          tone({ type: "square", f1: p.f1 * 0.5, f2: p.f2 * 0.5, dur: 0.075, gain: 0.045, attack: 0.004, start: tt + 0.002, destination: band });
        }
      }

      function clap() {
        noiseBurst({ dur: 0.045, gain: 0.14, band: 1800 });
        noiseBurst({ dur: 0.05, gain: 0.12, band: 2400, start: t0 + 0.055 });
        tone({ type: "triangle", f1: 900, f2: 760, dur: 0.045, gain: 0.03, start: t0 + 0.01 });
      }

      function trophy() {
        tone({ type: "triangle", f1: 660, f2: 880, dur: 0.11, gain: 0.12 });
        tone({ type: "triangle", f1: 880, f2: 1180, dur: 0.12, gain: 0.11, start: t0 + 0.09 });
        tone({ type: "sine", f1: 990, f2: 1320, dur: 0.16, gain: 0.09, start: t0 + 0.18 });
      }

      if (id === "nice") {
        if (playFireSample()) return;
        return fire();
      }
      if (id === "cry") {
        if (playCrySample()) return;
        return cry();
      }
      if (id === "taunt") {
        if (playTauntSample()) return;
        return laugh();
      }
      if (id === "clap") {
        if (playClapSample()) return;
        return clap();
      }
      if (id === "boom") {
        if (playBoomSample()) return;
        tone({ type: "sawtooth", f1: 150, f2: 55, dur: 0.20, gain: 0.13, attack: 0.008 });
        noiseBurst({ dur: 0.12, gain: 0.18, band: 260 });
        noiseBurst({ dur: 0.18, gain: 0.08, lowpass: 420, start: t0 + 0.015 });
        return;
      }
      if (id === "gg") {
        tone({ type: "square", f1: 680, f2: 860, dur: 0.10, gain: 0.10 });
        tone({ type: "triangle", f1: 1020, f2: 1240, dur: 0.09, gain: 0.06, start: t0 + 0.06 });
        return;
      }
      if (id === "thinking") {
        if (playThinkingSample()) return;
        tone({ type: "sine", f1: 390, f2: 315, dur: 0.12, gain: 0.08 });
        tone({ type: "sine", f1: 315, f2: 270, dur: 0.10, gain: 0.06, start: t0 + 0.11 });
        return;
      }
      if (id === "oops") {
        if (playOopsSample()) return;
        tone({ type: "triangle", f1: 560, f2: 360, dur: 0.17, gain: 0.11 });
        tone({ type: "sine", f1: 260, f2: 220, dur: 0.09, gain: 0.05, start: t0 + 0.06 });
        return;
      }
      if (id === "sweat") {
        tone({ type: "sine", f1: 250, f2: 300, dur: 0.10, gain: 0.06 });
        tone({ type: "triangle", f1: 420, f2: 330, dur: 0.12, gain: 0.05, start: t0 + 0.08 });
        return;
      }
      if (id === "trophy") {
        if (playTrophySample()) return;
        return trophy();
      }

      tone({ type: "sine", f1: 440, f2: 440, dur: 0.12, gain: 0.10 });
    }

    function playBombSound() {
      if (!soundEnabled) return;
      ensureAudioUnlocked();
      try {
        if (!audioCtx) {
          const Ctx = window.AudioContext || window.webkitAudioContext;
          if (Ctx) audioCtx = new Ctx();
        }
        if (!audioCtx) return;

        if (audioCtx.state === "suspended") {
          audioCtx.resume().then(() => playBombSound()).catch(() => { });
          return;
        }

        if (audioCtx.state !== "running") return;

        const t0 = audioCtx.currentTime + 0.005;
        const g = audioCtx.createGain();
        g.gain.setValueAtTime(0.15, t0);
        g.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.25);
        g.connect(audioCtx.destination);

        const o = audioCtx.createOscillator();
        o.type = "sawtooth";
        o.frequency.setValueAtTime(180, t0);
        o.frequency.exponentialRampToValueAtTime(50, t0 + 0.25);
        o.connect(g);
        o.start(t0);
        o.stop(t0 + 0.27);
      } catch (e) {
        console.error("Bomb sound error:", e);
      }
    }

      return name.trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");

    const RESERVED_NAMES = new Set(["EireneBot", "HeraBot", "ÉrisBot", "NêmesisBot", "AtenaBot"].map(normalizeNameForCompare));
    function isReservedName(name) { return RESERVED_NAMES.has(normalizeNameForCompare(name)); }
    function isSamePlayerName(a, b) {

      return normalizeNameForCompare(a) === normalizeNameForCompare(b);
