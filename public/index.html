    function applyCreatePrefs() {
      let prefs = null;
      try { prefs = JSON.parse(localStorage.getItem(CREATE_PREFS_STORAGE_KEY) || "null"); } catch { }
      if (!prefs) return;

      const modeSelect = document.getElementById("mode-select");
      if (modeSelect && typeof prefs.mode === "string") {
        modeSelect.value = prefs.mode;
        document.querySelectorAll(".mode-card").forEach(c => {
          c.classList.toggle("selected", c.dataset.mode === prefs.mode);
        });
        // Restore defuse-specific UI state
        if (prefs.mode === 'defuse') {
          const defuseOpts = document.getElementById('defuse-options');
          if (defuseOpts) defuseOpts.style.display = 'flex';
          const soloRow = document.getElementById('solo-row');
          if (soloRow) soloRow.style.display = 'none';
        } else {
          const defuseOpts = document.getElementById('defuse-options');
          if (defuseOpts) defuseOpts.style.display = 'none';
          const soloRow = document.getElementById('solo-row');
          if (soloRow) soloRow.style.display = '';
        }
      }

      if (prefs.diff === "easy" || prefs.diff === "medium" || prefs.diff === "hard") {
        const radio = document.querySelector(`input[name='diff'][value='${prefs.diff}']`);
        if (radio) {
          radio.checked = true;
          document.querySelectorAll(".diff-option").forEach(o => o.classList.remove("selected"));
          const opt = radio.closest(".diff-option");
          if (opt) opt.classList.add("selected");

      const ftSelect = document.getElementById("ft-select");
      if (ftSelect && (prefs.ft === 2 || prefs.ft === 3 || prefs.ft === 5 || prefs.ft === 10)) {
        ftSelect.value = String(prefs.ft);
      }

      const soloToggle = document.getElementById("solo-toggle");
      if (soloToggle) {
        const on = !!prefs.aiEnabled;
        soloToggle.classList.toggle("on", on);
        soloToggle.setAttribute("aria-checked", on ? "true" : "false");

    function updatePointsPreview() {
      const preview = document.getElementById("points-preview");
      const coopWarning = document.getElementById("coop-ai-warning");
      const ftField = document.getElementById("ft-field");
      if (!preview) return;

      const mode = getSelectedMode();
      const diff = getSelectedDifficulty();
      const isAi = isAiEnabled();
      const ft = Number.parseInt(document.getElementById("ft-select")?.value ?? "5", 10);

      if (ftField) ftField.classList.toggle("visible", mode === "explosive");

      if (mode === 'defuse') {
        if (coopWarning) coopWarning.style.display = "none";
        preview.textContent = t.defuse_hall_of_fame_hint || '🏆 Quem desarmou mais rápido entra no Hall da Fama!';
        preview.classList.add("visible");
        return;
      }

      if (mode === "coop" && isAi) {
        preview.classList.remove("visible");
        if (coopWarning) {
          coopWarning.style.display = "block";
          coopWarning.textContent = t.coop_ai_no_points;
        }
        return;
      }

      if (coopWarning) coopWarning.style.display = "none";

      const pts = mode === "explosive"
        ? (POINTS_TABLE.explosive[ft] ?? 30)
        : (POINTS_TABLE[mode]?.[diff] ?? 0);

      preview.textContent = mode === "explosive"
        ? t.points_preview_explosive(ft, pts)

      if (!soloRow || !toggle) return;

      // Remove old listeners by cloning the row.
      const newSoloRow = soloRow.cloneNode(true);
      soloRow.parentNode.replaceChild(newSoloRow, soloRow);
      const newToggle = newSoloRow.querySelector("#solo-toggle");

      const toggleSolo = () => {
        const nextOn = !newToggle.classList.contains("on");
        newToggle.classList.toggle("on", nextOn);
        newToggle.setAttribute("aria-checked", nextOn ? "true" : "false");
        persistCreatePrefs();
        updatePointsPreview();
      };

      newSoloRow.addEventListener("click", (e) => {
        e.preventDefault();
        toggleSolo();
      });
      newToggle.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          toggleSolo();
        }
      });

      document.querySelectorAll("input[name='diff']").forEach(radio => {
        radio.onchange = updatePointsPreview;
      });

      const refreshCreatePreview = () => {
        updateModeDescription();
        syncSoloCopyForMode();
        persistCreatePrefs();
        updatePointsPreview();
        updateDiffDescs();
      };

      const ftSelect = document.getElementById("ft-select");
      if (ftSelect) {
        ftSelect.onchange = refreshCreatePreview;
        ftSelect.oninput = refreshCreatePreview;
      }

      const modeSelect = document.getElementById("mode-select");
      if (modeSelect) {
        modeSelect.onchange = refreshCreatePreview;
        modeSelect.oninput = refreshCreatePreview;
      }

      document.querySelectorAll("input[name='diff']").forEach(radio => {
        radio.onchange = refreshCreatePreview;
        radio.onclick = refreshCreatePreview;
      });

      updateModeSelectLabels();
      updateModeDescription();
      updateFtOptions();
      applyCreatePrefs();
      updateModeSelectLabels();
      updateModeDescription();
      syncSoloCopyForMode();
      updateFtOptions();
      updatePointsPreview();
      updateDiffDescs();
      persistCreatePrefs();

      document.getElementById("btn-create").onclick = () => {
        const name = document.getElementById("create-name").value.trim();
        if (!name) { showError("create-error", t.error_name_required); return; }
        if (isReservedName(name)) { showError("create-error", t.error_name_reserved); return; }
        hideError("create-error");
        const mode = getSelectedMode();
        // Defuse mode: start locally without creating a room
        if (mode === 'defuse') {
          const diff = getSelectedDifficulty();
          const bombs = { easy: 22, medium: 29, hard: 36 }[diff] ?? 29;
          const isMulti = document.getElementById('defuse-btn-multi')?.classList.contains('selected');
          const squadName = document.getElementById('defuse-squad')?.value.trim() || '';
          if (isMulti) {
            if (!squadName) {
              const squadInput = document.getElementById('defuse-squad');
              if (squadInput) { squadInput.focus(); squadInput.style.borderColor = 'var(--coral)'; setTimeout(() => squadInput.style.borderColor = '', 1500); }
              showError('create-error', t.defuse_squad_required || 'Nome do squad obrigatório');
              return;
            }
          }
          myName = name;
          localStorage.setItem(NAME_STORAGE_KEY, name);
          _startDefuseGame({ isMulti, squadName, difficulty: diff, totalBombs: bombs });
          return;
        }
        const diff = getSelectedDifficulty();
        const ft = mode === "explosive" ? Number.parseInt(document.getElementById("ft-select")?.value ?? "5", 10) : null;
        const aiLevel = isAiEnabled() ? "hard" : null;
        const id = generateRoomId();
        setRoomIdInUrl(id);
        myName = name;
        localStorage.setItem(NAME_STORAGE_KEY, name);
        connectToRoom(id, name, diff, aiLevel, mode, ft);
      };
    }

    // ── Join screen ────────────────────────────────────────────────────────────
    function setupJoinScreen(id) {
      roomId = id;
      const savedName = (localStorage.getItem(NAME_STORAGE_KEY) || "").trim();
      const joinInput = document.getElementById("join-name");
      if (savedName) joinInput.value = savedName;

      const tempSocket = new PartySocket({ host: PARTYKIT_HOST, room: id });
      tempSocket.addEventListener("message", (ev) => {
        const msg = JSON.parse(ev.data);
        if (msg.type === "state") {
          const state = msg.state;
          tempSocket.close();
          if (state.status === "finished") {
            // If a rematch is pending, allow joining/reconnecting to accept it.
            const rr = Array.isArray(state.rematchReady) ? state.rematchReady : null;
            const pendingRematch = rr && ((rr[0] || rr[1]) && !(rr[0] && rr[1]));
            // If this is one of the original players refreshing, reconnect so they see the final result.
            const isOriginalPlayer = savedName && (state.players[0]?.name === savedName || state.players[1]?.name === savedName);
            if (!pendingRematch && !isOriginalPlayer) {
              showScreen("screen-error");
              setErrorScreen("error_title_finished", "error_room_finished");
              return;
            }
          }
          if (savedName && (state.players[0]?.name === savedName || state.players[1]?.name === savedName)) {
            myName = savedName;
            connectToRoom(id, savedName, null);
            // If a rematch is pending and this player isn't the requester, show the prompt after reconnect.
            try {
              const rr = Array.isArray(state.rematchReady) ? state.rematchReady : null;
              const pendingRematch = rr && ((rr[0] || rr[1]) && !(rr[0] && rr[1]));
              if (pendingRematch) {
                const requesterIndex = rr[0] ? 0 : rr[1] ? 1 : null;
                const myIdx = state.players[0]?.name === savedName ? 0 : state.players[1]?.name === savedName ? 1 : null;
                if (requesterIndex !== null && myIdx !== null && myIdx !== requesterIndex) {
                  // Defer until the UI is in game screen; handleState will also prompt, but this makes refresh more reliable.
                  setTimeout(() => { try { if (currentState) tryPromptRematchModal(currentState, 1); } catch { } }, 0);
                }
              }
            } catch { }
            return;
          }
          if (state.players[0]) {
            const isCoopRoom = state.mode === "coop";
            const diffDesc = {
              easy: isCoopRoom ? (t.diff_easy_desc_coop ?? t.diff_easy_desc) : t.diff_easy_desc,
              medium: isCoopRoom ? (t.diff_medium_desc_coop ?? t.diff_medium_desc) : t.diff_medium_desc,
              hard: isCoopRoom ? (t.diff_hard_desc_coop ?? t.diff_hard_desc) : t.diff_hard_desc,
            };
            const MODE_ICONS = { versus: "⚔️", coop: "🤝", explosive: "💥" };
            const MODE_NAME_KEYS = { versus: "mode_versus", coop: "mode_coop", explosive: "mode_explosive" };
            const MODE_DESC_KEYS = { versus: "mode_versus_desc", coop: "mode_coop_desc", explosive: "mode_explosive_desc" };
            const modeIcon = MODE_ICONS[state.mode] ?? "🎮";
            const modeName = t[MODE_NAME_KEYS[state.mode]] ?? state.mode;
            const modeDesc = t[MODE_DESC_KEYS[state.mode]] ?? "";

            // Invited by
            const invitedByEl = document.getElementById("join-invited-by");
            if (invitedByEl) {
              invitedByEl.dataset.playerName = state.players[0].name;
              invitedByEl.innerHTML = `${t.invited_by} <strong style="color:var(--text)">${state.players[0].name}</strong>`;
            }

            // Difficulty
            const diffEl = document.getElementById("join-diff-info");
            if (diffEl) { diffEl.dataset.difficulty = state.difficulty; diffEl.dataset.mode = state.mode; diffEl.textContent = diffDesc[state.difficulty] ?? ""; diffEl.style.display = ""; }

            // Mode card
            const modeCard = document.getElementById("join-mode-card");
            const modeIconEl = document.getElementById("join-mode-icon");
            const modeNameEl = document.getElementById("join-mode-name");
            const modeDescEl = document.getElementById("join-mode-desc");
            const modeExpandEl = document.getElementById("join-mode-expand");
            if (modeCard && modeIconEl && modeNameEl && modeDescEl && modeExpandEl) {
              modeCard.dataset.mode = state.mode;
              modeIconEl.textContent = modeIcon;
              modeIconEl.style.fontSize = "24px";
              modeIconEl.style.lineHeight = "1";
              modeNameEl.textContent = modeName;
              modeDescEl.textContent = modeDesc;
              modeCard.style.display = "";

              // Build mini-grid preview (reuse same logic as briefing toast)
              function cell(cls, content = "") {
                return `<div class="mp-cell ${cls}">${content}</div>`;
              }
              const p1name = state.players[0].name.split(" ")[0].substring(0, 6);
              let previewHTML = "";
              if (state.mode === "versus") {
                const grid = [
                  cell("revealed n1", "1"), cell("bomb-p1", "💣"), cell("revealed n2", "2"), cell("hidden"),
                  cell("revealed", "·"), cell("revealed n1", "1"), cell("revealed n3", "3"), cell("hidden"),
                  cell("revealed n1", "1"), cell("revealed n2", "2"), cell("revealed n2", "2"), cell("bomb-p2", "💣"),
                  cell("hidden"), cell("hidden"), cell("revealed n1", "1"), cell("hidden"),
                ];
                previewHTML = `<div class="mode-preview"><div class="mode-preview-grid">${grid.join("")}</div><div class="mode-preview-caption">${t.briefing_versus_caption ?? ""}</div></div>`;
              } else if (state.mode === "coop") {
                const grid = [
                  cell("revealed", "·"), cell("revealed n1", "1"), cell("hidden"), cell("bomb-coop", "?"),
                  cell("revealed", "·"), cell("revealed n1", "1"), cell("revealed n2", "2"), cell("hidden"),
                  cell("revealed n1", "1"), cell("revealed n2", "2"), cell("revealed n2", "2"), cell("bomb-coop", "?"),
                  cell("revealed n1", "1"), cell("revealed", "·"), cell("revealed n1", "1"), cell("hidden"),
                ];
                previewHTML = `<div class="mode-preview"><div class="mode-preview-grid">${grid.join("")}</div><div class="mode-preview-caption">${t.briefing_coop_caption ?? ""}</div></div>`;
              } else if (state.mode === "explosive") {
                const grid = [
                  cell("revealed n1", "1"), cell("hidden"), cell("hidden"), cell("hidden active-turn"),
                  cell("revealed", "·"), cell("revealed n1", "1"), cell("hidden"), cell("hidden"),
                  cell("revealed", "·"), cell("revealed n1", "1"), cell("bomb-explosive", "💣"), cell("hidden"),
                  cell("revealed n1", "1"), cell("revealed n2", "2"), cell("hidden"), cell("hidden"),
                ];
                previewHTML = `<div class="mode-preview"><div class="mode-preview-grid">${grid.join("")}</div><div class="mode-preview-caption">${t.briefing_explosive_caption ?? ""}</div></div>`;
              }
              modeExpandEl.innerHTML = previewHTML;

              // Toggle expand on click (whole card)
              if (!modeCard.dataset.clickBound) {
                modeCard.dataset.clickBound = "1";
                modeCard.addEventListener("click", () => modeCard.classList.toggle("open"));
              }
            }
          }
        }
        if (msg.type === "error") {
          tempSocket.close();
          showScreen("screen-error");
          setErrorScreen("error_title_generic", "error_room_not_found");
        }
      });

      document.getElementById("btn-join").onclick = () => {
        const name = document.getElementById("join-name").value.trim();
        if (!name) { showError("join-error", t.error_name_required); return; }
        if (isReservedName(name)) { showError("join-error", t.error_name_reserved); return; }
        hideError("join-error");
        myName = name;
        localStorage.setItem(NAME_STORAGE_KEY, name);
        connectToRoom(id, name, null);
      };
    }

    // ── WebSocket ──────────────────────────────────────────────────────────────
    function connectToRoom(id, name, difficulty, aiLevel, mode, ft) {
      roomId = id;
      // mode and ft can be used in join message or stored in state as needed
      if (socket) {
        intentionallyClosedSockets.add(socket);
        socket.close();
      }
      socket = new PartySocket({ host: PARTYKIT_HOST, room: id });
      let joinAccepted = false;
      const thisSocket = socket;

      socket.addEventListener("open", () => {
        document.getElementById("reconnecting-bar").classList.remove("visible");
        const msg = difficulty ? { type: "join", name, difficulty } : { type: "join", name };
        if (mode) msg.mode = mode;
        if (ft) msg.ft = ft;
        if (aiLevel) msg.ai = { level: aiLevel };
        socket.send(JSON.stringify(msg));
      });

      socket.addEventListener("message", (ev) => {
        const msg = JSON.parse(ev.data);
        if (msg.type === "state") {
          const state = msg.state;
          if (!joinAccepted) {
            joinAccepted = state.players[0]?.name === name || state.players[1]?.name === name;
          }
          if (joinAccepted) {
            document.getElementById("reconnecting-bar").classList.remove("visible");
            handleState(state);
          }
        }
        if (msg.type === "sticker") {
          if (document.hidden || !isGameScreenActive()) enqueueSticker(msg.from, msg.id);
          else showStickerToast(msg.from, msg.id);
        }
        if (msg.type === "bomb-found") {
          playBombSound();
          const mode = currentState && currentState.mode;
          if (mode === 'coop' || mode === 'explosive') {
            const bw = document.querySelector('#screen-game .board-wrap');
            if (bw) {
              bw.classList.remove('defuse-board-shake');
              void bw.offsetWidth;
              bw.classList.add('defuse-board-shake');
              bw.addEventListener('animationend', () => bw.classList.remove('defuse-board-shake'), { once: true });
            }
          }
        }
        if (msg.type === "error") handleServerError(msg.message);
      });

      socket.addEventListener("close", () => {
        const inGame = document.getElementById("screen-game").classList.contains("active");
        if (inGame && !intentionallyClosedSockets.has(thisSocket)) {
          document.getElementById("reconnecting-bar").classList.add("visible");
        }
      });
    }

    function handleServerError(message) {
      if (socket) {
        intentionallyClosedSockets.add(socket);
        socket.close();
        socket = null;
      }
      if (message === "name_reserved") {
        const rid = getRoomIdFromUrl();
        if (rid) {
          showScreen("screen-join");
          showError("join-error", t.error_name_reserved);
          return;
        }
        showScreen("screen-create");
        showError("create-error", t.error_name_reserved);
        return;
      }
      if (message === "room_full") {
        // If we're trying to join via an invite link, keep the user on the join screen
        // so they can type the same name to reclaim their slot (e.g. on another device).
        const rid = getRoomIdFromUrl();
        if (rid) {
          showScreen("screen-join");
          showError("join-error", t.error_room_full);
          return;
        }
        showScreen("screen-error");
        setErrorScreen("error_title_full", "error_room_full");
      } else {
        showScreen("screen-error");
        setErrorScreen("error_title_generic", "error_generic");
      }
    }

    // ── State ──────────────────────────────────────────────────────────────────
    let _lastStatusForFlags = null;
    let _lastBoardIdForFlags = null;
    let _prevRevealed = null;

    function spawnCellBonusFloats(prevRevealed, state) {
      const isAiGame = state.players[0]?.id === "ai" || state.players[1]?.id === "ai";
      if (state.mode !== "coop" || state.status !== "playing" || isAiGame) return;
      const boardEl = document.getElementById("board");
      if (!boardEl || !prevRevealed) return;
      const rows = state.revealed.length;
      const cols = state.revealed[0]?.length ?? 0;
      let floatCount = 0;
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          if (!prevRevealed[r]?.[c] && isRevealedSafeCell(state, r, c)) {
            const cellEl = boardEl.children[r * cols + c];
            if (!cellEl) continue;
            const span = document.createElement("span");
            span.className = "cell-float-pts";
            span.style.animationDelay = `${floatCount * 55}ms`;
            span.textContent = "+10";
            cellEl.appendChild(span);
            span.addEventListener("animationend", () => span.remove(), { once: true });
            floatCount++;
          }
        }
      }
      if (floatCount > 0) {
        const pillWrap = document.getElementById("points-worth");
        const inner = pillWrap?.querySelector(".status-pill.gold");
        if (inner) {
          inner.classList.remove("bump");
          void inner.offsetWidth;
          inner.classList.add("bump");
          inner.addEventListener("animationend", () => inner.classList.remove("bump"), { once: true });
        }
      }
    }

    function handleState(state) {
      _prevRevealed = currentState?.revealed ?? null;
      currentState = state;

      // Reset local flags on new board (rematch, new explosive round, first game)
      // _lastStatusForFlags === null means first load/refresh — just restore, never clear.
      const boardId = state.explosiveBoardId ?? null;
      const isFirstLoad = _lastStatusForFlags === null;
      const isNewBoard = !isFirstLoad && (
        (state.status === "playing" && _lastStatusForFlags !== "playing")
        || (boardId !== null && boardId !== _lastBoardIdForFlags)
      );
      if (isNewBoard) { clearLocalFlags(); _localFlagsLoaded = false; }
      if (!_localFlagsLoaded && state.status === "playing") { loadLocalFlags(); _localFlagsLoaded = true; }
      _lastStatusForFlags = state.status;
      _lastBoardIdForFlags = boardId;

      // Remove local flags from cells already revealed (e.g. opponent revealed while we were away)
      // Must happen AFTER loadLocalFlags so restored flags are also cleaned up.
      let _flagsChanged = false;
      for (const key of Object.keys(localFlags)) {
        if (!localFlags[key]) continue;
        const [r, c] = key.split(",").map(Number);
        if (state.revealed?.[r]?.[c]) { delete localFlags[key]; _flagsChanged = true; }
      }
      if (_flagsChanged) saveLocalFlags();

      let _forceExplosiveFtRerender = false;

      // Keep explosive FT flash state in sync before any render (renderGame reads `ftFlash`).
      if (state.mode === "explosive" && state.explosiveSeries) {
        const w1 = state.explosiveSeries.wins?.[0] ?? 0;
        const w2 = state.explosiveSeries.wins?.[1] ?? 0;
        if (w1 !== lastExplosiveWins[0] || w2 !== lastExplosiveWins[1]) {
          if (w1 > lastExplosiveWins[0]) ftFlash = { side: 0, index: w1 - 1, until: Date.now() + 3000 };
          else if (w2 > lastExplosiveWins[1]) ftFlash = { side: 1, index: w2 - 1, until: Date.now() + 3000 };
          lastExplosiveWins = [w1, w2];
          _forceExplosiveFtRerender = true;

          // Ensure the flash stops even if no further server state updates arrive (e.g. after refresh).
          if (ftFlashTimer) { clearTimeout(ftFlashTimer); ftFlashTimer = 0; }
          const delay = Math.max(0, (ftFlash.until ?? 0) - Date.now()) + 30;
          ftFlashTimer = setTimeout(() => {
            try {
              if (currentState?.mode === "explosive" && currentState.explosiveSeries) {
                renderExplosiveFtMeter(currentState);
              }
            } catch { }
            ftFlashTimer = 0;
          }, delay);
        }
      } else {
        lastExplosiveWins = [0, 0];
        ftFlash = { side: null, index: -1, until: 0 };
        if (ftFlashTimer) { clearTimeout(ftFlashTimer); ftFlashTimer = 0; }
      }

      function updateExplosiveRoundUi(state) {
        if (state.mode !== "explosive" || !state.explosiveSeries) {
          lastExplosiveRound = null;
          if (explosiveOverlayTimer) { clearInterval(explosiveOverlayTimer); explosiveOverlayTimer = 0; }
          return;
        }

        // When the server regenerates the board (explosiveBoardId changes), play a quick wipe.
        const boardId = (state.explosiveBoardId ?? 0) | 0;
        if (lastExplosiveRound !== null && boardId !== (lastExplosiveRound | 0)) {
          playExplosiveRoundIntro();
        }
        lastExplosiveRound = boardId;

        // During the post-bomb cooldown, block interaction + show Ready/Go overlay.
        if (state.explosiveCooldownUntil && Date.now() < state.explosiveCooldownUntil) {
          try { document.querySelector("#screen-game .board-wrap")?.classList?.add("cooldown-on"); } catch { }
          showExplosiveCooldownCountdown(state);
        } else {
          const wrap = document.querySelector("#screen-game .board-wrap");
          if (wrap) wrap.classList.remove("cooldown-on");
          const globalOverlay = document.getElementById("explosive-global-overlay");
          if (globalOverlay) { globalOverlay.classList.remove("visible"); globalOverlay.style.display = "none"; }
          if (explosiveOverlayTimer) { clearInterval(explosiveOverlayTimer); explosiveOverlayTimer = 0; }
        }
      }

      if (myPlayerIndex === null) {
        if (state.players[0]?.name === myName) myPlayerIndex = 0;
        else if (state.players[1]?.name === myName) myPlayerIndex = 1;
      }

      if (state.status === "waiting") {
        sessionStorage.removeItem("mf-mode-seen:" + roomId);
        showScreen("screen-waiting");
        const url = `${location.origin}${location.pathname}#${roomId}`;
        document.getElementById("invite-url").textContent = url;
        setupCopyButton(url);
        // Ensure waiting screen always shows its default copy.
        const titleEl = document.querySelector("#screen-waiting [data-i18n='waiting_title']");
        if (titleEl) titleEl.textContent = t.waiting_title || titleEl.textContent;
        const actions = document.getElementById("waiting-actions");
        if (actions) actions.style.display = "none";
        return;
      }

      // If a rematch is pending (one player ready, waiting for the other), reuse the waiting screen.
      if (state.status === "finished") {
        const rematchReady = Array.isArray(state.rematchReady) ? state.rematchReady : null;
        const isTwoHumans = state.players[0]?.id !== "ai" && state.players[1]?.id !== "ai";
        const readyCount = rematchReady ? (rematchReady[0] ? 1 : 0) + (rematchReady[1] ? 1 : 0) : 0;
        const waitingRematch = isTwoHumans && readyCount > 0 && readyCount < 2;
        if (waitingRematch) {
          // On refresh, `myPlayerIndex` may still be null for a moment. In that case, do NOT
          // route to the requester waiting screen (it can misclassify the player). Keep them
          // on game + show the prompt instead.
          if (myPlayerIndex === null) {
            tryPromptRematchModal(state, readyCount);
            showScreen("screen-game");
            renderGame(state);
            if (_forceExplosiveFtRerender && state.mode === "explosive") {
              // Defensive: ensure the flash class is present even if the first render happened
              // before the DOM node existed (e.g. during fast screen transitions).
              try { renderExplosiveFtMeter(state); } catch { }
            }
            updateExplosiveRoundUi(state);
            notifyTurnIfNeeded(state);
            notifyFinishedIfNeeded(state);
            return;
          }

          const requesterIndex = rematchReady ? (rematchReady[0] ? 0 : rematchReady[1] ? 1 : null) : null;
          const iAmRequester = requesterIndex !== null && myPlayerIndex === requesterIndex;
          // Requester (already ready) goes to waiting screen; the other player gets a popup.
          if (!iAmRequester) {
            tryPromptRematchModal(state, readyCount);
            showScreen("screen-game");
            renderGame(state);
            updateExplosiveRoundUi(state);
            notifyTurnIfNeeded(state);
            notifyFinishedIfNeeded(state);
            return;
          }
          showScreen("screen-waiting");
          const url = `${location.origin}${location.pathname}#${roomId}`;
          document.getElementById("invite-url").textContent = url;
          setupCopyButton(url);
          // Keep the exact same waiting screen copy as the first-time waiting experience.
          const titleEl = document.querySelector("#screen-waiting [data-i18n='waiting_title']");
          if (titleEl) titleEl.textContent = t.waiting_title || titleEl.textContent;

          // Show accept/decline actions for the player who hasn't confirmed yet.
          const actions = document.getElementById("waiting-actions");
          const btnYes = document.getElementById("btn-waiting-rematch");
          const btnNotNow = document.getElementById("btn-waiting-not-now");
          const btnNo = document.getElementById("btn-waiting-new-game");
          if (actions && btnYes && btnNotNow && btnNo) {
            // Requester should see the same waiting screen as the initial room creation: no extra CTAs.
            actions.style.display = "none";
          }
          return;
        }
      }

      showScreen("screen-game");
      renderGame(state);
      spawnCellBonusFloats(_prevRevealed, state);
      if (_forceExplosiveFtRerender && state.mode === "explosive") {
        try { renderExplosiveFtMeter(state); } catch { }
      }
      updateExplosiveRoundUi(state);
      if (state.status === "playing") showModeBriefingToast(state);

      if (state.lastClickedCell) {
        lastClickedCell = state.lastClickedCell;
      }

      notifyTurnIfNeeded(state);
      notifyFinishedIfNeeded(state);
    }

    const STICKERS = {
      nice: { emoji: "🔥", key: "sticker_nice" },
      thinking: { emoji: "🤔", key: "sticker_thinking" },
      oops: { emoji: "😅", key: "sticker_oops" },
      boom: { emoji: "💥", key: "sticker_boom" },
      taunt: { emoji: "🤣", key: "sticker_taunt" },
      cry: { emoji: "😭", key: "sticker_cry" },
      clap: { emoji: "👏", key: "sticker_clap" },
      trophy: { emoji: "🏆", key: "sticker_trophy" },
    };

    function syncStickerUi() {
      const launcher = document.getElementById("sticker-launcher");
      if (launcher) {
        const label = t.sticker_launcher_label || "Stickers";
        launcher.setAttribute("title", label);
        launcher.setAttribute("aria-label", label);
      }
      document.querySelectorAll("#sticker-bar .sticker-btn").forEach((btn) => {
        const def = STICKERS[btn.dataset.sticker];
        if (!def) return;
        const text = t[def.key] || def.key;
        btn.setAttribute("title", text);
        btn.setAttribute("aria-label", text);
      });
    }

    function canSendSticker() {
      if (!socket) return false;
      if (!currentState || (currentState.status !== "playing" && currentState.status !== "finished")) return false;
      if (myPlayerIndex === null) return false;
      return true;
    }

    function sendSticker(id) {
      if (!canSendSticker()) return;
      ensureAudioUnlocked();
      const now = Date.now();
      if (now < stickerLockedUntil) return;
      if (now - lastStickerSentAt < 250) return;
      lastStickerSentAt = now;
      stickerLockedUntil = Math.max(stickerLockedUntil, now + STICKER_DISPLAY_MS);
      socket.send(JSON.stringify({ type: "sticker", id }));
      closeStickerPalette();
    }

    function showStickerToast(from, id) {
      const def = STICKERS[id];
      if (!def) return;
      const toasts = document.getElementById("sticker-toasts");
      // Only one at a time: replace any existing toast.

    function setStickerPaletteOpen(open) {
      const launcher = document.getElementById("sticker-launcher");
      const palette = document.getElementById("sticker-palette");
      if (open) updateStickerPalettePosition();
      launcher.classList.toggle("open", open);
      launcher.setAttribute("aria-expanded", open ? "true" : "false");
      palette.classList.toggle("open", open);
    }

    function closeStickerPalette() {
      setStickerPaletteOpen(false);
    }

    function isGameScreenActive() {
      return document.getElementById("screen-game").classList.contains("active");
    }

    function setStickerBadgeCount(n) {
      const badge = document.getElementById("sticker-badge");
      if (!badge) return;
      const count = Math.max(0, n | 0);
      pendingStickerCount = count;
      if (!count) {
        badge.style.display = "none";
        badge.textContent = "";
        return;
      }
      badge.style.display = "inline-flex";
      badge.textContent = count > 99 ? "99+" : String(count);
    }

    function enqueueSticker(from, id) {
      pendingStickers.push({ from, id });
      if (pendingStickers.length > 25) pendingStickers = pendingStickers.slice(-25);
      setStickerBadgeCount(pendingStickerCount + 1);
    }

    function flushPendingStickers() {
      if (!pendingStickers.length) return;
      const recent = pendingStickers.slice(-1);
      pendingStickers = [];
      setStickerBadgeCount(0);
      const s = recent[0];
      try { showStickerToast(s.from, s.id); } catch { }
    }

    function updateStickerPalettePosition() {
      const launcher = document.getElementById("sticker-launcher");
      const palette = document.getElementById("sticker-palette");
      const rect = launcher.getBoundingClientRect();
      const top = Math.min(window.innerHeight - 24, rect.bottom + 10);
      palette.style.setProperty("--sticker-palette-top", `${top}px`);
    }

    // ── Render ─────────────────────────────────────────────────────────────────
    function updateFlagsCounter(state) {
      const flagsCounterEl = document.getElementById("flags-counter");
      if (!flagsCounterEl) return;
      if (state && (state.status === "playing" || state.status === "finished")) {
        const flagCount = state.mode === "coop"
          ? (state.flags ? state.flags.flat().filter(Boolean).length : 0)
          : Object.values(localFlags).filter(Boolean).length;
        const flagSvg = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path opacity="0.5" fill-rule="evenodd" clip-rule="evenodd" d="M6.5 1.75C6.5 1.33579 6.16421 1 5.75 1C5.33579 1 5 1.33579 5 1.75V21.75C5 22.1642 5.33579 22.5 5.75 22.5C6.16421 22.5 6.5 22.1642 6.5 21.75V13.6V3.6V1.75Z" fill="currentColor"/><path d="M13.5582 3.87333L13.1449 3.70801C11.5821 3.08288 9.8712 2.9258 8.22067 3.25591L6.5 3.60004V13.6L8.22067 13.2559C9.8712 12.9258 11.5821 13.0829 13.1449 13.708C14.8385 14.3854 16.7024 14.5119 18.472 14.0695L18.5721 14.0445C19.1582 13.898 19.4361 13.2269 19.1253 12.7089L17.5647 10.1078C17.2232 9.53867 17.0524 9.25409 17.0119 8.94455C16.9951 8.81543 16.9951 8.68466 17.0119 8.55553C17.0524 8.24599 17.2232 7.96141 17.5647 7.39225L18.8432 5.26136C19.1778 4.70364 18.6711 4.01976 18.0401 4.17751C16.5513 4.54971 14.9831 4.44328 13.5582 3.87333Z" fill="currentColor"/></svg>`;
        flagsCounterEl.innerHTML = `<span class="status-pill">${flagSvg} ${flagCount}/${state.totalBombs}</span>`;
        flagsCounterEl.style.display = "inline-flex";
        flagsCounterEl.style.alignItems = "center";
      } else {
        flagsCounterEl.style.display = "none";
      }

    function renderGame(state) {
      const p1 = state.players[0];
      const p2 = state.players[1];
      const turnInfoEl = document.querySelector(".turn-info");
      if (turnInfoEl) {
        // End-of-game feedback is shown in the result card; avoid duplicating it here.
        const hide = state.status === "finished";
        // Keep layout spacing so the scoreboard doesn't collapse.
        turnInfoEl.style.visibility = hide ? "hidden" : "";
        turnInfoEl.style.pointerEvents = hide ? "none" : "";
        turnInfoEl.setAttribute("aria-hidden", hide ? "true" : "false");
      }

      // Add AI badge if needed
      const p1IsAi = p1?.id === "ai";
      const p2IsAi = p2?.id === "ai";
      const youLabel = t.ranking_you || "you";
      function renderPlayerName(spanEl, player, isAi, playerIdx) {
        if (!player) { spanEl.textContent = "—"; return; }
        const isMe = myPlayerIndex === playerIdx;
        const youBadge = isMe
          ? ` <span style="font-size:10px; padding:2px 5px; border-radius:4px; background:rgba(255,255,255,0.08); color:var(--text-muted);">${youLabel}</span>`
          : "";
        const aiBadge = isAi
          ? ` <span style="font-size:10px; padding:2px 5px; border-radius:4px; background:rgba(255,255,255,0.1); color:var(--text-muted);">${t.ai_badge}</span>`
          : "";
        spanEl.innerHTML = player.name + youBadge + aiBadge;
      }
      renderPlayerName(document.getElementById("p1-name"), p1, p1IsAi, 0);
      renderPlayerName(document.getElementById("p2-name"), p2, p2IsAi, 1);
      const p1ScoreEl = document.getElementById("p1-score");
      const p2ScoreEl = document.getElementById("p2-score");
      const p1BombsEl = document.getElementById("p1-bombs");
      const p2BombsEl = document.getElementById("p2-bombs");

      // Coop and Explosive: keep the same layout, but don't show competitive numbers.
      const hideNumbers = state.mode === "coop" || state.mode === "explosive";
      if (p1ScoreEl) {
        p1ScoreEl.textContent = hideNumbers ? "" : String(p1?.score ?? 0);
        p1ScoreEl.style.display = hideNumbers ? "none" : "";
      }
      if (p2ScoreEl) {
        p2ScoreEl.textContent = hideNumbers ? "" : String(p2?.score ?? 0);
        p2ScoreEl.style.display = hideNumbers ? "none" : "";
      }
      if (p1BombsEl) {
        p1BombsEl.textContent = hideNumbers ? "" : t.bomb_count(p1?.bombs ?? 0);
        p1BombsEl.style.display = hideNumbers ? "none" : "";
      }
      if (p2BombsEl) {
        p2BombsEl.textContent = hideNumbers ? "" : t.bomb_count(p2?.bombs ?? 0);
        p2BombsEl.style.display = hideNumbers ? "none" : "";
      }

      document.getElementById("p1-card").className = "player-card" + (state.currentPlayer === 0 ? " active-p1" : "");
      document.getElementById("p2-card").className = "player-card" + (state.currentPlayer === 1 ? " active-p2" : "");

      const turnPlayer = state.players[state.currentPlayer];
      let turnName, turnSuffix;

      function truncateName(name, maxLength = 10) {
        if (name.length > maxLength) {
          return name.substring(0, maxLength) + "...";
        }
        return name;
      }

      if (state.status === "finished") {
        if (state.mode === "coop") {
          turnName = "";
          turnSuffix = "";
        } else {
          const p1 = state.players[0];
          const p2 = state.players[1];

          if (!p1 || !p2) {
            turnName = "—";
            turnSuffix = "";
          } else if (p1.score > p2.score) {
            turnName = truncateName(p1.name);
            turnSuffix = t.result_won_suffix ?? "venceu";
          } else if (p2.score > p1.score) {
            turnName = truncateName(p2.name);
            turnSuffix = t.result_won_suffix ?? "venceu";
          } else {
            turnName = t.result_draw;
            turnSuffix = "";
          }
        }
      } else {
        turnName = truncateName(turnPlayer?.name ?? "—");
        turnSuffix = t.turn_suffix;
      }

      document.getElementById("turn-name").textContent = turnName;
      document.getElementById("turn-suffix").textContent = turnSuffix;

      const found = (p1?.bombs ?? 0) + (p2?.bombs ?? 0);
      if (state.mode === "explosive" && state.explosiveSeries) {
        document.getElementById("bombs-remaining").innerHTML = "";
        document.getElementById("bombs-remaining").style.display = "none";
        // Ensure coop progress is hidden.
        const coopRow = document.getElementById("coop-mini-progress-row");
        if (coopRow) { coopRow.classList.remove("visible"); coopRow.innerHTML = ""; coopRow.setAttribute("aria-hidden", "true"); }
        renderExplosiveFtMeter(state);
      } else if (state.mode === "coop" && typeof t.coop_safe_cells_progress === "function") {
        // Coop goal: reveal all safe cells (bombs stay hidden).
        const totalCells = getGridRows(state) * getGridCols(state);
        const totalSafe = Math.max(0, totalCells - state.totalBombs);

        let foundSafe = Array.isArray(state.safeRevealedBy)
          ? state.safeRevealedBy.length
          : countRevealedSafeCells(state);

        // Def against old/corrupted state.
        foundSafe = Math.max(0, Math.min(foundSafe, totalSafe));
        document.getElementById("bombs-remaining").innerHTML = `<span class="status-pill"><span style="font-size:15px;line-height:1;">💣</span> ${state.totalBombs}</span>`;
        document.getElementById("bombs-remaining").style.display = "inline-flex";
        renderCoopMiniProgress(state, foundSafe, totalSafe);
        const ftRow = document.getElementById("explosive-ft-row");
        if (ftRow) { ftRow.classList.remove("visible"); ftRow.innerHTML = ""; ftRow.setAttribute("aria-hidden", "true"); }
      } else {
        document.getElementById("bombs-remaining").innerHTML = `<span class="status-pill"><span style="font-size:15px;line-height:1;">💣</span> ${state.totalBombs - found}</span>`;
        document.getElementById("bombs-remaining").style.display = "inline-flex";
        const row = document.getElementById("coop-mini-progress-row");
        if (row) {
          row.classList.remove("visible");
          row.innerHTML = "";
          row.setAttribute("aria-hidden", "true");
        }
        const ftRow = document.getElementById("explosive-ft-row");
        if (ftRow) { ftRow.classList.remove("visible"); ftRow.innerHTML = ""; ftRow.setAttribute("aria-hidden", "true"); }
      }

      // ── Flags counter ───────────────────────────────────────────────────────
      updateFlagsCounter(state);

      // ── Points worth ────────────────────────────────────────────────────────
      const pointsWorthEl = document.getElementById("points-worth");
      if (pointsWorthEl) {
        const isAiGame = state.players[0]?.id === "ai" || state.players[1]?.id === "ai";
        if (state.mode === "coop" && !isAiGame) {
          const coopBase = POINTS_TABLE.coop?.[state.difficulty] ?? 0;
          const myScore = coopBase + (state.players[myPlayerIndex ?? 0]?.score ?? 0);
          const label = state.status === "playing" ? "Pontos em jogo" : "Pontos";
          pointsWorthEl.innerHTML = `<span class="status-pill gold" title="${label}"><span style="font-size:14px;line-height:1;">🏆</span> ${myScore} pts</span>`;
          pointsWorthEl.style.display = "inline-flex";
        } else if (state.mode !== "coop") {
          const pts = state.mode === "explosive"
            ? (POINTS_TABLE.explosive[state.explosiveSeries?.target] ?? 0)
            : (POINTS_TABLE[state.mode]?.[state.difficulty] ?? 0);
          if (pts > 0) {
            const label = state.status === "playing" ? "Pontos em jogo" : "Pontos";
            pointsWorthEl.innerHTML = `<span class="status-pill gold" title="${label}"><span style="font-size:14px;line-height:1;">🏆</span> ${pts} pts</span>`;
            pointsWorthEl.style.display = "inline-flex";
          } else {
            pointsWorthEl.style.display = "none";
          }
        } else {
          pointsWorthEl.style.display = "none";
        }
      }

      renderBoard(state);

      // ── Mode info button ────────────────────────────────────────────────────
      const btnModeInfo = document.getElementById("btn-mode-info");
      const modeStatusIcon = document.getElementById("mode-status-icon");
      const modeStatusName = document.getElementById("mode-status-name");
      const MODE_NAME_KEYS_BTN = { versus: "mode_versus", coop: "mode_coop", explosive: "mode_explosive" };
      if (modeStatusIcon) modeStatusIcon.innerHTML = modeIconSvg(state.mode, 13);
      if (modeStatusName) modeStatusName.textContent = t[MODE_NAME_KEYS_BTN[state.mode]] ?? state.mode;
      const modeStatusFt = document.getElementById("mode-status-ft");
      const modeStatusFtVal = document.getElementById("mode-status-ft-val");
      if (modeStatusFt && modeStatusFtVal) {
        const series = state.mode === "explosive" && state.explosiveSeries;
        if (series) {
          modeStatusFtVal.textContent = `FT${series.target | 0}`;
          modeStatusFt.style.display = "inline-flex";
        } else {
          modeStatusFt.style.display = "none";
        }
      }
      if (btnModeInfo && !btnModeInfo.dataset.listenerAttached) {
        btnModeInfo.dataset.listenerAttached = "1";
        btnModeInfo.addEventListener("click", () => { if (currentState) showModeBriefingToast(currentState, true); });
      }
      const flagsCounterBtn = document.getElementById("flags-counter");
      if (flagsCounterBtn && !flagsCounterBtn.dataset.listenerAttached) {
        flagsCounterBtn.dataset.listenerAttached = "1";
        flagsCounterBtn.addEventListener("click", () => showFlagsHelpToast());
      }

      // Explosive FT meter is rendered in the status-bar; keep the old explosive scoreboard hidden.
      if (state.mode !== "explosive") renderScoreboardExtras(state);
      if (state.status === "finished") renderResult(state);
      else document.getElementById("result-area").innerHTML = "";
      function renderScoreboardExtras(state) {
        const explosiveScoreboard = document.getElementById("explosive-scoreboard");

        // Hide by default
        if (explosiveScoreboard) explosiveScoreboard.style.display = "none";

        if (state.mode === "explosive" && state.explosiveSeries) {
          if (explosiveScoreboard) {
            explosiveScoreboard.style.display = "block";
            const { target, wins, round } = state.explosiveSeries;

            // Render dots P1
            const dotsP1 = document.getElementById("explosive-dots-p1");
            dotsP1.innerHTML = "";
            for (let i = 0; i < target; i++) {
              const dot = document.createElement("div");
              dot.className = "explosive-dot" + (i < wins[0] ? " filled-p1" : "");
              dotsP1.appendChild(dot);
            }

            // Render dots P2
            const dotsP2 = document.getElementById("explosive-dots-p2");
            dotsP2.innerHTML = "";
            for (let i = 0; i < target; i++) {
              const dot = document.createElement("div");
              dot.className = "explosive-dot" + (i < wins[1] ? " filled-p2" : "");
              dotsP2.appendChild(dot);
            }

            document.getElementById("explosive-round-label").textContent = t.explosive_round_current(round);
          }
        }
      }
    }

    function renderCoopMiniProgress(state, foundSafe, totalSafe) {
      const row = document.getElementById("coop-mini-progress-row");
      if (!row) return;

      row.classList.toggle("visible", state.mode === "coop");
      row.setAttribute("aria-hidden", state.mode === "coop" ? "false" : "true");

      const safeTotal = Math.max(0, totalSafe | 0);
      const safeFound = Math.max(0, Math.min(foundSafe | 0, safeTotal));
      const owners = Array.isArray(state.safeRevealedBy)
        ? state.safeRevealedBy.slice(0, safeTotal)
        : [];

      const cells = [];

      for (let i = 0; i < safeTotal; i++) {
        const o = i < safeFound ? owners[i] : undefined;
        const cls =
          o === 0 ? "coop-mini-cell p1" :
            o === 1 ? "coop-mini-cell p2" :
              "coop-mini-cell";

        cells.push(`<span class="${cls}"></span>`);
      }

      row.innerHTML = `
      <div class="coop-mini-progress" aria-hidden="true">
        <div class="coop-mini-progress-cells">${cells.join("")}</div>
        <span class="coop-mini-progress-counter">${safeFound}/${safeTotal}</span>
      </div>`;
    }

    function renderExplosiveFtMeter(state) {
      const row = document.getElementById("explosive-ft-row");
      if (!row) return;
      const series = state.explosiveSeries;
      const visible = state.mode === "explosive" && !!series;
      row.classList.toggle("visible", visible);
      row.setAttribute("aria-hidden", visible ? "false" : "true");
      if (!visible) { row.innerHTML = ""; return; }

      const target = series.target | 0;
      const w1 = series.wins?.[0] ?? 0;
      const w2 = series.wins?.[1] ?? 0;
      const now = Date.now();
      const mkCells = (wins, cls, side) => {
        const out = [];
        for (let i = 0; i < target; i++) {
          const filled = i < wins ? " filled" : "";
          const flashing = (now < ftFlash.until && ftFlash.side === side && ftFlash.index === i) ? " flash" : "";
          out.push(`<span class="ft-cell${filled}${flashing} ${cls}"></span>`);
        }
        return out.join("");
      };

      row.innerHTML = `
	        <div class="ft-meter" aria-hidden="true">
	          <div class="ft-side">
	            <div class="ft-cells">${mkCells(w1, "p1", 0)}</div>
	          </div>
	          <div class="ft-divider" aria-hidden="true"></div>
	          <div class="ft-side">
	            <div class="ft-cells">${mkCells(w2, "p2", 1)}</div>
	          </div>
	        </div>`;
    }

    function renderBoard(state) {
      const rows = getGridRows(state);
      const cols = getGridCols(state) || ({ easy: 6, medium: 8, hard: 10 }[state.difficulty] ?? 10);

      const boardEl = document.getElementById("board");
      const boardWrap = document.querySelector("#screen-game .board-wrap");

      const maxHeightStyle = getComputedStyle(boardWrap).maxHeight;
      const maxHeightPx = parseFloat(maxHeightStyle) || (window.innerHeight * 0.7);

      const availW = Math.max(
        240,
        Math.min(640, document.querySelector(".container").clientWidth) - 28 - 2
      );

      const availH = maxHeightPx - 28 - 2;
      const cssGap = getComputedStyle(document.documentElement).getPropertyValue("--cell-gap").trim();
      const gap = Number.parseFloat(cssGap) || 4;
      const byW = Math.floor((availW - (cols - 1) * gap) / cols);
      const byH = Math.floor((availH - (rows - 1) * gap) / rows);
      const cellSize = Math.max(28, Math.min(56, byW, byH));

      boardEl.style.gridTemplateColumns = `repeat(${cols}, ${cellSize}px)`;

      if (boardEl.children.length !== rows * cols) {
        boardEl.innerHTML = "";

        for (let r = 0; r < rows; r++) {
          for (let c = 0; c < cols; c++) {
            const cell = document.createElement("div");
            cell.className = "cell";

            const row = r;
            const col = c;

            cell.addEventListener("click", () => handleCellClick(row, col));
            cell.addEventListener("contextmenu", (e) => {
              e.preventDefault();
              handleCellFlag(row, col);
            });

            let _lpTimer = null;
            let _lpFired = false;

            cell.addEventListener("touchstart", () => {
              _lpFired = false;
              _lpTimer = setTimeout(() => {
                _lpTimer = null;
                _lpFired = true;
                handleCellFlag(row, col);
              }, 400);
            }, { passive: true });

            cell.addEventListener("touchend", (e) => {
              if (_lpTimer) {
                clearTimeout(_lpTimer);
                _lpTimer = null;
              }

              if (_lpFired) {
                _lpFired = false;
                e.preventDefault();
              }
            });

            cell.addEventListener("touchmove", () => {
              if (_lpTimer) {
                clearTimeout(_lpTimer);
                _lpTimer = null;
              }
            });

            boardEl.appendChild(cell);
          }
        }
      }

      const fontSize = Math.max(11, Math.floor(cellSize * 0.42));

      for (const el of boardEl.children) {
        el.style.width = cellSize + "px";
        el.style.fontSize = fontSize + "px";
      }

      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const cell = boardEl.children[r * cols + c];
          const value = state.grid?.[r]?.[c] ?? HIDDEN_CELL;
          const isRevealed = state.revealed?.[r]?.[c] === true;

          cell.className = "cell";
          cell.innerHTML = "";
          cell.textContent = "";
          cell.style.background = "";
          cell.style.borderColor = "";

          if (state.lastPlayerClicks?.length > 0) {
            const isInLastPlayerClicks = state.lastPlayerClicks.some(
              click => click.row === r && click.col === c
            );

            if (isInLastPlayerClicks) {
              const className =
                state.lastPlayerClicks[0].playerIndex === 0
                  ? "last-clicked-p1"
                  : "last-clicked-p2";

              cell.classList.add(className);
            }
          }

          // Célula escondida.
          // -2 significa desconhecida/fechada, não significa 0.
          if (!isRevealed || value === HIDDEN_CELL) {
            const isFlagged = state.mode === "coop"
              ? state.flags?.[r]?.[c]
              : localFlags[`${r},${c}`];

            // Coop loss: reveal where bombs were and validate flags.
            if (state.mode === "coop" && state.status === "finished" && state.coopResult === "loss") {
              const flagColor = "var(--text-muted)";
              const flagBorder = "rgba(200, 160, 0, 0.7)";
              const flagSvg = `<svg width="55%" height="55%" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path opacity="0.5" fill-rule="evenodd" clip-rule="evenodd" d="M6.5 1.75C6.5 1.33579 6.16421 1 5.75 1C5.33579 1 5 1.33579 5 1.75V21.75C5 22.1642 5.33579 22.5 5.75 22.5C6.16421 22.5 6.5 22.1642 6.5 21.75V13.6V3.6V1.75Z" fill="${flagColor}"/><path d="M13.5582 3.87333L13.1449 3.70801C11.5821 3.08288 9.8712 2.9258 8.22067 3.25591L6.5 3.60004V13.6L8.22067 13.2559C9.8712 12.9258 11.5821 13.0829 13.1449 13.708C14.8385 14.3854 16.7024 14.5119 18.472 14.0695L18.5721 14.0445C19.1582 13.898 19.4361 13.2269 19.1253 12.7089L17.5647 10.1078C17.2232 9.53867 17.0524 9.25409 17.0119 8.94455C16.9951 8.81543 16.9951 8.68466 17.0119 8.55553C17.0524 8.24599 17.2232 7.96141 17.5647 7.39225L18.8432 5.26136C19.1778 4.70364 18.6711 4.01976 18.0401 4.17751C16.5513 4.54971 14.9831 4.44328 13.5582 3.87333Z" fill="${flagColor}"/></svg>`;

              if (value === -1 && isFlagged) {
                // Correct flag: was on a real bomb.
                cell.classList.add("flagged", "flag-correct-coop");
                cell.style.borderColor = flagBorder;
                cell.innerHTML = flagSvg;
                continue;
              }
              if (value === -1) {
                // Unrevealed bomb without flag: show amber.
                cell.classList.add("bomb-coop-revealed");
                cell.textContent = "💣";
                continue;
              }
              if (isFlagged) {
                // Wrong flag: was on a safe cell.
                cell.classList.add("flagged", "flag-wrong-coop");
                cell.style.borderColor = flagBorder;
                cell.innerHTML = flagSvg;
                continue;
              }
              // Unrevealed safe cell: leave as dark.
              continue;
            }

            if (isFlagged) {
              const flagColor = state.mode === "coop"
                ? "var(--text-muted)"
                : (myPlayerIndex === 0 ? "var(--teal)" : "var(--coral)");

              const flagBorder = "rgba(200, 160, 0, 0.7)";

              cell.classList.add("flagged");
              cell.style.borderColor = flagBorder;
              cell.innerHTML = `
                <svg width="55%" height="55%" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path opacity="0.5" fill-rule="evenodd" clip-rule="evenodd" d="M6.5 1.75C6.5 1.33579 6.16421 1 5.75 1C5.33579 1 5 1.33579 5 1.75V21.75C5 22.1642 5.33579 22.5 5.75 22.5C6.16421 22.5 6.5 22.1642 6.5 21.75V13.6V3.6V1.75Z" fill="${flagColor}"/>
                  <path d="M13.5582 3.87333L13.1449 3.70801C11.5821 3.08288 9.8712 2.9258 8.22067 3.25591L6.5 3.60004V13.6L8.22067 13.2559C9.8712 12.9258 11.5821 13.0829 13.1449 13.708C14.8385 14.3854 16.7024 14.5119 18.472 14.0695L18.5721 14.0445C19.1582 13.898 19.4361 13.2269 19.1253 12.7089L17.5647 10.1078C17.2232 9.53867 17.0524 9.25409 17.0119 8.94455C16.9951 8.81543 16.9951 8.68466 17.0119 8.55553C17.0524 8.24599 17.2232 7.96141 17.5647 7.39225L18.8432 5.26136C19.1778 4.70364 18.6711 4.01976 18.0401 4.17751C16.5513 4.54971 14.9831 4.44328 13.5582 3.87333Z" fill="${flagColor}"/>
                </svg>`;
            }

            continue;
          }

          if (value === -1) {
            const by = state.foundBy?.[r]?.[c];

            cell.classList.add(
              "revealed",
              by === 0 ? "bomb-p1" :
                by === 1 ? "bomb-p2" :
                  "bomb-hidden"
            );

            cell.textContent = "💣";
            continue;
          }

          if (value === 0) {
            cell.classList.add("revealed", "empty");
            continue;
          }

          if (value > 0) {
            cell.classList.add("revealed", "num-" + value);
            cell.textContent = value;
            continue;
          }
        }
      }
    }

    let _resizeRaf = 0;
    let lastClickedCell = null;
    // Local flags for versus/explosive (keyed by "r,c"). Coop flags come from server state.
    let localFlags = {};
    let _localFlagsLoaded = false;
    function _flagsKey() { return roomId ? `mf-flags:${roomId}` : null; }
    function saveLocalFlags() {
      const k = _flagsKey(); if (!k) return;
      try { sessionStorage.setItem(k, JSON.stringify(localFlags)); } catch { }
    }
    function loadLocalFlags() {
      const k = _flagsKey(); if (!k) return;
      try { const raw = sessionStorage.getItem(k); if (raw) localFlags = JSON.parse(raw); } catch { }
    }
    function clearLocalFlags() {
      localFlags = {};
      const k = _flagsKey(); if (k) try { sessionStorage.removeItem(k); } catch { }
    }
    window.addEventListener("resize", () => {
      if (!currentState) return;
      if (_resizeRaf) cancelAnimationFrame(_resizeRaf);
      _resizeRaf = requestAnimationFrame(() => {
        try { renderBoard(currentState); } catch { }
        try { updateStickerPalettePosition(); } catch { }
      });
    });
    window.addEventListener("scroll", () => {
      const palette = document.getElementById("sticker-palette");
      if (!palette.classList.contains("open")) return;
      updateStickerPalettePosition();
    }, { passive: true });

    function playExplosiveRoundIntro() {
      const wrap = document.querySelector("#screen-game .board-wrap");
      if (!wrap) return;

      wrap.classList.remove("round-wipe");
      void wrap.offsetWidth;
      wrap.classList.add("round-wipe");
    }

    function showExplosiveCooldownCountdown(state) {
      const until = state?.explosiveCooldownUntil;
      if (!until) return;
      // Use a global fixed overlay so it is visible even when the board is scrolled/overflowed.
      let overlay = document.getElementById("explosive-global-overlay");
      if (!overlay) {
        overlay = document.createElement("div");
        overlay.id = "explosive-global-overlay";
        overlay.className = "explosive-global-overlay";
        overlay.innerHTML = `<div class="explosive-global-text"></div>`;
        document.body.appendChild(overlay);
      }
      const textEl = overlay.querySelector(".explosive-global-text");
      if (!textEl) return;

      const getReadyText = () => t.explosive_ready || "Ready";
      const getGoText = () => t.explosive_go || "Go!";
      overlay.classList.add("visible");
      // Defensive: inline style to beat any unexpected CSS overrides.
      overlay.style.display = "flex";
      // Set immediately so it doesn't wait for the first interval tick.
      const initialLeftMs = (until ?? 0) - Date.now();
      textEl.textContent = initialLeftMs > 2000 ? getReadyText() : getGoText();

      if (explosiveOverlayTimer) clearInterval(explosiveOverlayTimer);
      explosiveOverlayTimer = setInterval(() => {
        if (!currentState || currentState.mode !== "explosive") {
          overlay.classList.remove("visible");
          clearInterval(explosiveOverlayTimer);
          explosiveOverlayTimer = 0;
          return;
        }
        const leftMs = (currentState.explosiveCooldownUntil ?? 0) - Date.now();
        if (leftMs <= 0) {
          overlay.classList.remove("visible");
          clearInterval(explosiveOverlayTimer);
          explosiveOverlayTimer = 0;
          return;
        }
        // Ready for first 3s, Go for last 2s.
        textEl.textContent = leftMs > 2000 ? getReadyText() : getGoText();
      }, 120);
    }

    function syncExplosiveOverlayLocale() {
      const overlay = document.getElementById("explosive-global-overlay");
      if (!overlay || !overlay.classList.contains("visible")) return;
      const textEl = overlay.querySelector(".explosive-global-text");
      if (!textEl) return;
      if (!currentState || currentState.mode !== "explosive") return;
      if (!currentState.explosiveCooldownUntil) return;
      const leftMs = currentState.explosiveCooldownUntil - Date.now();
      if (leftMs <= 0) return;
      textEl.textContent = leftMs > 2000 ? (t.explosive_ready || "Ready") : (t.explosive_go || "Go!");
    }

    function handleCellFlag(r, c) {
      if (!currentState || currentState.status !== "playing") return;
      if (currentState.revealed[r][c]) return;
      if (navigator.vibrate) navigator.vibrate(30);
      if (currentState.mode === "coop") {
        // Server enforces limit and syncs to both players
        socket.send(JSON.stringify({ type: "flag", row: r, col: c }));
      } else {
        // Local only — limit to totalBombs from server state
        const key = `${r},${c}`;
        if (!localFlags[key]) {
          const flagCount = Object.values(localFlags).filter(Boolean).length;
          if (flagCount >= currentState.totalBombs) return;
        }
        localFlags[key] = !localFlags[key];
        saveLocalFlags();
        renderBoard(currentState);
        updateFlagsCounter(currentState);
      }
    }

    function handleCellClick(r, c) {
      if (!currentState || currentState.status !== "playing") return;
      if (currentState.mode === "explosive" && currentState.explosiveCooldownUntil && Date.now() < currentState.explosiveCooldownUntil) return;
      if (currentState.revealed[r][c]) return;
      // Block click on flagged cell
      const isFlagged = currentState.mode === "coop"
        ? currentState.flags?.[r]?.[c]
        : localFlags[`${r},${c}`];
      if (isFlagged) return;
      if (myPlayerIndex !== currentState.currentPlayer) return;

      socket.send(JSON.stringify({ type: "reveal", row: r, col: c }));
    }

    function renderResult(state) {
      const p1 = state.players[0];
      const p2 = state.players[1];
      let title, subtitle;

      if (state.mode === "coop") {
        if (state.coopResult === "win") {
          title = t.coop_won;
          subtitle = "";
        } else {
          title = t.coop_lost;
          subtitle = "";
        }
      } else if (state.mode === "explosive" && state.explosiveSeries) {
        const { wins } = state.explosiveSeries;
        if (!p1 || !p2) { title = "—"; subtitle = ""; }
        else if (wins[0] > wins[1]) {
          title = t.result_won_series(p1.name);
          subtitle = `${p1.name} ${wins[0]} — ${p2.name} ${wins[1]}`;
        } else {
          title = t.result_won_series(p2.name);
          subtitle = `${p2.name} ${wins[1]} — ${p1.name} ${wins[0]}`;
        }
      } else {
        // Versus — lógica atual
        if (!p1 || !p2) { title = "—"; subtitle = ""; }
        else if (p1.score > p2.score) {
          title = t.result_won(p1.name);
          subtitle = t.result_score(p1.name, p1.bombs, p2.name, p2.bombs);
        } else if (p2.score > p1.score) {
          title = t.result_won(p2.name);
          subtitle = t.result_score(p2.name, p2.bombs, p1.name, p1.bombs);
        } else {
          title = t.result_draw;
          subtitle = t.result_draw_score(p1.bombs);
        }
      }

      // Coop + IA warning
      const coopAiWarning = (state.mode === "coop" && state.players.some(p => p?.id === "ai"))
        ? `<div style="font-size:12px; color:var(--text-muted); text-align:center; padding: 4px 0;">${t.coop_ai_no_points}</div>`
        : "";

      const rematchReady = Array.isArray(state.rematchReady) ? state.rematchReady : null;
      const isTwoHumans = state.players[0]?.id !== "ai" && state.players[1]?.id !== "ai";
      const readyCount = rematchReady ? (rematchReady[0] ? 1 : 0) + (rematchReady[1] ? 1 : 0) : 0;
      const totalCount = (state.players[0] && state.players[1] && isTwoHumans) ? 2 : 0;
      const waitingRematch = totalCount === 2 && readyCount > 0 && readyCount < 2;

      const shareUrl = `${location.origin}${location.pathname}#${roomId}`;
      const waitingHtml = "";

      const rematchLabel = state.mode === "coop" ? (t.btn_play_again || t.btn_rematch) : t.btn_rematch;
      const acceptLabel = state.mode === "coop" ? (t.btn_play_again || t.btn_accept_rematch || t.btn_rematch) : (t.btn_accept_rematch || t.btn_rematch);

      document.getElementById("result-area").innerHTML = `
	    <div class="result-card">
	      <div class="result-title">${title}</div>
	      <div class="result-subtitle">${subtitle}</div>
	      <div id="result-ranking"></div>
	      ${coopAiWarning}
	      ${waitingHtml}
	      <div class="result-actions">
	        <button class="btn btn-primary" id="btn-rematch">${rematchLabel}</button>
	        <button class="btn btn-secondary" id="btn-new-game">${t.btn_new_game}</button>
	      </div>
	    </div>`;

      const btnRematch = document.getElementById("btn-rematch");
      if (btnRematch) {
        const meReady = (myPlayerIndex === 0 || myPlayerIndex === 1) && !!rematchReady?.[myPlayerIndex];
        // If the other player requested a rematch (pending) and I haven't accepted yet, make the CTA explicit.
        if (waitingRematch && !meReady) {
          btnRematch.textContent = acceptLabel || "Aceitar revanche";
        }
        btnRematch.onclick = rematch;
      }
      document.getElementById("btn-new-game").onclick = newRoom;
      renderResultRankingSummary();

      // If a rematch is pending, we reuse the waiting screen instead of showing it inside the result card.

      // Bring the end-of-game summary into view (especially on mobile).
      try {
        setTimeout(() => {
          const el = document.getElementById("result-area");
          if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
        }, 50);
      } catch { }
    }

    async function fetchRankingSnapshot(limit) {
      const activeName = getActivePlayerName();
      const params = new URLSearchParams();
      params.set("limit", String(limit));
      if (activeName) params.set("player", activeName);
      const res = await fetch(`/api/ranking?${params.toString()}`);
      if (!res.ok) throw new Error("ranking_fetch_failed");
      return await res.json();
    }

    function rankingRowHtml(entry, { highlight = false } = {}) {
      const activeName = getActivePlayerName();
      const isMe = isSamePlayerName(entry.name, activeName);
      const youSuffix = isMe ? ` <span class="ranking-you">${t.ranking_you || "(you)"}</span>` : "";
      const points = `${entry.points}`;
      const winsLabel = typeof t.ranking_wins_label === "function" ? t.ranking_wins_label(entry.wins) : (t.ranking_wins_label || "wins");
      const wins = `${entry.wins} ${winsLabel}`;
      const pointsLabel = t.ranking_points_label || "points";
      const medal = entry.position === 1 ? "🥇" : entry.position === 2 ? "🥈" : entry.position === 3 ? "🥉" : null;
      const posHtml = medal
        ? `<span class="ranking-medal" aria-hidden="true">${medal}</span>`
        : `<span class="ranking-pos-num">${entry.position}</span>`;
      return `
    <div class="ranking-row${(highlight || isMe) ? " highlight" : ""}">
      <div class="ranking-pos">${posHtml}</div>
      <div class="ranking-main">
        <div class="ranking-name">${entry.name}${youSuffix}</div>
      </div>
      <div class="ranking-meta">
        <div class="ranking-points">${points} ${pointsLabel}</div>
        <div class="ranking-wins">${wins}</div>
      </div>
    </div>`;
    }

    function rankingPlayerCardHtml(entry) {

    function _buildDefuseGrid(rows, cols) {
      const board = document.getElementById('defuse-board');
      if (!board) return;
      board.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
      board.innerHTML = '';
      const total = rows * cols;
      // Place exactly _defuseTotalBombs bombs randomly
      const indices = Array.from({ length: total }, (_, i) => i);
      for (let i = indices.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [indices[i], indices[j]] = [indices[j], indices[i]];
      }
      const bombSet = new Set(indices.slice(0, _defuseTotalBombs));
      // Build cells with bomb flag
      const cells = [];
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const idx = r * cols + c;
          const cell = document.createElement('div');
          cell.className = 'defuse-cell';
          cell.dataset.row = r; cell.dataset.col = c;
          cell.dataset.bomb = bombSet.has(idx) ? '1' : '0';
          cell.addEventListener('click', _onDefuseCellClick);
          board.appendChild(cell);
          cells.push(cell);
        }
      }
      // Compute neighbor counts
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const cell = cells[r * cols + c];
          if (cell.dataset.bomb === '1') continue;
          let count = 0;
          for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) {
            if (dr === 0 && dc === 0) continue;
            const nr = r + dr, nc = c + dc;
            if (nr >= 0 && nr < rows && nc >= 0 && nc < cols && cells[nr * cols + nc].dataset.bomb === '1') count++;
          }
          cell.dataset.neighbors = count;
        }
      }
    }

    function _showDefuseTimePenalty(cell, seconds) {
      const rect = cell.getBoundingClientRect();
      const el = document.createElement('div');
      el.className = 'defuse-time-float';
      el.textContent = `+${seconds}s 💥`;
      el.style.left = `${rect.left + rect.width / 2}px`;
      el.style.top = `${rect.top}px`;
      el.style.transform = 'translateX(-50%)';
      document.body.appendChild(el);
      el.addEventListener('animationend', () => el.remove(), { once: true });
      const timer = document.getElementById('defuse-timer');
      if (timer) {
        timer.classList.remove('defuse-timer-flash');
        void timer.offsetWidth;
        timer.classList.add('defuse-timer-flash');
        timer.addEventListener('animationend', () => timer.classList.remove('defuse-timer-flash'), { once: true });
      }
      const board = document.getElementById('defuse-board');
      if (board) {
        board.classList.remove('defuse-board-shake');
        void board.offsetWidth;
        board.classList.add('defuse-board-shake');
        board.addEventListener('animationend', () => board.classList.remove('defuse-board-shake'), { once: true });
      }
      _defuseSeconds += seconds;
    }

    function _onDefuseCellClick(e) {
      const cell = e.currentTarget;
      if (cell.classList.contains('revealed') || cell.classList.contains('defused') || cell.classList.contains('exploded')) return;

      if (!_defuseStarted) {
        _defuseStarted = true;
        const hint = document.getElementById('defuse-pregame-hint');
        if (hint) { hint.style.opacity = '0'; setTimeout(() => hint.style.display = 'none', 300); }
        _defuseTimer = setInterval(() => {
          _defuseSeconds++;
          const m = String(Math.floor(_defuseSeconds / 60)).padStart(2, '0');
          const s = String(_defuseSeconds % 60).padStart(2, '0');
          document.getElementById('defuse-timer').textContent = `${m}:${s}`;
        }, 1000);
      }

      const isBomb = cell.dataset.bomb === '1';
      const neighbors = parseInt(cell.dataset.neighbors || '0', 10);
      const comboEl = document.getElementById('defuse-combo');

      if (_defuseCurrentAction === 'reveal') {
        if (isBomb) {
          // Revelou uma bomba → +5s de punição
          cell.classList.add('exploded'); cell.textContent = '💣';
          _defuseCurrentCombo = 0;
          comboEl.textContent = '0';
          comboEl.style.color = 'var(--coral)'; setTimeout(() => comboEl.style.color = '', 600);
          _showDefuseTimePenalty(cell, 5);
        } else {
          // Célula segura → mostra número ou ponto
          cell.classList.add('revealed');
          cell.textContent = neighbors > 0 ? String(neighbors) : '·';
        }
      } else {
        // Ação: Desarmar
        if (isBomb) {
          // Acertou! Bomba desarmada → verde
          cell.classList.add('defused'); cell.textContent = '💣';
          _defuseCurrentCombo++; _defuseBombsResolved++;
          comboEl.textContent = `x${_defuseCurrentCombo}`;
          document.getElementById('defuse-bombs-counter').textContent = `${_defuseBombsResolved}/${_defuseTotalBombs}`;
          comboEl.style.color = 'var(--teal)'; setTimeout(() => comboEl.style.color = '', 400);
        } else {
          // Errou! Não era bomba → revela célula + 10s
          cell.classList.add('revealed');
          cell.textContent = neighbors > 0 ? String(neighbors) : '·';
          _defuseCurrentCombo = 0;
          comboEl.textContent = '0';
          comboEl.style.color = 'var(--coral)'; setTimeout(() => comboEl.style.color = '', 600);
          _showDefuseTimePenalty(cell, 10);
        }
      }
    }

          if (glyph) { glyph.textContent = '✅'; setTimeout(() => { glyph.textContent = '🔗'; }, 1800); }
        } catch {
          if (glyph) { glyph.textContent = '❌'; setTimeout(() => { glyph.textContent = '🔗'; }, 1800); }
        }
      });
      document.addEventListener('keydown', (e) => {
        if (!document.getElementById('screen-defuse-game')?.classList.contains('active')) return;
        if (e.code === 'Space' && !['INPUT', 'TEXTAREA', 'BUTTON'].includes(e.target.tagName)) {
          e.preventDefault();
          if (_defuseCurrentAction === 'reveal') document.getElementById('defuse-btn-defuse-action').click();
          else document.getElementById('defuse-btn-reveal').click();
        }
      });
    }

    setupDefuseCreate();
    setupDefuseGame();
  </script>
</body>

</html>
